<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* ── Editorial palette · LIGHT (default) ─────────────────────── */
  /* Surfaces (legacy names preserved; values flipped to editorial cream) */
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface2: #F4F2EC;
  --surface3: #E9E6DD;
  --border: rgba(0,0,0,.09);
  --border-light: rgba(0,0,0,.04);
  /* Text */
  --text: #1A1A1A;
  --text-muted: #5B5B5B;
  --text-dim: #9A998F;
  /* Brand (rappi name kept; value is now editorial terracota accent) */
  --rappi: #B8551F;
  --rappi-glow: rgba(184,85,31,.10);
  /* Semantic — remapped to editorial light equivalents */
  --green: #4A7C59;      --green-dim: rgba(74,124,89,.10);
  --red: #C8372D;        --red-dim: rgba(200,55,45,.08);
  --yellow: #C68B2B;     --yellow-dim: rgba(198,139,43,.10);
  --blue: #3E5F7A;       --blue-dim: rgba(62,95,122,.08);
  --purple: #6B4D7A;     --purple-dim: rgba(107,77,122,.10);
  --cyan: #4A6B8A;       --cyan-dim: rgba(74,107,138,.10);
  /* Shape */
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  /* Typography */
  --font: 'Nunito Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Fraunces', Georgia, serif;
  /* Effects (softened for light) */
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);

  /* ── Editorial semantic aliases (used by .ed-* and .tk-* components) ── */
  --paper: var(--surface);
  --paper2: var(--surface2);
  --paper3: var(--surface3);
  --ink: var(--text);
  --muted: var(--text-muted);
  --dim: var(--text-dim);
  --accent: var(--rappi);
  --accent-soft: var(--rappi-glow);
  --critical: var(--red);
  --critical-soft: var(--red-dim);
  --warn: var(--yellow);
  --warn-soft: var(--yellow-dim);
  --good: var(--green);
  --good-soft: var(--green-dim);
  --info: var(--blue);
  --info-soft: var(--blue-dim);
  --rule: var(--border);
  --rule-soft: var(--border-light);
  --rule-strong: rgba(0,0,0,.16);
}

/* ── Editorial palette · DARK (opt-in via [data-theme="dark"] on <html>) ── */
[data-theme="dark"] {
  --bg: #111114;
  --surface: #17181C;
  --surface2: #1E1F25;
  --surface3: #262830;
  --border: rgba(255,255,255,.08);
  --border-light: rgba(255,255,255,.04);
  --text: #EDEDEE;
  --text-muted: #9A9AA2;
  --text-dim: #63646C;
  --rappi: #D17247;
  --rappi-glow: rgba(209,114,71,.16);
  --green: #6FA88A;      --green-dim: rgba(111,168,138,.13);
  --red: #E26259;        --red-dim: rgba(226,98,89,.13);
  --yellow: #D9A23F;     --yellow-dim: rgba(217,162,63,.13);
  --blue: #7B96BF;       --blue-dim: rgba(123,150,191,.13);
  --purple: #9580A6;     --purple-dim: rgba(149,128,166,.13);
  --cyan: #6E8FB0;       --cyan-dim: rgba(110,143,176,.13);
  --shadow: 0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.4);
  --rule-strong: rgba(255,255,255,.14);
}

/* ═══════════════════════════════════════════════════════════════
   RESET + GLOBAL
   ═══════════════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

.ambient {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 700px 500px at 5% 5%, rgba(184,85,31,.04), transparent),
    radial-gradient(ellipse 500px 400px at 95% 90%, rgba(74,107,138,.03), transparent);
}
[data-theme="dark"] .ambient {
  background:
    radial-gradient(ellipse 700px 500px at 5% 5%, rgba(209,114,71,.06), transparent),
    radial-gradient(ellipse 500px 400px at 95% 90%, rgba(123,150,191,.04), transparent);
}
.app {
  position: relative; z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 28px 60px;
}

/* ═══════════════════════════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════════════════════════ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0; margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.topbar-logo {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--rappi);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 24px rgba(184,85,31,.35);
}
.topbar h1 { font-size: 19px; font-weight: 800; letter-spacing: -.5px; }
.topbar h1 span { color: var(--text-muted); font-weight: 400; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

/* ═══════════════════════════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════════════════════════ */
.nav-tabs {
  display: flex; gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 3px;
}
.nav-tab {
  padding: 7px 14px;
  border-radius: 10px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  border: none; background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text-muted); }
.nav-tab.active {
  background: var(--rappi); color: #fff;
  box-shadow: 0 0 16px rgba(184,85,31,.3);
}

.ov-badge {
  display: none;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  background: var(--red-dim); color: var(--red);
  border: 1px solid rgba(255,92,92,.2);
  animation: pulse 2s infinite;
}
.ov-badge.show { display: flex; align-items: center; gap: 5px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }

.btn-ref {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 17px;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-ref:hover { border-color: var(--rappi); color: var(--rappi); }

/* ═══════════════════════════════════════════════════════════════
   TOOLBAR
   ═══════════════════════════════════════════════════════════════ */
.toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.country-bar { display: flex; gap: 4px; flex-wrap: wrap; }

.cpill {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
}
.cpill:hover { border-color: var(--rappi); color: var(--rappi); }
.cpill.active {
  background: var(--rappi); color: #fff;
  border-color: var(--rappi);
  box-shadow: 0 0 12px rgba(184,85,31,.2);
}

.search-box { position: relative; }
.search-box input {
  width: 220px;
  padding: 8px 14px 8px 34px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  transition: border-color .2s;
}
.search-box input:focus {
  outline: none;
  border-color: var(--rappi);
  box-shadow: 0 0 0 3px rgba(184,85,31,.08);
}
.search-box input::placeholder { color: var(--text-dim); }
.search-box::before {
  content: '🔍';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════════
   VIEWS
   ═══════════════════════════════════════════════════════════════ */
.view { display: none; }
.view.active { display: block; }

/* ═══════════════════════════════════════════════════════════════
   CARDS
   ═══════════════════════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .3s;
}
.card:hover { border-color: var(--border-light); }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 14px; font-weight: 700; }
.card-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 100px;
  background: var(--surface3);
  color: var(--text-muted);
  font-weight: 600;
}
.card-body { padding: 20px; }

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 16px;
  margin-bottom: 22px;
}
.hero-grid .card-body { padding: 24px; min-height: 280px; }

/* ═══════════════════════════════════════════════════════════════
   TEAM CARDS
   ═══════════════════════════════════════════════════════════════ */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}
.tcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all .2s;
}
.tcard:hover { border-color: var(--border-light); transform: translateY(-2px); }
.tcard-sel {
  border-color: var(--rappi) !important;
  box-shadow: 0 0 0 2px rgba(184,85,31,.15);
}
.tcard-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.tcard-av {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; color: #fff;
  flex-shrink: 0;
}
.tcard-name { font-weight: 700; font-size: 13px; line-height: 1.2; }
.tcard-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.tcard-stats { display: flex; gap: 5px; flex-wrap: wrap; }
.tcard-stat { padding: 2px 7px; border-radius: var(--radius-xs); font-size: 10px; font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════
   TABLE + FILTERS
   ═══════════════════════════════════════════════════════════════ */
.filter-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-label { font-size: 11px; color: var(--text-dim); font-weight: 600; margin-right: 2px; }

.fbtn {
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  font-family: var(--font);
}
.fbtn:hover { border-color: var(--rappi); color: var(--rappi); }
.fbtn.active {
  background: var(--rappi-glow);
  color: var(--rappi);
  border-color: rgba(184,85,31,.3);
}

.pchip {
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
}
.pchip:hover { border-color: var(--purple); color: var(--purple); }
.pchip.active {
  background: var(--purple-dim);
  color: var(--purple);
  border-color: rgba(167,139,250,.3);
}

table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  padding: 11px 14px;
  font-size: 10px; font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .6px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky; top: 0;
  background: var(--surface);
}
tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
tbody tr { transition: background .12s; }
tbody tr:hover { background: var(--border-light); }

.col-id { color: var(--text-dim); font-family: var(--mono); font-size: 12px; width: 36px; }
.col-nombre { font-weight: 700; max-width: 240px; cursor: pointer; }
.col-nombre:hover { color: var(--rappi); }
.col-resp { color: var(--text-muted); white-space: nowrap; font-size: 12px; }
.col-acc { color: var(--text-muted); max-width: 200px; font-size: 12px; }

/* ═══════════════════════════════════════════════════════════════
   BADGES
   ═══════════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 11px;
  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  white-space: nowrap;
  cursor: pointer; transition: all .12s;
  border: none; background: transparent;
  font-family: var(--font);
}
.badge:hover { filter: brightness(1.15); transform: scale(1.04); }

/* Priority */
.b-alta { background: var(--red-dim); color: var(--red); }
.b-media { background: var(--yellow-dim); color: var(--yellow); }
.b-baja { background: var(--green-dim); color: var(--green); }

/* Status */
.b-pendiente { background: var(--surface3); color: var(--text-muted); }
.b-curso { background: var(--blue-dim); color: var(--blue); }
.b-revision { background: var(--purple-dim); color: var(--purple); }
.b-bloqueado { background: var(--yellow-dim); color: var(--yellow); }
.b-listo { background: var(--green-dim); color: var(--green); }

/* Deadline */
.dl-badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px;
  border-radius: var(--radius-xs);
  font-size: 11px; font-weight: 600;
  font-family: var(--mono);
}
.dl-ok { background: var(--green-dim); color: var(--green); }
.dl-warn { background: var(--yellow-dim); color: var(--yellow); }
.dl-over { background: var(--red-dim); color: var(--red); }
.dl-none { color: var(--text-dim); }

/* Tipo trabajo / Riesgo */
.b-tt {
  padding: 3px 9px;
  border-radius: var(--radius-xs);
  font-size: 10px; font-weight: 700;
  background: var(--surface3); color: var(--text-muted);
}
.b-riesgo-legal { background: var(--red-dim); color: var(--red); }
.b-riesgo-reput { background: var(--yellow-dim); color: var(--yellow); }
.b-riesgo-oper { background: var(--cyan-dim); color: var(--cyan); }

.btn-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  font-size: 15px;
  cursor: pointer; transition: all .12s;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn-icon:hover {
  border-color: var(--border);
  background: var(--surface3);
  color: var(--text);
}

/* ═══════════════════════════════════════════════════════════════
   PROJECT CARDS
   ═══════════════════════════════════════════════════════════════ */
.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
  margin-bottom: 22px;
}
.pcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .3s;
}
.pcard:hover { border-color: var(--border-light); }
.pcard-top { padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
.pcard-edit {
  position: absolute;
  top: 12px; right: 12px;
  width: 28px; height: 28px;
}
.pcard-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pcard-name { font-size: 16px; font-weight: 800; line-height: 1.3; }
.pcard-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.pcard-info {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-dim);
  flex-wrap: wrap;
}
.pcard-info span { display: flex; align-items: center; gap: 4px; }

.pcard-progress { margin-top: 4px; }
.pbar-track { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.pbar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .8s cubic-bezier(.22,1,.36,1);
}
.pbar-label {
  display: flex; justify-content: space-between;
  margin-top: 6px;
  font-size: 11px; color: var(--text-dim); font-weight: 600;
}

.pcard-stats { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 20px 14px; }
.pcard-stat { padding: 3px 9px; border-radius: var(--radius-xs); font-size: 10px; font-weight: 700; }

.pcard-footer {
  display: flex; align-items: center;
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  gap: 8px;
}
.pcard-toggle {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px; font-weight: 700;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  transition: color .15s;
  background: transparent;
  border: none;
  flex: 1;
  text-align: left;
  font-family: var(--font);
}
.pcard-toggle:hover { color: var(--text); }
.pcard-toggle .arrow { transition: transform .2s; display: inline-block; }

.pcard-tasks {
  max-height: 0; overflow: hidden;
  transition: max-height .3s ease;
  border-top: 1px solid var(--border);
}
.pcard-tasks.open { max-height: 800px; }
.pcard-task {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.pcard-task:last-child { border-bottom: none; }
.pcard-task-id { color: var(--text-dim); font-family: var(--mono); width: 28px; flex-shrink: 0; }
.pcard-task-name {
  flex: 1; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Project status badges */
.ps-activo { background: var(--blue-dim); color: var(--blue); }
.ps-pausa { background: var(--yellow-dim); color: var(--yellow); }
.ps-completado { background: var(--green-dim); color: var(--green); }
.ps-cancelado { background: var(--red-dim); color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   FORM
   ═══════════════════════════════════════════════════════════════ */
.form-section { margin-bottom: 24px; }
.form-section-title {
  font-size: 12px; font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

.form-group label {
  display: block;
  font-size: 11px; font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  transition: border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--rappi);
  box-shadow: 0 0 0 3px rgba(184,85,31,.08);
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--text-dim); }
.form-group textarea { resize: vertical; min-height: 60px; }

.btn-submit {
  padding: 12px 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--rappi);
  color: #fff;
  font-family: var(--font);
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 16px rgba(184,85,31,.3);
}
.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(184,85,31,.4);
}
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 8px; }

.btn-secondary {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

.form-msg { margin-top: 12px; font-size: 13px; font-weight: 600; min-height: 20px; }
.msg-info { color: var(--blue); }
.msg-success { color: var(--green); }
.msg-error { color: var(--red); }

/* Sub-tabs (Crear view) */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.sub-tab {
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  transition: all .15s;
}
.sub-tab:hover { border-color: var(--rappi); color: var(--rappi); }
.sub-tab.active {
  background: var(--rappi-glow);
  color: var(--rappi);
  border-color: rgba(184,85,31,.3);
}
.sub-view { display: none; }
.sub-view.active { display: block; }

/* ═══════════════════════════════════════════════════════════════
   SLA
   ═══════════════════════════════════════════════════════════════ */
.sla-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sla-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 18px;
  text-align: center;
}
.sla-num { font-size: 30px; font-weight: 800; font-family: var(--mono); letter-spacing: -1px; }
.sla-lbl {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .5px;
  margin-top: 4px; font-weight: 700;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  width: 90%; max-width: 560px; max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  animation: mIn .25s ease;
}
.modal.modal-wide {
  max-width: 780px;
}
@keyframes mIn {
  from { opacity: 0; transform: scale(.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 16px; font-weight: 800; }
.modal-close {
  width: 32px; height: 32px;
  border: none;
  background: var(--surface3);
  color: var(--text-muted);
  border-radius: 8px;
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  font-family: var(--font);
}
.modal-close:hover { background: var(--red-dim); color: var(--red); }
.modal-body { padding: 22px; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px;
  justify-content: flex-end;
}

/* ═══════════════════════════════════════════════════════════════
   DROPDOWN
   ═══════════════════════════════════════════════════════════════ */
.dd-overlay { display: none; position: fixed; inset: 0; z-index: 900; }
.dd-menu {
  display: none;
  position: absolute; z-index: 901;
  background: var(--surface2);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 5px;
  min-width: 150px;
  box-shadow: var(--shadow);
}
.dd-item {
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background .1s;
  color: var(--text);
  display: flex; align-items: center; gap: 7px;
}
.dd-item:hover { background: var(--surface3); }
.dd-active { background: var(--rappi-glow); color: var(--rappi); }
.dd-label {
  padding: 5px 14px 3px;
  font-size: 10px; font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .5px;
}
.dd-sep { height: 1px; background: var(--border); margin: 3px 8px; }

/* ═══════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 13px; font-weight: 700;
  z-index: 2000;
  transition: transform .3s cubic-bezier(.22,1,.36,1), opacity .3s;
  opacity: 0;
  pointer-events: none;
  box-shadow: var(--shadow);
  font-family: var(--font);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-info { background: var(--surface2); border: 1px solid var(--border-light); color: var(--blue); }
.toast-success { background: #052e16; border: 1px solid rgba(45,212,160,.3); color: var(--green); }
.toast-error { background: #450a0a; border: 1px solid rgba(255,92,92,.3); color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   MISC
   ═══════════════════════════════════════════════════════════════ */
.empty { text-align: center; padding: 50px 20px; color: var(--text-dim); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.footer {
  text-align: center; padding: 28px 0;
  color: var(--text-dim); font-size: 11px;
  border-top: 1px solid var(--border);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { opacity: 0; animation: fadeUp .45s ease forwards; }
.d1 { animation-delay: .05s; }
.d2 { animation-delay: .1s; }
.d3 { animation-delay: .15s; }
.d4 { animation-delay: .2s; }

/* ═══════════════════════════════════════════════════════════════
   DOCUMENTOS — sección en el modal de edición
   ═══════════════════════════════════════════════════════════════ */
.doc-list {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  min-height: 44px;
  align-items: center;
  margin-bottom: 10px;
}
.doc-empty {
  font-size: 12px; color: var(--text-dim); font-style: italic;
}
.doc-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 6px 4px 12px;
  font-size: 12px;
  max-width: 320px;
}
.doc-chip a {
  color: var(--blue);
  text-decoration: none;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 260px;
}
.doc-chip a:hover { text-decoration: underline; }
.doc-chip-x {
  width: 20px; height: 20px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font);
}
.doc-chip-x:hover { background: var(--red-dim); color: var(--red); }

.doc-actions {
  display: flex; flex-direction: column; gap: 10px;
}
.doc-upload-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--rappi);
  color: #fff;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  border: none;
  align-self: flex-start;
}
.doc-upload-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(184,85,31,.3);
}
.doc-link-row {
  display: flex; gap: 6px;
  align-items: center;
}
.doc-link-input {
  flex: 1;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
}
.doc-link-input:focus { outline: none; border-color: var(--rappi); }
.doc-link-input:first-of-type { flex: 2; }

/* ═══════════════════════════════════════════════════════════════
   ACTIVE FILTERS — chips removibles arriba de la tabla
   ═══════════════════════════════════════════════════════════════ */
.active-filters {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}
.active-filters:empty {
  display: none;
}
.filter-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--rappi-glow);
  color: var(--rappi);
  border: 1px solid rgba(184,85,31,.25);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font);
}
.filter-chip:hover { background: var(--rappi); color: #fff; border-color: var(--rappi); }
.filter-chip .chip-x { opacity: .7; font-size: 10px; }
.filter-chip:hover .chip-x { opacity: 1; }
.filter-clear-all {
  margin-left: 4px;
  padding: 4px 10px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: color .15s;
}
.filter-clear-all:hover { color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   RESUMEN EJECUTIVO (head) — KPIs, comparativa países, risk, tendencia
   ═══════════════════════════════════════════════════════════════ */
.rx-kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 22px;
}
.rx-kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  text-align: center;
  transition: border-color .15s;
}
.rx-kpi:hover { border-color: var(--border-light); }
.rx-kpi-num {
  font-size: 32px; font-weight: 800;
  font-family: var(--mono);
  letter-spacing: -1px;
  line-height: 1;
}
.rx-kpi-lbl {
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .5px;
  margin-top: 6px; font-weight: 700;
}

.rx-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.rx-risk-list { padding: 0; }
.rx-risk-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
}
.rx-risk-item:hover { background: var(--border-light); }
.rx-risk-item:last-child { border-bottom: none; }
.rx-risk-info { flex: 1; min-width: 0; }
.rx-risk-name {
  font-weight: 700; font-size: 13px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rx-risk-meta {
  font-size: 11px; color: var(--text-dim);
  margin-top: 2px; font-weight: 600;
}
.rx-risk-stats { display: flex; gap: 6px; align-items: center; }
.rx-risk-stat {
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px; font-weight: 800;
  font-family: var(--mono);
}

@media (max-width: 1024px) {
  .rx-kpi-row { grid-template-columns: 1fr 1fr; }
  .rx-split { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════════════════════════
   MI EQUIPO — vista para managers y head (grid de miembros + hotspots)
   ═══════════════════════════════════════════════════════════════ */
.meq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.meq-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color .15s;
}
.meq-card:hover { border-color: var(--border-light); }
.meq-card.meq-hot { border-color: rgba(255,92,92,.3); }

.meq-head {
  display: flex; align-items: center; gap: 10px;
}
.meq-av {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px;
  color: #fff;
  flex-shrink: 0;
}
.meq-name { font-weight: 700; font-size: 13px; line-height: 1.2; }
.meq-country { font-size: 11px; color: var(--text-dim); margin-top: 1px; font-weight: 600; }

.meq-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.meq-stat {
  text-align: center;
  background: var(--surface);
  border-radius: 6px;
  padding: 6px 4px;
}
.meq-stat-num {
  font-size: 18px; font-weight: 800;
  font-family: var(--mono);
  line-height: 1;
}
.meq-stat-lbl {
  font-size: 9px; color: var(--text-dim);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-top: 3px;
}

.meq-bar-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--text-dim);
  font-weight: 600;
}
.meq-bar {
  flex: 1;
  height: 6px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}
.meq-bar-seg { height: 100%; }
.meq-bar-alta  { background: #FF5C5C; }
.meq-bar-media { background: #FFB938; }
.meq-bar-baja  { background: #2DD4A0; }

.meq-view-btn {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px; font-weight: 700;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.meq-view-btn:hover {
  border-color: var(--rappi); color: var(--rappi);
}

/* Hotspots rows: énfasis visual en urgencia */
.hotspot-days {
  font-family: var(--mono);
  font-weight: 700;
}
.hotspot-days.critical { color: var(--red); }
.hotspot-days.warn { color: var(--yellow); }

/* ═══════════════════════════════════════════════════════════════
   FAB (floating action button) — crear tarea/proyecto desde cualquier vista
   ═══════════════════════════════════════════════════════════════ */
.fab {
  position: fixed;
  bottom: 28px; right: 28px;
  width: 56px; height: 56px;
  border-radius: 50%;
  border: none;
  background: var(--rappi);
  color: #fff;
  font-size: 28px;
  font-weight: 400;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(184,85,31,.4);
  z-index: 900;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  transition: all .2s;
  font-family: var(--font);
}
.fab:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 12px 32px rgba(184,85,31,.5);
}
.fab:active { transform: translateY(0); }

/* Botón "+ tarea" dentro de cada pcard (quick-add a ese proyecto) */
.pcard-add {
  font-size: 11px; font-weight: 700;
  color: var(--rappi);
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
  margin-left: 6px;
}
.pcard-add:hover {
  border-color: var(--rappi);
  background: var(--rappi-glow);
}

/* ═══════════════════════════════════════════════════════════════
   LOADER BAR (top del viewport, activo durante llamadas al server)
   ═══════════════════════════════════════════════════════════════ */
.loader-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  z-index: 10000;
  background: linear-gradient(90deg, transparent 0%, var(--rappi) 40%, var(--rappi) 60%, transparent 100%);
  background-size: 40% 100%;
  background-repeat: no-repeat;
  background-position: -40% 0;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
}
.loader-bar.show { opacity: 1; animation: loaderslide 1.1s infinite linear; }
@keyframes loaderslide {
  0%   { background-position: -40% 0; }
  100% { background-position: 140% 0; }
}

/* ═══════════════════════════════════════════════════════════════
   ROLE GATING — oculta secciones según rol del visitante
   El body recibe una clase role-head / role-manager / role-specialist
   montada en JS desde window.__USER__.role.
   ═══════════════════════════════════════════════════════════════ */

/* Specialist: sin country bar, sin team grid, sin "Mis tareas" (ya es default),
   sin chart de carga por equipo, sin tab Mi equipo ni Resumen. */
body.role-specialist #cBar,
body.role-specialist #tGrid,
body.role-specialist #myTasksBtn,
body.role-specialist #cardLoad,
body.role-specialist #rChips,
body.role-specialist #tabMiequipo,
body.role-specialist #tabResumen { display: none !important; }

/* Manager: country bar no aplica (solo su país); Resumen es vista ejecutiva
   del head, no aplica al manager. */
body.role-manager #cBar,
body.role-manager #tabResumen { display: none !important; }

/* Badge de rol junto al nombre del usuario */
.user-role-badge {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 6px;
  background: var(--purple-dim);
  color: var(--purple);
  margin-left: 6px;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════════════
   USER CHIP (header, muestra el usuario SSO identificado)
   ═══════════════════════════════════════════════════════════════ */
.user-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 6px;
  border-radius: 100px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.user-chip:hover { border-color: var(--rappi); }
.user-chip-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
  color: #fff;
}

/* ═══════════════════════════════════════════════════════════════
   MIS TAREAS
   ═══════════════════════════════════════════════════════════════ */
.mt-hero {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 22px;
}
.mt-kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px;
  text-align: center;
}
.mt-kpi-num { font-size: 28px; font-weight: 800; font-family: var(--mono); }
.mt-kpi-lbl {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .5px;
  margin-top: 4px; font-weight: 700;
}
.mt-section { margin-bottom: 18px; }
.mt-section-title {
  font-size: 11px; font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .6px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}

/* Mi desempeño — métricas personales del specialist */
.mt-perf-grid {
  display: grid;
  grid-template-columns: minmax(200px, 1fr) 2fr;
  gap: 20px;
}
.mt-perf-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
}
.mt-perf-label {
  font-size: 11px; font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 10px;
}
.mt-perf-streak {
  font-size: 44px; font-weight: 800;
  font-family: var(--mono);
  color: var(--rappi);
  line-height: 1;
  letter-spacing: -2px;
}
.mt-perf-sub {
  font-size: 11px; color: var(--text-dim);
  margin-top: 4px;
  font-weight: 600;
}
.mt-perf-prios {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.mt-perf-prio {
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 2px;
}
.mt-perf-prio-emoji { font-size: 14px; }
.mt-perf-prio-val {
  font-size: 26px; font-weight: 800;
  font-family: var(--mono);
  color: var(--text);
  line-height: 1.1;
}
.mt-perf-prio-sub {
  font-size: 10px; color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .4px;
}
@media (max-width: 640px) {
  .mt-perf-grid { grid-template-columns: 1fr; }
  .mt-perf-prios { grid-template-columns: 1fr 1fr 1fr; }
}

/* Section headers dentro de la tabla Mis Tareas (bucket por urgencia) */
.mt-section-row td {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 14px 14px 8px !important;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.mt-section-row:first-child td { border-top: none; }
.mt-section-count {
  margin-left: 6px;
  padding: 1px 7px;
  border-radius: 100px;
  font-size: 10px;
  background: var(--surface3);
  color: var(--text-muted);
}
.mt-bucket-vencidas td { color: var(--red); }
.mt-bucket-vencidas .mt-section-count { background: var(--red-dim); color: var(--red); }
.mt-bucket-hoy td { color: var(--yellow); }
.mt-bucket-hoy .mt-section-count { background: var(--yellow-dim); color: var(--yellow); }
.mt-bucket-semana td { color: var(--blue); }
.mt-bucket-semana .mt-section-count { background: var(--blue-dim); color: var(--blue); }
.mt-bucket-despues td { color: var(--text-muted); }
.mt-bucket-sinfecha td { color: var(--text-dim); }

/* ═══════════════════════════════════════════════════════════════
   TAGS INPUT (accionables y participantes)
   ═══════════════════════════════════════════════════════════════ */
.tags-input {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  min-height: 42px;
  cursor: text;
  transition: border-color .2s;
}
.tags-input:focus-within {
  border-color: var(--rappi);
  box-shadow: 0 0 0 3px rgba(184,85,31,.08);
}
.tag {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 100px;
  background: var(--surface3);
  color: var(--text);
  font-size: 12px; font-weight: 600;
}
.tag-x { cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1; }
.tag-x:hover { color: var(--red); }
.tags-text {
  border: none; background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  min-width: 120px; flex: 1;
}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 1024px) {
  .hero-grid { grid-template-columns: 1fr; }
  .form-3col { grid-template-columns: 1fr 1fr; }
  .topbar { flex-wrap: wrap; gap: 12px; }
  .proj-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .form-3col,
  .form-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr 1fr; }
  .topbar { flex-direction: column; align-items: flex-start; }
  .toolbar { flex-direction: column; align-items: flex-start; }
  .search-box { margin-left: 0; width: 100%; }
  .search-box input { width: 100%; }
  .sla-row { grid-template-columns: 1fr; }
  .proj-grid { grid-template-columns: 1fr; }
  .mt-hero { grid-template-columns: 1fr 1fr; }
}

/* ═══════════════════════════════════════════════════════════════
   EDITORIAL · BASE ATOMS (Fase 0)
   Atomic classes used by the new editorial views.
   Compound layouts (sidebar, header, tracker panel) live in later phases.
   ═══════════════════════════════════════════════════════════════ */

.ed-mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.ed-serif { font-family: var(--serif); }

.ed-eye {
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
  margin-bottom: 14px;
}

.ed-h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 38px;
  line-height: 1.08;
  letter-spacing: -1px;
  margin-bottom: 12px;
  color: var(--ink);
}
.ed-h1 em { font-style: italic; color: var(--accent); }

.ed-h2 {
  font-size: 13px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.6px;
  font-weight: 700;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ed-h2::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

.ed-lede {
  font-size: 15px;
  color: var(--muted);
  max-width: 720px;
  line-height: 1.55;
  margin-bottom: 36px;
}
.ed-lede b { color: var(--ink); font-weight: 700; }
.ed-lede .crit { color: var(--critical); font-weight: 700; }
.ed-lede .good { color: var(--good); font-weight: 700; }
.ed-lede .warn { color: var(--warn); font-weight: 700; }

.ed-section { margin-bottom: 48px; }

.ed-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  border-radius: 4px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, color .12s, border-color .12s;
}
.ed-btn:hover { border-color: var(--rule-strong); }
.ed-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.ed-btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.ed-btn.accent:hover { filter: brightness(1.08); border-color: var(--accent); }

.ed-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 8px;
  border-radius: 3px;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
}
.ed-pill.alta       { background: var(--critical-soft); color: var(--critical); }
.ed-pill.media      { background: var(--warn-soft);     color: var(--warn); }
.ed-pill.baja       { background: var(--good-soft);     color: var(--good); }
.ed-pill.curso      { background: var(--info-soft);     color: var(--info); }
.ed-pill.revision   { background: var(--accent-soft);   color: var(--accent); }
.ed-pill.bloqueado  { background: var(--critical-soft); color: var(--critical); }
.ed-pill.pendiente  { background: var(--paper3);        color: var(--muted); }

.ed-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}
.ed-dot.crit { background: var(--critical); }
.ed-dot.warn { background: var(--warn); }
.ed-dot.good { background: var(--good); }
.ed-dot.info { background: var(--info); }

/* ═══════════════════════════════════════════════════════════════
   EDITORIAL · COMPOUND LAYOUTS (Fase 1)
   Shell, sidebar, header, role homes (esp/mgr/hq), tracker.
   Reusa los tokens semantic aliases de Fase 0 (--paper, --ink,
   --rule, --accent, --critical, --warn, --good, --info).
   ═══════════════════════════════════════════════════════════════ */

/* ── Shell ─────────────────────────────────────────────────────── */
.ed-root {
  display: grid;
  grid-template-columns: 218px 1fr;
  min-height: 100vh;
  height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
}

.ed-side {
  width: 218px;
  border-right: 1px solid var(--rule);
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  background: var(--bg);
}
.ed-side::-webkit-scrollbar { width: 4px; }
.ed-side::-webkit-scrollbar-thumb { background: var(--paper3); border-radius: 2px; }

.ed-side-brand {
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 18px;
}
.ed-side-brand .ed-brand {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 600;
  font-size: 21px;
  letter-spacing: -.5px;
  line-height: 1;
  color: var(--ink);
}
.ed-side-brand .ed-brand-sub {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.6px;
  font-weight: 700;
  margin-top: 6px;
}

.ed-role-pill {
  display: inline-block;
  font-family: var(--serif);
  font-style: italic;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .2px;
  font-weight: 500;
  margin-top: 6px;
}

.ed-side-foot {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 10px;
}
.ed-side-foot .ed-foot-av {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 11px;
  flex: 0 0 auto;
}
.ed-side-foot .ed-foot-meta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
.ed-side-foot .ed-foot-name { font-size: 12px; font-weight: 700; color: var(--ink); }
.ed-side-foot .ed-foot-role { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

.ed-main {
  padding: 40px 48px 60px;
  max-width: 1200px;
  min-width: 0;
  overflow-y: auto;
  height: 100vh;
}
.ed-main.with-panel {
  display: grid;
  grid-template-columns: 1fr 440px;
  max-width: none;
  gap: 0;
  padding-right: 0;
}

.ed-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
}
.ed-head .ed-head-eye {
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
}
.ed-head .ed-head-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ed-head .ed-search {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--dim);
  padding: 6px 10px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: transparent;
  min-width: 220px;
}

/* ── Sidebar nav ──────────────────────────────────────────────── */
.ed-nav-section { margin-bottom: 4px; }
.ed-nav-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-weight: 700;
  margin-top: 18px;
  margin-bottom: 6px;
  padding: 0 8px;
}
.ed-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  border-left: 2px solid transparent;
  border-radius: 0 3px 3px 0;
  font-weight: 500;
  transition: background .12s, color .12s, border-color .12s;
}
.ed-nav-item:hover { background: var(--paper2); }
.ed-nav-item.active {
  border-left-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 700;
}
.ed-nav-item span:first-child { flex: 1; }
.ed-nav-item span:last-child,
.ed-nav-badge {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  color: var(--dim);
  font-weight: 600;
}
.ed-nav-item.active .ed-nav-badge,
.ed-nav-item.active span:last-child { color: var(--accent); }

/* ── Theme toggle ─────────────────────────────────────────────── */
.theme-toggle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-family: inherit;
  font-size: 14px;
  transition: background .12s, border-color .12s;
  flex: 0 0 auto;
}
.theme-toggle:hover { background: var(--paper2); border-color: var(--rule-strong); }

/* Demo switcher (solo visible para HQ real) */
.ed-demo-switch {
  margin-top: auto;
  padding: 12px 0;
  border-top: 1px dashed var(--rule);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ed-demo-lbl {
  font-size: 9px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-weight: 800;
}
.ed-demo-sel {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 8px;
  background: var(--paper2);
  color: var(--ink);
  border: 1px solid var(--rule);
  border-radius: 4px;
  cursor: pointer;
}
.ed-demo-sel:hover { border-color: var(--accent); }
.ed-demo-sel:focus { outline: none; border-color: var(--accent); }
/* Cuando hay demo switcher, el side-foot deja de tener margin-top:auto
   (el switcher lo toma). Lo re-aplicamos para que el switcher empuje
   foot abajo del todo. */
.ed-demo-switch + .ed-side-foot { margin-top: 0; }

/* ═══════════════════════════════════════════════════════════════
   SPECIALIST HOME (.esp-*)
   ═══════════════════════════════════════════════════════════════ */
.esp-hero {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 28px 0;
  margin-bottom: 48px;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.esp-stat {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0 24px;
  border-right: 1px solid var(--rule);
}
.esp-stat:first-child { padding-left: 0; }
.esp-stat:last-child  { border-right: none; padding-right: 0; }

.esp-stat-lbl {
  font-size: 10.5px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-weight: 700;
}
.esp-stat-num {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 44px;
  line-height: 1;
  letter-spacing: -1px;
  color: var(--ink);
}
.esp-stat-num.crit { color: var(--critical); }
.esp-stat-num.warn { color: var(--warn); }
.esp-stat-num.good { color: var(--good); }
.esp-stat-ctx {
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.45;
}

.esp-task-row {
  display: grid;
  grid-template-columns: auto auto 1fr auto auto;
  align-items: center;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--rule);
}
.esp-task-row:last-child { border-bottom: none; }
.esp-task-rank {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 22px;
  color: var(--dim);
  min-width: 28px;
}
.esp-task-meta {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
}
.esp-task-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.esp-task-name {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
.esp-task-action {
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.4;
}
.esp-task-eta {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  color: var(--ink);
  white-space: nowrap;
}
.esp-task-eta.crit { color: var(--critical); }
.esp-task-eta.warn { color: var(--warn); }
.esp-task-eta.dim  { color: var(--dim); }
.esp-task-pills { display: flex; gap: 6px; flex-wrap: wrap; }

.esp-perf {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 22px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.esp-perf .esp-stat { padding: 0 22px; }
.esp-perf .esp-stat:first-child { padding-left: 0; }
.esp-perf .esp-stat:last-child  { padding-right: 0; }
.esp-perf .esp-stat-num { font-size: 32px; }

.esp-proj-row {
  display: grid;
  grid-template-columns: auto 1.5fr 1fr 1fr auto;
  align-items: center;
  gap: 18px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule);
}
.esp-proj-row:last-child { border-bottom: none; }
.esp-proj-role {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--accent);
}
.esp-proj-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.esp-proj-lead { font-size: 12px; color: var(--muted); }
.esp-proj-prog {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  color: var(--muted);
}
.esp-proj-eta {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 12.5px;
  color: var(--ink);
}

.hq-stat-num.good { color: var(--good); }
.hq-stat-ctx { font-size: 11.5px; color: var(--muted); line-height: 1.45; }

.hq-country-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto auto;
  align-items: center;
  gap: 18px;
  padding: 14px 0;
  font-size: 14px;
  color: var(--ink);
  border-bottom: 1px solid var(--rule);
}
.hq-country-row:last-child { border-bottom: none; }
.hq-flag {
  font-size: 22px;
  line-height: 1;
  width: 28px;
  text-align: center;
}
.hq-country-name { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.hq-country-name b { font-size: 14px; font-weight: 600; color: var(--ink); }
.hq-country-name .lead { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }
.hq-num {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 14px;
  color: var(--ink);
  min-width: 46px;
  text-align: right;
}
.hq-num.crit { color: var(--critical); }
.hq-num.warn { color: var(--warn); }
.hq-num.good { color: var(--good); }
.hq-num.dim  { color: var(--dim); }

.hq-spark {
  display: flex;
  align-items: flex-end;
  gap: 1px;
  height: 12px;
  width: 60px;
}
.hq-spark .bar {
  width: 3px;
  height: 100%;
  background: var(--paper3);
  border-radius: 1px;
}
.hq-spark .bar.high { background: var(--ink); }
.hq-spark .bar.good { background: var(--good); opacity: .85; }
.hq-spark .bar.good.high { background: var(--good); opacity: 1; }
.hq-spark .bar.crit { background: var(--critical); opacity: .85; }
.hq-spark .bar.crit.high { background: var(--critical); opacity: 1; }

/* ═══════════════════════════════════════════════════════════════
   TRACKER (.tk-*)
   ═══════════════════════════════════════════════════════════════ */
.tk-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 12px 0;
  margin-bottom: 18px;
}
.tk-filter {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink);
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, color .12s, border-color .12s;
}
.tk-filter:hover { background: var(--paper2); }
.tk-filter.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.tk-filter-count {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  color: var(--dim);
  margin-left: 6px;
  font-weight: 600;
}
.tk-filter.active .tk-filter-count { color: var(--bg); opacity: .7; }

.tk-search {
  flex: 1;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 6px 0;
  background: transparent;
  color: var(--ink);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .12s;
}
.tk-search:focus { border-bottom-color: var(--ink); }
.tk-search::placeholder { color: var(--dim); }

.tk-table {
  font-size: 13.5px;
  width: 100%;
}
.tk-row {
  display: grid;
  grid-template-columns: 60px 1.5fr 1fr 90px 110px 90px;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background .12s;
}
.tk-row:hover { background: var(--paper2); }
.tk-row.selected {
  background: var(--accent-soft);
  box-shadow: inset 3px 0 0 var(--accent);
}
.tk-id {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  color: var(--dim);
}
.tk-name {
  font-size: 14.5px;
  color: var(--ink);
  font-weight: 600;
  line-height: 1.3;
}
.tk-name-meta {
  display: block;
  font-size: 11px;
  color: var(--dim);
  margin-top: 2px;
  font-weight: 400;
}
.tk-eta {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  color: var(--ink);
}
.tk-eta.crit { color: var(--critical); }
.tk-eta.warn { color: var(--warn); }
.tk-eta.dim  { color: var(--dim); }

.tk-panel {
  position: sticky;
  top: 0;
  align-self: start;
  width: 440px;
  padding: 32px 28px;
  border-left: 1px solid var(--rule);
  background: var(--paper);
  height: 100vh;
  overflow-y: auto;
}
.tk-panel-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.tk-panel-eyebrow {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.tk-panel-close {
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: grid;
  place-items: center;
  border-radius: 3px;
  transition: color .12s, background .12s;
}
.tk-panel-close:hover { color: var(--ink); background: var(--paper2); }
.tk-panel-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 24px;
  line-height: 1.18;
  color: var(--ink);
  margin-bottom: 12px;
  letter-spacing: -.3px;
}
.tk-panel-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}
.tk-panel-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  column-gap: 22px;
  margin-bottom: 22px;
}
.tk-panel-cell { display: flex; flex-direction: column; gap: 4px; }
.tk-panel-cell .lbl {
  font-size: 10.5px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
}
.tk-panel-cell .val { font-size: 14px; color: var(--ink); }

.tk-panel-block {
  border: 1px solid var(--rule);
  padding: 16px;
  margin-bottom: 22px;
  border-radius: 3px;
}
.tk-panel-block.crit { border-left: 3px solid var(--critical); }
.tk-panel-block .blk-lbl {
  font-size: 10.5px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-bottom: 8px;
}
.tk-panel-block .blk-body { font-size: 13.5px; color: var(--ink); line-height: 1.5; }

.tk-timeline {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-left: 18px;
  border-left: 1px solid var(--rule);
  margin-bottom: 22px;
}
.tk-tl-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.tk-tl-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--muted);
  margin-top: 5px;
  flex: 0 0 auto;
  margin-left: -22px;
}
.tk-tl-dot.crit { background: var(--critical); }
.tk-tl-dot.good { background: var(--good); }
.tk-tl-dot.info { background: var(--info); }
.tk-tl-when {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.tk-tl-what { font-size: 13px; color: var(--ink); line-height: 1.4; }

.tk-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tk-actions .ed-btn { justify-content: center; padding: 9px 14px; }

/* ═══════════════════════════════════════════════════════════════
   ESPECIALIST QUOTE — frase rotativa antes del hero
   ═══════════════════════════════════════════════════════════════ */
.esp-quote {
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 22px 0;
  margin-bottom: 36px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: center;
}
.esp-quote-text {
  font-family: var(--serif);
  font-size: 18px;
  font-style: italic;
  font-weight: 400;
  line-height: 1.45;
  color: var(--ink);
  letter-spacing: -.2px;
}
.esp-quote-who {
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-weight: 700;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════════════
   AGRUPADAS — vista intermedia "Por urgencia"
   ═══════════════════════════════════════════════════════════════ */
.ag-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 36px;
  border-bottom: 1px solid var(--rule);
}
.ag-tab {
  padding: 10px 18px;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ag-tab.active {
  color: var(--ink);
  border-color: var(--accent);
}
.ag-bucket { margin-bottom: 48px; }
.ag-bhead {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
}
.ag-btitle {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -.5px;
}
.ag-btitle.crit { color: var(--critical); }
.ag-btitle.warn { color: var(--warn); }
.ag-bcount {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--dim);
  font-weight: 600;
}
.ag-bnarr {
  font-size: 13px;
  color: var(--muted);
  flex: 1;
  line-height: 1.5;
}
.ag-bnarr b { color: var(--ink); font-weight: 700; }
.ag-bnarr .crit { color: var(--critical); font-weight: 700; }
.ag-bnarr .warn { color: var(--warn); font-weight: 700; }
.ag-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--rule);
  border-left: 1px solid var(--rule);
}
.ag-card {
  padding: 16px 18px;
  border-bottom: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  cursor: pointer;
  transition: background .12s;
}
.ag-card:hover { background: var(--rule-soft); }
.ag-card-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  margin-bottom: 6px;
  letter-spacing: .5px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.ag-card-meta .sep { color: var(--rule-strong); }
.ag-card-name {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.ag-card-action {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.45;
  margin-bottom: 12px;
  min-height: 34px;
}
.ag-card-action .warn { color: var(--warn); font-weight: 700; }
.ag-card-action .crit { color: var(--critical); font-weight: 700; }
.ag-card-foot { display: flex; align-items: center; gap: 6px; }
.ag-card-eta {
  margin-left: auto;
  font-size: 11px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ag-card-eta.crit { color: var(--critical); }
.ag-card-eta.warn { color: var(--warn); }

/* ═══════════════════════════════════════════════════════════════
   ACTUALIZAR — panel deslizable (avanzar / cerrar / bloquear)
   ═══════════════════════════════════════════════════════════════ */
.ua-overlay { position: fixed; inset: 0; z-index: 1100; }
.ua-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.32); backdrop-filter: blur(2px); }
.ua-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 560px; max-width: 100vw; background: var(--paper); border-left: 1px solid var(--rule); box-shadow: -30px 0 80px rgba(0,0,0,.18); display: flex; flex-direction: column; }
.ua-head { padding: 24px 28px 18px; border-bottom: 1px solid var(--rule); position: relative; }
.ua-eye { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.6px; font-weight: 800; margin-bottom: 6px; }
.ua-id { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
.ua-title { font-family: var(--serif); font-size: 22px; font-weight: 400; line-height: 1.25; letter-spacing: -.4px; color: var(--ink); }
.ua-x { position: absolute; right: 24px; top: 24px; font-size: 22px; color: var(--dim); cursor: pointer; background: transparent; border: none; padding: 0; line-height: 1; }
.ua-x:hover { color: var(--ink); }
.ua-flow { display: flex; align-items: center; gap: 0; padding: 18px 28px; background: var(--paper2); border-bottom: 1px solid var(--rule); }
.ua-flow-step { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 0 0 auto; }
.ua-flow-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--paper3); border: 1.5px solid var(--rule); }
.ua-flow-dot.done { background: var(--good); border-color: var(--good); }
.ua-flow-dot.now { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
.ua-flow-dot.target { background: var(--paper); border-color: var(--accent); border-width: 2px; }
.ua-flow-lbl { font-size: 9.5px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; white-space: nowrap; }
.ua-flow-lbl.now { color: var(--accent); }
.ua-flow-lbl.target { color: var(--accent); font-weight: 800; }
.ua-flow-line { flex: 1; height: 1px; background: var(--rule); margin: 0 8px; margin-top: -16px; }
.ua-flow-line.done { background: var(--good); }
.ua-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
.ua-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.ua-opt { padding: 10px 12px; border: 1px solid var(--rule); border-radius: 4px; background: var(--paper); cursor: pointer; text-align: center; transition: .12s; font-family: inherit; }
.ua-opt:hover { border-color: var(--accent); }
.ua-opt.active { border-color: var(--accent); background: var(--accent-soft); }
.ua-opt-lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; margin-bottom: 3px; }
.ua-opt.active .ua-opt-lbl { color: var(--accent); }
.ua-opt-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.ua-opt.active .ua-opt-name { color: var(--accent); }
.ua-action { padding: 18px; border-radius: 6px; margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-start; }
.ua-action.cerrar { background: var(--good-soft); border-left: 3px solid var(--good); }
.ua-action.bloquear { background: var(--critical-soft); border-left: 3px solid var(--critical); }
.ua-action.avanzar { background: var(--accent-soft); border-left: 3px solid var(--accent); }
.ua-action-mark { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 16px; flex-shrink: 0; font-family: var(--serif); font-style: italic; }
.ua-action.cerrar .ua-action-mark { background: var(--good); }
.ua-action.bloquear .ua-action-mark { background: var(--critical); }
.ua-action.avanzar .ua-action-mark { background: var(--accent); }
.ua-action-h { font-family: var(--serif); font-size: 18px; font-weight: 400; line-height: 1.3; letter-spacing: -.2px; margin-bottom: 4px; color: var(--ink); }
.ua-action-sub { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
.ua-action-sub b { color: var(--ink); font-weight: 700; }
.ua-field { margin-bottom: 18px; }
.ua-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.4px; font-weight: 700; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
.ua-label .opt { color: var(--dim); font-weight: 600; text-transform: none; letter-spacing: normal; }
.ua-label .req { color: var(--warn); }
.ua-input { width: 100%; padding: 11px 13px; background: var(--paper2); border: 1px solid var(--rule); border-radius: 4px; font-family: inherit; font-size: 13.5px; color: var(--ink); box-sizing: border-box; line-height: 1.5; }
.ua-input:focus { outline: none; border-color: var(--accent); }
.ua-textarea { min-height: 90px; resize: vertical; }
.ua-foot { padding: 16px 28px; border-top: 1px solid var(--rule); display: flex; gap: 10px; align-items: center; background: var(--paper); }
.ua-foot-info { font-size: 11px; color: var(--dim); flex: 1; line-height: 1.4; }
.ua-foot-info b { color: var(--ink); font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════
   CREAR — wizard editorial (3 pasos: esencial / detalles / confirmar)
   Versión simplificada del rediseño de pendientes/ed-crear.jsx.
   ═══════════════════════════════════════════════════════════════ */
.cr-overlay { position: fixed; inset: 0; z-index: 1100; overflow-y: auto; }
.cr-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.32); backdrop-filter: blur(2px); }
.cr-modal { position: relative; background: var(--paper); max-width: 820px; margin: 60px auto; border: 1px solid var(--rule); border-radius: 6px; box-shadow: 0 30px 80px rgba(0,0,0,.18); display: flex; flex-direction: column; }
.cr-head { padding: 22px 32px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 14px; position: relative; }
.cr-eye { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.6px; font-weight: 800; margin-bottom: 4px; }
.cr-title { font-family: var(--serif); font-size: 24px; font-weight: 400; letter-spacing: -.5px; line-height: 1.2; color: var(--ink); }
.cr-x { margin-left: auto; color: var(--dim); cursor: pointer; font-size: 22px; background: transparent; border: none; padding: 0; line-height: 1; }
.cr-x:hover { color: var(--ink); }
.cr-steps { display: flex; gap: 0; padding: 0 32px; border-bottom: 1px solid var(--rule); background: var(--paper2); }
.cr-step { padding: 12px 0; margin-right: 28px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; gap: 8px; align-items: center; }
.cr-step.active { color: var(--ink); border-color: var(--accent); }
.cr-step.done { color: var(--good); }
.cr-step-num { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 18px; line-height: 1; }
.cr-body { padding: 26px 32px; flex: 1; overflow-y: auto; max-height: 70vh; }
.cr-field { margin-bottom: 20px; }
.cr-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.4px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.cr-label .req { color: var(--warn); }
.cr-input { width: 100%; padding: 11px 14px; background: var(--paper2); border: 1px solid var(--rule); border-radius: 4px; font-family: inherit; font-size: 14px; color: var(--ink); box-sizing: border-box; }
.cr-input:focus { outline: none; border-color: var(--accent); }
.cr-input.title { font-family: var(--serif); font-size: 20px; font-weight: 400; letter-spacing: -.3px; padding: 14px 16px; }
.cr-textarea { min-height: 84px; resize: vertical; font-family: inherit; line-height: 1.5; }
.cr-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.cr-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.cr-pills-row { display: flex; gap: 6px; flex-wrap: wrap; }
.cr-pill-btn { padding: 7px 12px; background: var(--paper2); border: 1px solid var(--rule); border-radius: 3px; font-size: 12px; cursor: pointer; font-weight: 600; color: var(--ink); font-family: inherit; }
.cr-pill-btn:hover { border-color: var(--rule-strong); }
.cr-pill-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.cr-pill-btn.alta.active { background: var(--critical); border-color: var(--critical); color: #fff; }
.cr-pill-btn.media.active { background: var(--warn); border-color: var(--warn); color: #fff; }
.cr-pill-btn.baja.active { background: var(--good); border-color: var(--good); color: #fff; }
.cr-pill-btn.estandar.active     { background: var(--good);     border-color: var(--good);     color: #fff; }
.cr-pill-btn.restringido.active  { background: var(--warn);     border-color: var(--warn);     color: #fff; }
.cr-pill-btn.confidencial.active { background: var(--critical); border-color: var(--critical); color: #fff; }
.cr-foot { padding: 16px 32px; border-top: 1px solid var(--rule); display: flex; gap: 10px; align-items: center; background: var(--paper); }
.cr-foot-info { font-size: 11.5px; color: var(--dim); flex: 1; line-height: 1.45; }
