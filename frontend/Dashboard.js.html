// Reemplaza el legacy vMiequipo (cards azules de hotspots + grid
// de cards). Aquí: hero stats + tabla equipo con load bars.
// Para head, agrupa por país con sub-headers .ed-h2.
// Defensive: si el rol no tiene acceso, muestra mensaje cálido.
// ───────────────────────────────────────────────────────────────
function rEdMiequipo(D) {
  var v = $('vEdMiequipo'); if (!v) return;
  var role = (typeof _effectiveRole === 'function') ? _effectiveRole() : ((USER && USER.role) || 'specialist');
  if (role !== 'manager' && role !== 'head') {
    v.innerHTML = ''
      + '<div class="ed-eye">Sin acceso</div>'
      + '<h1 class="ed-h1">Esta vista es para <em>manager o head</em>.</h1>'
      + '<p class="ed-lede">Si creés que es un error, contactá a quien configuró tu acceso.</p>';
    return;
  }

  var team = (D && D.team) || [];
  var userCode = _effectiveUserCode();

  // ── Hero metrics + render ─────────────────────────────────────
  // Cuenta de personas, carga promedio (% utilización), vencidas y
  // bloqueadas se computan sobre el conjunto visible (manager filtra
  // por country; head usa todo el team).
  var visible = (role === 'manager')
    ? team.filter(function(m){ return m && m.country === userCode; })
    : team.slice();

  var totalLoad = 0, totalCap = 0, totalOver = 0, totalBlk = 0;
  visible.forEach(function(m){
    totalLoad += (m && m.load)     || 0;
    totalCap  += (m && m.capacity) || 0;
    totalOver += (m && m.overdue)  || 0;
    totalBlk  += (m && m.blocked)  || 0;
  });
  var loadPct = totalCap > 0 ? Math.round((totalLoad / totalCap) * 100) : 0;
  // Países distintos (head). Filtra falsy y duplicados.
  var countries = [];
  if (role === 'head') {
    var seenC = {};
    for (var ci = 0; ci < visible.length; ci++) {
      var cc = visible[ci] && visible[ci].country;
      if (!cc || seenC[cc]) continue;
      seenC[cc] = true; countries.push(cc);
    }
    countries.sort();
  }
  var atRisk = visible.filter(function(m){
    if (!m || !m.capacity) return false;
    var pct = Math.round((m.load || 0) / m.capacity * 100);
    return pct > 90 || (m.overdue || 0) > 0 || (m.blocked || 0) > 0;
  }).length;

  // ── Eyebrow + H1 + Lede ───────────────────────────────────────
  var eyebrow, h1, ledeBits = [];
  if (role === 'manager') {
    eyebrow = 'Equipo' + (userCode ? ' · ' + userCode : '');
    h1 = 'Tu equipo, <em>' + visible.length + ' '
       + (visible.length === 1 ? 'persona' : 'personas') + '</em>.';
    ledeBits.push('Carga promedio <b>' + (totalCap ? loadPct + '%' : '—') + '</b>');
    if (totalOver) ledeBits.push('<span class="crit">' + totalOver + ' vencidas</span> en el equipo');
    if (atRisk)    ledeBits.push('<b>' + atRisk + '</b> ' + (atRisk === 1 ? 'persona' : 'personas') + ' en riesgo');
    if (ledeBits.length === 0) ledeBits.push('Sin alertas — el equipo va al día');
  } else {
    eyebrow = 'Equipos LATAM · ' + countries.length + (countries.length === 1 ? ' país' : ' países');
    h1 = '<em>' + countries.length + ' equipos</em> activos<br>en LATAM.';
    ledeBits.push('<b>' + visible.length + '</b> ' + (visible.length === 1 ? 'persona' : 'personas') + ' en total');
    ledeBits.push('utilización <b>' + (totalCap ? loadPct + '%' : '—') + '</b>');
    if (totalOver) ledeBits.push('<span class="crit">' + totalOver + ' vencidas</span>');
    if (atRisk)    ledeBits.push('<b>' + atRisk + '</b> en riesgo');
  }

  var html = '<div class="pa-page">';

  // Page header
  html += '<div class="pa-page-h">'
       +    '<span class="pa-page-title">' + (role === 'manager' ? 'Mi equipo' : 'Equipos LATAM') + '</span>'
       +    '<span class="pa-page-sub">' + visible.length + (visible.length === 1 ? ' persona' : ' personas') + (role === 'head' ? ' · ' + countries.length + (countries.length === 1 ? ' país' : ' países') : (userCode ? ' · ' + userCode : '')) + '</span>'
       + '</div>';

  if (visible.length > 0) {
    html += '<div class="pa-narrative">' + ledeBits.join(' · ') + '.</div>';
  }

  // KPIs
  html += '<div class="pa-kpis">'
       +    '<div class="pa-kpi">'
       +      '<div class="lab"><span class="dot" style="background:var(--info)"></span> ' + (role === 'manager' ? 'Personas activas' : 'Personas LATAM') + '</div>'
       +      '<div class="val">' + visible.length + '</div>'
       +      '<div class="delta">' + (role === 'manager' ? (userCode || 'tu país') : countries.length + (countries.length === 1 ? ' país' : ' países')) + '</div>'
       +    '</div>'
       +    '<div class="pa-kpi ' + (loadPct > 90 ? 'is-warn' : '') + '">'
       +      '<div class="lab"><span class="dot" style="background:var(--accent)"></span> Carga promedio</div>'
       +      '<div class="val">' + (totalCap ? loadPct + '%' : '—') + '</div>'
       +      '<div class="delta">' + totalLoad + '/' + totalCap + ' capacidad</div>'
       +    '</div>'
       +    '<div class="pa-kpi ' + (totalOver ? 'is-critical' : '') + '">'
       +      '<div class="lab"><span class="dot" style="background:var(--critical)"></span> Vencidas</div>'
       +      '<div class="val">' + totalOver + '</div>'
       +      '<div class="delta">' + (totalOver ? 'reasignar' : 'todo en orden') + '</div>'
       +    '</div>'
       +    '<div class="pa-kpi ' + (totalBlk ? 'is-warn' : '') + '">'
       +      '<div class="lab"><span class="dot" style="background:var(--warn)"></span> Bloqueadas</div>'
       +      '<div class="val">' + totalBlk + '</div>'
       +      '<div class="delta">' + (totalBlk ? 'desbloquear' : '—') + '</div>'
       +    '</div>'
       + '</div>';

  // Empty state
  if (visible.length === 0) {
    html += '<div class="pa-card" style="text-align:center;padding:48px 20px;margin-top:18px">'
         +    '<div style="width:40px;height:40px;border-radius:10px;background:var(--bg-2);display:grid;place-items:center;color:var(--fg-3);margin:0 auto 12px">' + paIcon('users', 20) + '</div>'
         +    '<div style="font-size:13px;font-weight:600;color:var(--fg-1)">' + (role === 'manager' ? 'Sin miembros visibles' : 'No hay equipos cargados') + '</div>'
         +    '<div style="font-size:12px;color:var(--fg-3);margin:6px 0">' + (role === 'manager' ? 'Si esperabas ver gente, contactá a quien gestiona equipos.' : 'Agregá personas desde la hoja Equipos.') + '</div>'
         + '</div></div>';
    v.innerHTML = html;
    return;
  }

  // Sort: vencidas/bloqueadas primero
  function _miqSorted(arr) {
    return arr.slice().sort(function(a, b){
      var heatA = ((a && a.overdue) || 0) * 2 + ((a && a.blocked) || 0);
      var heatB = ((b && b.overdue) || 0) * 2 + ((b && b.blocked) || 0);
      if (heatA !== heatB) return heatB - heatA;
      return (a.name || '').localeCompare(b.name || '');
    });
  }

  function _miqRow(m) {
    var pct = (m.capacity > 0) ? Math.round((m.load || 0) / m.capacity * 100) : 0;
    var over = pct > 100;
    var loadColor = over ? 'var(--critical)' : pct > 85 ? 'var(--warn)' : 'var(--accent)';
    var loadFg = over ? 'var(--critical-fg)' : 'var(--fg-2)';
    var ov = m.overdue || 0;
    var bl = m.blocked || 0;
    var sla = m.slaPct;
    var slaColor = sla == null ? 'var(--fg-3)' : (sla >= 90 ? 'var(--good-fg)' : (sla < 85 ? 'var(--warn-fg)' : 'var(--fg-2)'));
    return '<div class="pa-tbl-r" style="grid-template-columns: 1fr 220px 80px 90px 80px 100px;height:48px" data-act="miq-open-person" data-arg="' + esc(m.name || '') + '">'
         +   '<div style="display:flex;align-items:center;gap:10px">' + paAvatar(m.name || '?', 22)
         +     '<div><div style="font-size:13px;font-weight:500">' + esc(m.name || '') + '</div>'
         +     '<div style="font-size:11px;color:var(--fg-3)">' + esc(m.role || 'Specialist') + (m.country ? ' · ' + esc(m.country) : '') + '</div></div>'
         +   '</div>'
         +   '<div style="display:flex;align-items:center;gap:8px">'
         +     '<span style="flex:1;height:6px;background:var(--bg-2);border-radius:999px;overflow:hidden"><span style="display:block;height:100%;width:' + Math.min(pct, 100) + '%;background:' + loadColor + '"></span></span>'
         +     '<span class="mono" style="font-size:11px;color:' + loadFg + ';min-width:50px;text-align:right">' + (m.load || 0) + '/' + (m.capacity || 0) + '</span>'
         +   '</div>'
         +   '<div class="mono" style="font-size:12px;color:' + (ov ? 'var(--critical-fg)' : 'var(--fg-3)') + '">' + ov + '</div>'
         +   '<div class="mono" style="font-size:12px;color:' + (bl ? 'var(--warn-fg)' : 'var(--fg-3)') + '">' + bl + '</div>'
         +   '<div class="mono" style="font-size:12px;color:' + slaColor + '">' + (sla != null ? sla + '%' : '—') + '</div>'
         +   '<div style="display:flex;justify-content:flex-end"><button class="pa-btn pa-btn-ghost" style="height:24px;font-size:11px" onclick="event.stopPropagation();_miqOpenPerson(\'' + esc(m.name || '') + '\')">Detalle →</button></div>'
         + '</div>';
  }

  if (role === 'manager') {
    html += '<div class="pa-section-h"><h3>Tu equipo</h3><span class="meta">Carga, vencidas, bloqueadas y SLA mes</span></div>'
         +  '<div class="pa-tbl">'
         +    '<div class="pa-tbl-h" style="grid-template-columns: 1fr 220px 80px 90px 80px 100px">'
         +      '<div>Persona</div><div>Carga</div><div>Vencidas</div><div>Bloqueadas</div><div>SLA mes</div><div></div>'
         +    '</div>';
    var sorted = _miqSorted(visible);
    sorted.forEach(function(m) { html += _miqRow(m); });
    html += '</div>';
  } else {
    // Head: por país
    var groups = {};
    visible.forEach(function(mm) {
      var key = (mm && mm.country) || '—';
      (groups[key] = groups[key] || []).push(mm);
    });
    var keys = Object.keys(groups).sort();
    keys.forEach(function(k) {
      var arr = _miqSorted(groups[k]);
      var gOver = 0, gLoad = 0, gCap = 0;
      arr.forEach(function(m){ gOver += (m.overdue || 0); gLoad += (m.load || 0); gCap += (m.capacity || 0); });
      var gPct = gCap > 0 ? Math.round(gLoad / gCap * 100) : 0;
      html += '<div class="pa-section-h">'
           +    '<h3><span class="pa-pill pa-pill-country" style="margin-right:8px">' + esc(k) + '</span>' + arr.length + (arr.length === 1 ? ' persona' : ' personas') + '</h3>'
           +    '<span class="meta">' + (gCap ? gPct + '% carga · ' : '') + (gOver ? gOver + ' vencidas' : 'sin vencidas') + '</span>'
           + '</div>'
           + '<div class="pa-tbl">'
           +   '<div class="pa-tbl-h" style="grid-template-columns: 1fr 220px 80px 90px 80px 100px">'
           +     '<div>Persona</div><div>Carga</div><div>Vencidas</div><div>Bloqueadas</div><div>SLA mes</div><div></div>'
           +   '</div>';
      arr.forEach(function(m) { html += _miqRow(m); });
      html += '</div>';
    });
  }

  html += '</div>'; // pa-page
  v.innerHTML = html;
}

// Vista editorial de Analytics para manager y head. Hero con 4 KPIs,
// charts editoriales (donut prioridad, bar horizontal estado por

function _edaTopResponsables(team, n) {
  if (!team || !team.length) return [];
  // Ordenar por carga activa (total - listo) descendente y tomar top N
  return team.slice().sort(function(a, b) {
    var aa = (a.total || 0) - (a.listo || 0);
    var bb = (b.total || 0) - (b.listo || 0);
    return bb - aa;
  }).slice(0, n || 6);
}

function _edaCerradasMes(tasks) {
  if (!tasks || !tasks.length) return 0;
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  var cnt = 0;
  tasks.forEach(function(t) {
    if (t.status !== 'Listo') return;
    var raw = t.cerradoRaw || t.cierreRaw || t.closedRaw || null;
    if (!raw) return;
    var d = new Date(raw);
    if (isNaN(d.getTime())) return;
    if (d.getFullYear() === y && d.getMonth() === m) cnt++;
  });
  return cnt;
}

// HQ insight #1: Country comparison matrix.
// Tabla con countries: active / overdue / slaPct / 12-week sparkline.
function _edaHQCountriesSection(D) {
  var countries = (D && D.countries) || [];
  if (!countries.length) return '';
  var html = '<section class="ed-section">'
           + '<div class="ed-h2">— Comparativa de países</div>'
           + '<div class="hq-cmp-table">'
           + '<div class="hq-cmp-head">'
           +   '<span>País</span><span>Activas</span><span>Vencidas</span><span>SLA</span><span>Throughput · 12 semanas</span>'
           + '</div>';
  countries.slice().sort(function(a, b) {
    return ((b.overdue || 0) - (a.overdue || 0)) || ((a.slaPct || 0) - (b.slaPct || 0));
  }).forEach(function(c) {
    var sla = (c.slaPct == null) ? null : c.slaPct;
    var slaCls = sla == null ? 'dim' : (sla >= 90 ? 'good' : (sla >= 75 ? 'warn' : 'crit'));
    var trend = (c.trend && c.trend.length) ? c.trend : [];
    var maxT = trend.reduce(function(m, n){ return Math.max(m, n); }, 0);
    var sparkSvg = '<svg class="hq-cmp-spark" viewBox="0 0 120 24" preserveAspectRatio="none">';
    if (maxT > 0) {
      var pts = trend.map(function(n, i) {
        var x = (i / (trend.length - 1)) * 120;
        var y = 24 - (n / maxT) * 22;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      sparkSvg += '<polyline points="' + pts + '" fill="none" stroke="currentColor" stroke-width="1.4"/>';
    }
    sparkSvg += '</svg>';
    html += '<div class="hq-cmp-row" onclick="goEd(\'paises\')">'
         +    '<span class="hq-cmp-code">' + esc(c.code || '—') + '</span>'
         +    '<span class="hq-cmp-num">' + (c.open || 0) + '</span>'
         +    '<span class="hq-cmp-num ' + (c.overdue ? 'crit' : '') + '">' + (c.overdue || 0) + '</span>'
         +    '<span class="hq-cmp-num ' + slaCls + '">' + (sla == null ? '—' : sla + '%') + '</span>'
         +    '<span class="hq-cmp-trend ' + slaCls + '">' + sparkSvg + '</span>'
         + '</div>';
  });
  return html + '</div></section>';
}

// HQ insight #2: Projects at risk (top 5 con más overdue tasks).
function _edaHQRiskSection(D) {
  var projects = (D && D.projects) || [];
  var tasks = (D && D.tasks) || [];
  if (!projects.length) return '';
  var byProject = {};
  tasks.forEach(function(t) {
    if (!t.proyectoId) return;
    if (!(typeof t.etaDays === 'number' && t.etaDays < 0 && t.status !== 'Listo')) return;
    byProject[t.proyectoId] = (byProject[t.proyectoId] || 0) + 1;
  });
  var ranked = projects.map(function(p) {
    return { p: p, overdue: byProject[p.id] || 0 };
  }).filter(function(x){ return x.overdue > 0; })
    .sort(function(a, b){ return b.overdue - a.overdue; })
    .slice(0, 5);
  if (!ranked.length) {
    return '<section class="ed-section">'
         +   '<div class="ed-h2">— Proyectos en riesgo</div>'
         +   '<div class="ed-lede" style="text-align:center;padding:20px 0">No hay proyectos con tareas vencidas. ✅</div>'
         + '</section>';
  }
  var html = '<section class="ed-section">'
           + '<div class="ed-h2">— Proyectos en riesgo</div>'
           + '<div class="hq-risk-list">';
  ranked.forEach(function(r) {
    html += '<div class="hq-risk-row" onclick="edPiOpen(\'' + esc(r.p.id) + '\');goEd(\'proyectos\')">'
         +    '<div class="hq-risk-name">'
         +      '<div class="hq-risk-title">' + esc(r.p.nombre || '') + '</div>'
         +      '<div class="hq-risk-meta">' + esc((r.p.pais || '—') + ' · ' + (r.p.lider || '—')) + '</div>'
         +    '</div>'
         +    '<div class="hq-risk-count crit">' + r.overdue + '<em> vencidas</em></div>'
         + '</div>';
  });
  return html + '</div></section>';
}

// Aging insight: distribución de tareas activas por edad (días desde
// creación). Muestra cuánto tiempo lleva cada cosa parada en la mesa.
// Buckets: >14d (crit), 7-14d (warn), 3-7d (default), <3d (fresh).
function _edaAgingSection(tasks) {
  var nowMs = Date.now();
  var buckets = [
    { key: 'old',    lbl: '> 14d',    cls: 'crit', count: 0 },
    { key: 'aging',  lbl: '7–14d',    cls: 'warn', count: 0 },
    { key: 'recent', lbl: '3–7d',     cls: '',     count: 0 },
    { key: 'fresh',  lbl: '< 3d',     cls: 'good', count: 0 }
  ];
  var active = (tasks || []).filter(function(t){ return t.status !== 'Listo'; });
  active.forEach(function(t) {
    if (!t.creadoRaw) return;
    var d = new Date(t.creadoRaw);
    if (isNaN(d.getTime())) return;
    var days = Math.floor((nowMs - d.getTime()) / 86400000);
    if (days > 14) buckets[0].count++;
    else if (days >= 7) buckets[1].count++;
    else if (days >= 3) buckets[2].count++;
    else buckets[3].count++;
  });
  var total = buckets.reduce(function(s, b){ return s + b.count; }, 0);
  var oldest = buckets[0].count;

  var html = '<section class="ed-section">'
           + '<div class="ed-h2">— Antigüedad de tareas activas</div>';
  if (total === 0) {
    html += '<div class="ed-lede">No hay tareas activas para medir antigüedad.</div></section>';
    return html;
  }
  // Lede dinámico
  if (oldest > 0) {
    html += '<p class="ed-lede"><span class="crit">' + oldest + (oldest === 1 ? ' tarea' : ' tareas') + '</span> ' + (oldest === 1 ? 'lleva' : 'llevan') + ' más de 2 semanas activas. Considerá revisarlas o cerrarlas.</p>';
  } else if (buckets[1].count > 0) {
    html += '<p class="ed-lede">La mayoría de las tareas lleva menos de dos semanas en agenda. Cadencia saludable.</p>';
  } else {
    html += '<p class="ed-lede">Todas las tareas activas son recientes (menos de una semana). Mantené el ritmo.</p>';
  }
  // Stacked bar
  html += '<div class="aging-bar">';
  buckets.forEach(function(b) {
    if (b.count === 0) return;
    var pct = Math.round(b.count / total * 1000) / 10;
    html += '<div class="aging-seg ' + b.cls + '" style="width:' + pct + '%" title="' + b.lbl + ': ' + b.count + ' tareas (' + pct + '%)">' + b.count + '</div>';
  });
  html += '</div>';
  // Legend
  html += '<div class="aging-legend">';
  buckets.forEach(function(b) {
    html += '<span class="aging-legend-item"><i class="dot ' + b.cls + '"></i>' + b.lbl + ' · <b>' + b.count + '</b></span>';
  });
  html += '</div></section>';
  return html;
}

// SLA compliance trend: % on-time por semana, últimas 8 semanas.
// Usa historial filtrado por rol/país.
function _edaSlaTrendSection(D, currentTasks, role, userCode) {
  var hist = (D && D.historial) || [];
  if (role === 'manager' && userCode) {
    hist = hist.filter(function(t){ return (t.pais || '') === userCode; });
  }
  if (!hist.length) return '';
  var SLA = { 'Alta': 2, 'Media': 5, 'Baja': 7 };
  var nowMs = Date.now();
  var WEEK = 7 * 86400000;
  var weeks = [];
  for (var w = 7; w >= 0; w--) {
    var weekStart = nowMs - (w + 1) * WEEK;
    var weekEnd   = nowMs - w * WEEK;
    var inWeek = [];
    hist.forEach(function(t) {
      if (!t.creadoRaw || !t.cerrado) return;
      var p = t.cerrado.split('/');
      var cerradoDate = new Date(parseInt(p[2], 10), parseInt(p[1], 10) - 1, parseInt(p[0], 10));
      var ms = cerradoDate.getTime();
      if (ms < weekStart || ms >= weekEnd) return;
      var biz = (typeof _bizDays === 'function') ? _bizDays(new Date(t.creadoRaw), cerradoDate) : null;
      var lim = SLA[t.priority] || 5;
      var onTime = (biz != null) && (biz <= lim);
      inWeek.push(onTime);
    });
    var ot = inWeek.filter(function(x){ return x; }).length;
    var pct = inWeek.length > 0 ? Math.round(ot / inWeek.length * 100) : null;
    weeks.push({ count: inWeek.length, onTime: ot, pct: pct, label: w === 0 ? 'hoy' : (w + 's') });
  }
  // Average across weeks with data
  var withData = weeks.filter(function(w){ return w.count > 0; });
  if (!withData.length) return '';
  var avgPct = Math.round(withData.reduce(function(s, w){ return s + w.pct; }, 0) / withData.length);
  // Trend slope: compare first half vs second half
  var firstHalf = withData.slice(0, Math.floor(withData.length / 2));
  var lastHalf  = withData.slice(Math.floor(withData.length / 2));
  var firstAvg = firstHalf.length ? firstHalf.reduce(function(s,w){return s+w.pct;}, 0) / firstHalf.length : 0;
  var lastAvg  = lastHalf.length  ? lastHalf.reduce(function(s,w){return s+w.pct;}, 0)  / lastHalf.length  : 0;
  var trendArrow = '→', trendCls = 'dim';
  if (lastAvg > firstAvg + 5) { trendArrow = '↑'; trendCls = 'good'; }
  else if (lastAvg < firstAvg - 5) { trendArrow = '↓'; trendCls = 'crit'; }

  var html = '<section class="ed-section">'
           + '<div class="ed-h2">— Tendencia SLA, últimas 8 semanas</div>'
           + '<p class="ed-lede">Promedio <b>' + avgPct + '% en tiempo</b>. Tendencia <span class="' + trendCls + '" style="font-weight:700">' + trendArrow + '</span></p>';
  // Sparkline-ish bar chart
  html += '<div class="sla-trend-grid">';
  weeks.forEach(function(w) {
    var hbar = w.pct == null ? 2 : Math.max(4, Math.round(w.pct / 100 * 100));
    var fillCls = w.pct == null ? 'empty' : (w.pct >= 90 ? 'good' : (w.pct >= 75 ? 'warn' : 'crit'));
    html += '<div class="sla-trend-col" title="' + w.label + ': ' + (w.pct == null ? 'sin datos' : (w.pct + '% (' + w.onTime + '/' + w.count + ')')) + '">'
         +    '<div class="sla-trend-bar ' + fillCls + '" style="height:' + hbar + '%"></div>'
         +    '<div class="sla-trend-pct">' + (w.pct == null ? '—' : w.pct + '%') + '</div>'
         +    '<div class="sla-trend-lbl">' + w.label + '</div>'
         + '</div>';
  });
  html += '</div></section>';
  return html;
}

// ── Specialist scorecard ────────────────────────────────────────
// Vista personal: cuánto cumpliste, en qué priorizás tu trabajo,
// cómo viene tu cadencia. 3 KPIs hero + 3 cards.
function _rEdAnalyticsSpecialist(D) {
  var v = $('vEdAnalytics'); if (!v) return;
  var name = (typeof _effectiveUserName === 'function') ? _effectiveUserName() : '';
  var firstName = name ? name.split(/\s+/)[0] : 'Vos';
  var allHist = ((D && D.historial) || []).filter(function(t){ return t.resp === name; });
  var myActive = ((D && D.tasks) || []).filter(function(t){ return t.resp === name && t.status !== 'Listo'; });
  var SLA = { 'Alta': 2, 'Media': 5, 'Baja': 7 };

  // Parsear historial → date + bizDays + onTime flag
  var entries = allHist.filter(function(t){ return t.creadoRaw && t.cerrado; }).map(function(t) {
    var p = t.cerrado.split('/');
    var cerradoDate = new Date(parseInt(p[2], 10), parseInt(p[1], 10) - 1, parseInt(p[0], 10));
    var biz = (typeof _bizDays === 'function') ? _bizDays(new Date(t.creadoRaw), cerradoDate) : null;
    var sla = SLA[t.priority] || 5;
    return {
      priority: t.priority || 'Media',
      cerradoMs: cerradoDate.getTime(),
      bizDays: biz,
      onTime: (biz != null) && (biz <= sla)
    };
  });

  // Hero stats
  var totalClosed = entries.length;
  var onTimeCount = entries.filter(function(e){ return e.onTime; }).length;
  var onTimePct = totalClosed > 0 ? Math.round((onTimeCount / totalClosed) * 100) : null;
  var me = ((D && D.team) || []).find(function(m){ return m.name === name; }) || {};
  var streak = (typeof me.streak === 'number') ? me.streak : 0;

  // Last 8 weeks: closed + on-time per week (week 0 = current, walk back)
  var nowMs = Date.now();
  var WEEK_MS = 7 * 24 * 60 * 60 * 1000;
  var weeks = [];
  for (var w = 7; w >= 0; w--) {
    var weekStart = nowMs - (w + 1) * WEEK_MS;
    var weekEnd   = nowMs - w * WEEK_MS;
    var inWeek = entries.filter(function(e){ return e.cerradoMs >= weekStart && e.cerradoMs < weekEnd; });
    var ontime = inWeek.filter(function(e){ return e.onTime; }).length;
    weeks.push({ count: inWeek.length, onTime: ontime, label: w === 0 ? 'hoy' : (w + 's') });
  }
  var maxWeek = weeks.reduce(function(m, w){ return Math.max(m, w.count); }, 0);

  // Priority mix (closed by priority)
  var byPrio = { 'Alta': 0, 'Media': 0, 'Baja': 0 };
  entries.forEach(function(e){ if (byPrio[e.priority] != null) byPrio[e.priority]++; });

  var ontimeCls = onTimePct == null ? '' : (onTimePct >= 90 ? 'good' : (onTimePct >= 75 ? 'warn' : 'crit'));

  var html = ''
    + '<div class="ed-eye">Mi desempeño</div>'
    + '<h1 class="ed-h1">Cómo <em>te está yendo</em>, ' + esc(firstName) + '.</h1>'
    + '<p class="ed-lede">'
    +   (totalClosed === 0
        ? 'Aún no cerraste tareas. Cuando empieces a cerrar, tus stats van a aparecer acá.'
        : 'Cerraste <b>' + totalClosed + (totalClosed === 1 ? ' tarea' : ' tareas') + '</b>'
          + (onTimePct != null ? ' con un <b>' + onTimePct + '% en tiempo</b>' : '')
          + '. ' + (myActive.length > 0 ? 'Actualmente tenés <b>' + myActive.length + ' activas</b>.' : 'No tenés tareas activas ahora.'))
    + '</p>'
    // Hero (3 KPIs)
    + '<div class="esp-hero">'
    +   '<div class="esp-stat"><div class="esp-stat-lbl">% en tiempo</div>'
    +     '<div class="esp-stat-num ' + ontimeCls + '">' + (onTimePct == null ? '—' : onTimePct + '%') + '</div>'
    +     '<div class="esp-stat-ctx">' + (totalClosed ? 'de ' + totalClosed + ' cerradas' : 'sin datos aún') + '</div></div>'
    +   '<div class="esp-stat"><div class="esp-stat-lbl">Cerradas total</div>'
    +     '<div class="esp-stat-num">' + (totalClosed || '—') + '</div>'
    +     '<div class="esp-stat-ctx">' + (totalClosed ? 'tareas completadas' : 'empezá a cerrar') + '</div></div>'
    +   '<div class="esp-stat"><div class="esp-stat-lbl">🔥 Racha actual</div>'
    +     '<div class="esp-stat-num good">' + (streak || '—') + '</div>'

function rEdResumen(D) {
  var v = $('vEdResumen'); if (!v) return;
  // Defensa adicional: si por alguna razón se llamó directo sin pasar por
  // goEd('paises'), validamos rol.
  var role = (typeof _effectiveRole === 'function') ? _effectiveRole() : 'specialist';
  if (role !== 'head') {
    v.innerHTML = ''
      + '<div class="ed-eye">Restringido</div>'
      + '<h1 class="ed-h1">Solo Global <em>puede ver esta vista</em>.</h1>'
      + '<p class="ed-lede">La vista <b>Por país</b> está reservada para el rol <b>Global</b>.</p>'
      + '<div style="margin-top:18px"><button class="ed-btn primary" onclick="goEd(\'home\')">Volver a Inicio →</button></div>';
    return;
  }

  var countries = (D && D.countries) || [];
  var allTasks  = (D && D.tasks) || [];
  var projects  = (D && D.projects) || [];

  // ── Hero KPIs (idéntica lógica que rEdHomeHQ para coherencia visual)
  var totalOpen    = allTasks.filter(function(t){ return t.status !== 'Listo'; }).length;
  var totalOverdue = countries.reduce(function(a, c){ return a + (c.overdue || 0); }, 0);
  var slaAvg = 0;
  if (countries.length) {
    var slaSum = countries.reduce(function(a, c){ return a + (c.slaPct || 0); }, 0);
    slaAvg = Math.round(slaSum / countries.length);
  }
  var atRiskCountries = countries.filter(function(c){
    return (c.overdue || 0) > 3 || (c.slaPct || 100) < 85;
  });
  var atRisk = atRiskCountries.length;

  // ── Lede narrativo derivado: países en riesgo + países brillando.
  var briefShine = countries
    .filter(function(c){ return (c.slaPct || 0) >= 95 && (c.overdue || 0) === 0; })
    .map(function(c){ return c.code || c.name; })
    .filter(Boolean)
    .slice(0, 3);
  var briefRisk = atRiskCountries
    .map(function(c){ return c.code || c.name; })
    .filter(Boolean)
    .slice(0, 3);
  var ledeParts = [];
  ledeParts.push('LATAM tiene <b>' + totalOpen + '</b> tareas activas');
  if (totalOverdue > 0) ledeParts.push('<span class="crit">' + totalOverdue + ' vencidas</span>');
  var lede = ledeParts.join(' · ') + '.';
  if (briefRisk.length) {
    lede += ' En riesgo: <span class="warn">' + briefRisk.map(esc).join(', ') + '</span>.';
  }
  if (briefShine.length) {
    lede += ' Brillando: <span class="good">' + briefShine.map(esc).join(', ') + '</span>.';
  }

  var sem = (D && D.semana) ? ('semana ' + D.semana) : '';
  var eyeBits = ['Por país', countries.length + (countries.length === 1 ? ' país activo' : ' países activos')];
  if (sem) eyeBits.push(sem);

  var html = '<div class="pa-page">';

  // Page header
  html += '<div class="pa-page-h">'
       +    '<span class="pa-page-title">Por país</span>'
       +    '<span class="pa-page-sub">' + countries.length + (countries.length === 1 ? ' país activo' : ' países activos') + (sem ? ' · ' + sem : '') + '</span>'
       + '</div>';

  if (lede) {
    html += '<div class="pa-narrative">' + lede + '</div>';
  }

  // KPIs
  html += '<div class="pa-kpis">'
       +    '<div class="pa-kpi">'
       +      '<div class="lab"><span class="dot" style="background:var(--info)"></span> Total LATAM</div>'
       +      '<div class="val">' + totalOpen + '</div>'
       +      '<div class="delta">' + countries.length + (countries.length === 1 ? ' país' : ' países') + '</div>'
       +    '</div>'
       +    '<div class="pa-kpi ' + (totalOverdue ? 'is-critical' : '') + '">'
       +      '<div class="lab"><span class="dot" style="background:var(--critical)"></span> Vencidas</div>'
       +      '<div class="val">' + totalOverdue + '</div>'
       +      '<div class="delta">' + (totalOverdue ? 'reasignar' : 'todo en orden') + '</div>'
       +    '</div>'
       +    '<div class="pa-kpi ' + (slaAvg >= 90 ? 'is-good' : '') + '">'
       +      '<div class="lab"><span class="dot" style="background:var(--good)"></span> SLA promedio</div>'
       +      '<div class="val">' + (slaAvg || '—') + (slaAvg ? '%' : '') + '</div>'
       +      '<div class="delta">LATAM</div>'
       +    '</div>'
       +    '<div class="pa-kpi ' + (atRisk ? 'is-warn' : '') + '">'
       +      '<div class="lab"><span class="dot" style="background:var(--warn)"></span> Países en riesgo</div>'
       +      '<div class="val">' + atRisk + '</div>'
       +      '<div class="delta">' + (atRisk ? 'monitorear' : 'todo OK') + '</div>'
       +    '</div>'
       + '</div>';

  // By country table
  html += '<div class="pa-section-h">'
       +    '<h3>Por país · detalle</h3>'
       +    '<span class="meta">click para filtrar tracker</span>'
       + '</div>';
  if (countries.length === 0) {
    html += paEmpty('globe', 'No hay datos de países disponibles.', 'Verificá que la hoja Equipos tenga al menos un país configurado.');
  } else {
    html += '<div class="pa-tbl">'
         +    '<div class="pa-tbl-h" style="grid-template-columns: 180px 1fr 80px 90px 90px 130px">'
         +      '<div>País</div><div>Líder</div><div>Activas</div><div>Vencidas</div><div>SLA mes</div><div>Tendencia 12s</div>'
         +    '</div>';
    countries.forEach(function(c) {
      var sla = c.slaPct || 0;
      var ovColor = (c.overdue || 0) > 3 ? 'var(--critical-fg)' : 'var(--fg-2)';
      var slaColor = sla < 90 ? 'var(--warn-fg)' : 'var(--good-fg)';
      var sparkTone = sla < 90 ? 'warn' : 'accent';
      var trend = c.trend || [3,4,5,4,6,5,7,6,5,4,5,4];
      html += '<div class="pa-tbl-r" style="grid-template-columns: 180px 1fr 80px 90px 90px 130px;height:52px" onclick="edSetCountryFilter(\'' + esc(c.code) + '\');goEd(\'tracker\')">'
           +    '<div style="display:flex;align-items:center;gap:10px">'
           +      '<span style="width:28px;height:20px;border-radius:4px;background:var(--bg-2);display:grid;place-items:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-1);font-weight:600">' + esc(c.code || '') + '</span>'
           +      '<span style="font-size:13px;font-weight:500">' + esc(c.name || '') + '</span>'
           +    '</div>'
           +    '<div style="display:flex;align-items:center;gap:8px">' + paAvatar(c.leader || '?', 22)
           +      '<span style="font-size:13px">' + esc(c.leader || '—') + '</span></div>'
           +    '<div class="mono" style="font-size:13px">' + (c.open || 0) + '</div>'
           +    '<div class="mono" style="font-size:13px;color:' + ovColor + '">' + (c.overdue || 0) + '</div>'
           +    '<div class="mono" style="font-size:13px;color:' + slaColor + '">' + (sla || '—') + (sla ? '%' : '') + '</div>'
           +    '<div>' + paSparkline(trend, 110, 28, sparkTone) + '</div>'
           + '</div>';
    });
    html += '</div>';
  }

  // ── Proyectos en riesgo (derivado de tasks; ordenado por % atrasadas).
  var risky = projects
    .filter(function(p){ return p.status !== 'Completado' && p.status !== 'Cancelado'; })
    .map(function(p) {
      var pTasks = allTasks.filter(function(t){ return t.proyectoId == p.id && t.status !== 'Listo'; });
      var overdue = pTasks.filter(function(t){
        return (typeof taskOverdueBySLA === 'function') ? taskOverdueBySLA(t) : false;
      }).length;
      var blocked = pTasks.filter(function(t){ return t.status === 'Bloqueado'; }).length;
      var total = pTasks.length;
      var pctOverdue = total > 0 ? (overdue / total) : 0;
      return { p: p, blocked: blocked, overdue: overdue, total: total, pct: pctOverdue };
    })
    .filter(function(x){ return x.overdue > 0; })
    .sort(function(a, b){
      if (b.pct !== a.pct) return b.pct - a.pct;
      return b.overdue - a.overdue;
    })
    .slice(0, 12);

  html += '<div class="pa-section-h">'
       +    '<h3>Proyectos en riesgo</h3>'
       +    '<span class="meta">ordenados por % vencidas</span>'
       + '</div>';
  if (!risky.length) {
    html += '<div class="pa-card" style="text-align:center;color:var(--good-fg);padding:18px"><b>Todo bajo control.</b> No hay proyectos en riesgo.</div>';
  } else {
    html += '<div class="pa-tbl">';
    risky.forEach(function(x) {
      var pais = x.p.pais || '—';
      var pctTxt = x.total > 0 ? Math.round(x.pct * 100) + '%' : '—';
      var pillTone = x.pct >= 0.5 ? 'pa-pill-alta' : (x.pct >= 0.25 ? 'pa-pill-media' : 'pa-pill-baja');
      html += '<div class="pa-tbl-r" style="grid-template-columns: 1fr 130px 80px 110px" onclick="goEd(\'tracker\')">'
           +    '<div class="title">'
           +      '<span class="t">' + esc(x.p.nombre || ('Proyecto #' + x.p.id)) + '</span>'
           +      '<span class="meta">' + esc(pais) + (x.p.responsable ? ' · ' + esc(x.p.responsable.split(' ').slice(0,2).join(' ')) : '') + ' · ' + x.total + ' activas</span>'
           +    '</div>'
           +    '<span class="pa-pill pa-pill-country">' + esc(pais) + '</span>'
           +    '<span class="mono" style="font-size:12px;color:var(--critical-fg)">' + x.overdue + ' venc.</span>'
           +    '<span class="pa-pill ' + pillTone + '"><span class="dot"></span>' + esc(pctTxt) + '</span>'
           + '</div>';
    });
    html += '</div>';
  }

  html += '</div>'; // pa-page
  v.innerHTML = html;
}

var EDCP = {

  values: {
    nombre: '',
    descripcion: '',
    pais: '',
    priority: 'Media',
    tipoTrabajo: '',
    riesgo: '',

// Líderes disponibles según rol y país elegido en paso 1.
// - head: todos los líderes de todos los equipos.
// - manager/specialist: el líder del país del usuario; si seleccionó otro país
//   (poco común, restringido por backend), se devuelve el del país elegido.
// Si no hay país elegido todavía: lista vacía.
function _crpLideres(paisCode) {
  var equipos = (D && D.equipos) || [];
  var role = (typeof _effectiveRole === 'function') ? _effectiveRole() : 'specialist';
  var out = [];
  var seen = {};
  function push(name) {
    if (name && !seen[name]) { seen[name] = 1; out.push(name); }
  }
  if (role === 'head') {
    equipos.forEach(function(eq){ push(eq && eq.leader); });
    return out;
  }
  // manager/specialist: prioritariamente el lider del pais elegido
  if (paisCode) {
    var eq = equipos.find(function(e){ return e && e.code === paisCode; });
    if (eq) {
      push(eq.leader);
      // Plus: cualquier otro miembro del país marcado como leader (caso multi-leader)
      (eq.members || []).forEach(function(m){
        if (m && m === eq.leader) push(m);
      });
    }
  }
  return out;
}

  return '<div class="cr-overlay" onclick="if(event.target===this)edCrearProyectoClose()">'
       +   '<div class="cr-backdrop" onclick="edCrearProyectoClose()"></div>'
       +   '<div class="cr-modal" role="dialog" aria-modal="true" aria-label="Crear proyecto">'
       +     '<div class="cr-head">'
       +       '<div>'
       +         '<div class="cr-eye">— Crear nuevo proyecto</div>'
       +         '<div class="cr-title">' + esc(titles[s] || '') + '</div>'
       +       '</div>'
       +       '<button type="button" class="cr-x" onclick="edCrearProyectoClose()" aria-label="Cerrar">×</button>'
       +     '</div>'
       +     '<div class="cr-steps">'
       +       '<div class="' + _crStepClasses(1, s) + '"><span class="cr-step-num">01</span> Esencial</div>'
       +       '<div class="' + _crStepClasses(2, s) + '"><span class="cr-step-num">02</span> Detalles</div>'
       +       '<div class="' + _crStepClasses(3, s) + '"><span class="cr-step-num">03</span> Confirmar</div>'
       +     '</div>'
       +     '<div class="cr-body">' + bodyHtml + '</div>'
       +     '<div class="cr-foot">'
       +       '<div class="cr-foot-info">' + (infos[s] || '') + '</div>'
       +       footBtns
       +     '</div>'
       +   '</div>'
       + '</div>';
}

function _crpMount() {
  var host = $('crpHost'); if (!host) return;
  host.innerHTML = _crpRender(EDCP.step);
}

function edCrearProyectoOpen() {
  EDCP.step = 1;
  EDCP.values = {
    nombre: '',
    descripcion: '',
    pais: '',
    priority: 'Media',
    tipoTrabajo: '',
    riesgo: '',
    lider: '',
    deadline: ''
  };
  // Restaurar borrador si tiene contenido útil
  try {
    var saved = localStorage.getItem('lt-edcp-draft');
    if (saved) {
      var v = JSON.parse(saved);
      if (v && (v.nombre || v.descripcion)) {
        EDCP.values = Object.assign(EDCP.values, v);
        if (typeof toast === 'function') toast('Restauré tu borrador anterior.', 'info');
      }
    }
  } catch(e){}
  _crpMount();
  setTimeout(function() {
    var input = $('crpNombre');
    if (input) input.focus();
  }, 60);
}

function edCrearProyectoClose() {
  EDCP.step = 1;
  var host = $('crpHost'); if (host) host.innerHTML = '';
}

function edCrearProyectoSetField(key, value) {
  if (!EDCP.values || !(key in EDCP.values)) return;
  EDCP.values[key] = value;
  // Si cambia el país, invalidar el líder elegido (puede ya no aplicar al nuevo país)
  if (key === 'pais') {
    var allowed = _crpLideres(value);
    if (EDCP.values.lider && allowed.indexOf(EDCP.values.lider) < 0) {
      EDCP.values.lider = '';
    }
  }
  try { localStorage.setItem('lt-edcp-draft', JSON.stringify(EDCP.values)); } catch(e){}
  // Re-render para pills (refleja activo) y cuando cambia país (recalcula select de líder)
  var rerenderFields = { pais: 1, priority: 1, tipoTrabajo: 1, riesgo: 1 };
  if (rerenderFields[key]) _crpMount();
}

function edCrearProyectoGoStep(n) {
  var v = EDCP.values;
  if (n > EDCP.step) {
    if (EDCP.step === 1) {
      if (!v.nombre || !v.nombre.trim()) { toast('Nombre requerido', 'error'); return; }
      if (!v.pais) { toast('Seleccioná un país', 'error'); return; }
      if (!v.priority) { toast('Seleccioná una prioridad', 'error'); return; }
    } else if (EDCP.step === 2) {
      if (!v.lider) { toast('Seleccioná un líder', 'error'); return; }
      if (!v.deadline) { toast('Plazo requerido', 'error'); return; }
    }
  }
  EDCP.step = n;
  _crpMount();
}

function edCrearProyectoSubmit() {
  var v = EDCP.values;
  if (!v.nombre || !v.nombre.trim()) { toast('Nombre requerido', 'error'); return; }
  if (!v.pais) { toast('País requerido', 'error'); return; }
  if (!v.lider) { toast('Líder requerido', 'error'); return; }
  var btn = $('crpSubmit'); if (btn) btn.disabled = true;
  if (typeof showLoader === 'function') showLoader();
  google.script.run
    .withSuccessHandler(function(res) {
      if (typeof hideLoader === 'function') hideLoader();
      if (btn) btn.disabled = false;
      if (res && res.success) {
        toast('Project #' + res.id + ' created', 'success');
        try { localStorage.removeItem('lt-edcp-draft'); } catch(e){}
        edCrearProyectoClose();
        if (typeof reload === 'function') reload();
      } else {
        toast('Error: ' + ((res && res.error) || 'desconocido'), 'error');
      }
    })
    .withFailureHandler(function(e) {
      if (typeof hideLoader === 'function') hideLoader();
      if (btn) btn.disabled = false;
      toast('Error: ' + (e && e.message || 'desconocido'), 'error');
    })
    .addProject({
      nombre: v.nombre.trim(),
      descripcion: (v.descripcion || '').trim(),
      responsable: v.lider || '',
      lider: v.lider || '',
      pais: v.pais || '',
      priority: v.priority || 'Media',
      tipoTrabajo: v.tipoTrabajo || '',
      riesgo: v.riesgo || '',
      deadline: v.deadline || '',
      status: 'Activo',
      notas: '',
      participantes: ''
    });
}

// ═══════════════════════════════════════════════════════════════
// BIBLIOTECA DE PLANTILLAS · feature nueva
// Plantillas aprobadas que precargan campos del wizard de Crear.

// Biblioteca de plantillas — datos vienen del backend (hoja 'Templates').
// Vacío hasta que tu equipo cree plantillas reales en el sheet.
// TODO: cargar via google.script.run.getTemplates() cuando el shape esté listo.
var TEMPLATES = [];
var CAT_TONE = { Contractual: 'accent', Privacy: 'info', Regulatorio: 'warn', Contencioso: 'critical', Operativo: 'dim' };

var EDPLT = { selectedId: 'TPL-001', filter: 'todas' };

function _paCatPill(cat) {
  var tone = CAT_TONE[cat] || 'dim';
  return '<span class="pa-pill" style="background:var(--' + tone + '-soft);color:var(--' + tone + '-fg)">' +
    '<span class="dot" style="background:var(--' + tone + ')"></span>' + esc(cat) + '</span>';
}
function _paApprovalPill(approved) {
  return approved
    ? '<span class="pa-pill pa-pill-good">' + paIcon('check', 10) + ' Aprobada</span>'
    : '<span class="pa-pill pa-pill-warn">' + paIcon('alert', 10) + ' En revisión</span>';
}

function rEdPlantillas(D) {
  var v = $('vEdPlantillas'); if (!v) return;
  var role = _effectiveRole();
  var userName = _effectiveUserName();

  // Empty state — hasta que existan plantillas reales en la hoja 'Templates'
  if (!TEMPLATES.length) {
    v.innerHTML = ''
      + '<div class="pa-page">'
      +   '<div class="pa-page-h">'
      +     '<span class="pa-page-title">Biblioteca</span>'
      +     '<span class="pa-page-sub">Plantillas aprobadas para crear tareas al toque</span>'
      +   '</div>'
      +   '<div style="margin-top:48px;padding:48px;border:1px dashed var(--line-2);border-radius:var(--r-3);text-align:center;background:var(--bg-1)">'
      +     '<div style="font-size:28px;opacity:.4;margin-bottom:8px">📚</div>'
      +     '<div style="font-size:14px;font-weight:600;color:var(--fg-1);margin-bottom:4px">Tu biblioteca está vacía</div>'
      +     '<div style="font-size:12px;color:var(--fg-3);max-width:420px;margin:0 auto;line-height:1.5">'
      +       'Acá van las plantillas aprobadas por el equipo legal. '
      +       'Para crear una, agregá filas a la hoja <span class="mono" style="background:var(--bg-2);padding:1px 5px;border-radius:3px">Templates</span> '
      +       'del spreadsheet (columnas: tipoTrabajo, checklist en JSON).'
      +     '</div>'
      +   '</div>'
      + '</div>';
    return;
  }
  var counts = {
    todas: TEMPLATES.length,
    Contractual: TEMPLATES.filter(function(t){ return t.cat === 'Contractual'; }).length,
    Privacy:     TEMPLATES.filter(function(t){ return t.cat === 'Privacy'; }).length,
    Regulatorio: TEMPLATES.filter(function(t){ return t.cat === 'Regulatorio'; }).length,
    Contencioso: TEMPLATES.filter(function(t){ return t.cat === 'Contencioso'; }).length,
    Operativo:   TEMPLATES.filter(function(t){ return t.cat === 'Operativo'; }).length,
    mias: TEMPLATES.filter(function(t){ return t.maintainer === userName; }).length,
    draft: TEMPLATES.filter(function(t){ return !t.approved; }).length
  };
  var visible = TEMPLATES.filter(function(t) {
    if (EDPLT.filter === 'todas') return true;
    if (EDPLT.filter === 'mias')  return t.maintainer === userName;
    if (EDPLT.filter === 'draft') return !t.approved;
    return t.cat === EDPLT.filter;
  });
  var sel = TEMPLATES.find(function(t){ return t.id === EDPLT.selectedId; }) || TEMPLATES[0];

  var canEdit = (role === 'manager' || role === 'head');

  var html = '<div style="display:grid;grid-template-columns:1fr 380px;height:100%;min-height:0">';
  html += '<div style="overflow:auto;padding:24px 28px 56px"><div style="max-width:none">';

  // Header
  html += '<div class="pa-page-h">'
       +    '<span class="pa-page-title">Biblioteca</span>'
       +    '<span class="pa-page-sub">' + TEMPLATES.length + ' plantillas · ' + (TEMPLATES.length - counts.draft) + ' aprobadas · ' + counts.draft + ' en revisión</span>'
       +    '<div class="pa-page-meta">'
       +      '<button class="pa-btn pa-btn-outline">' + paIcon('download', 12) + ' Exportar</button>'
       +      (canEdit ? '<button class="pa-btn pa-btn-primary">' + paIcon('plus', 12) + ' Nueva plantilla</button>' : '')
       +    '</div>'
       + '</div>';

  // Hero: most used this week
  html += '<div class="pa-section-h" style="margin-top:18px">'
       +    '<h3>Más usadas esta semana</h3>'
       +    '<span class="meta">Click para usar una directo</span>'
       + '</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:10px">';
  TEMPLATES.slice(0, 4).forEach(function(t) {
    html += '<div class="pa-card" style="padding:14px;cursor:pointer;position:relative" onclick="edPltSelect(\'' + esc(t.id) + '\')">'
         +    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
         +      _paCatPill(t.cat)
         +      '<span class="pa-pill pa-pill-country">' + esc(t.country) + '</span>'
         +    '</div>'
         +    '<div style="font-size:13px;font-weight:600;line-height:1.35;margin-bottom:4px">' + esc(t.name) + '</div>'
         +    '<div style="font-size:11px;color:var(--fg-3)">'
         +      '<span class="mono">' + t.usage30d + '</span> usos · ' + esc(t.last)
         +    '</div>'
         +    '<button class="pa-btn pa-btn-icon" style="position:absolute;top:8px;right:8px;width:22px;height:22px" onclick="event.stopPropagation();edPltCreateFromTemplate(\'' + esc(t.id) + '\')" title="Usar plantilla">'
         +      paIcon('arrowR', 11)
         +    '</button>'
         + '</div>';
  });
  html += '</div>';

  // Filters
  function fchip(key, label, count, tone) {
    var cls = 'pa-chip';
    if (tone === 'warn') cls += ' is-warn';
    if (EDPLT.filter === key) cls += ' is-active';
    return '<div class="' + cls + '" onclick="edPltSetFilter(\'' + key + '\')">' + esc(label) + ' <span class="ct">' + count + '</span></div>';
  }
  html += '<div class="pa-filterbar" style="margin-top:22px">'
       +    fchip('todas', 'Todas', counts.todas)
       +    '<div class="pa-chip-divider"></div>'
       +    fchip('Contractual', 'Contractual', counts.Contractual)
       +    fchip('Privacy', 'Privacy', counts.Privacy)
       +    fchip('Regulatorio', 'Regulatorio', counts.Regulatorio)
       +    fchip('Contencioso', 'Contencioso', counts.Contencioso)
       +    fchip('Operativo', 'Operativo', counts.Operativo)
       +    '<div class="pa-chip-divider"></div>'
       +    fchip('mias', 'Las mías', counts.mias)
       +    fchip('draft', 'En revisión', counts.draft, 'warn')
       +    '<div style="margin-left:auto"><div class="pa-search" style="width:200px"><input type="text" placeholder="Buscar plantilla…"></div></div>'
       + '</div>';

  // Table
  html += '<div class="pa-tbl">'
       +    '<div class="pa-tbl-h" style="grid-template-columns: 20px 1fr 120px 80px 130px 100px 70px 80px">'
       +      '<div></div><div>Plantilla</div><div>Categoría</div><div>País</div><div>Maintainer</div><div>Estado</div><div>Usos 30d</div><div>Actualizada</div>'
       +    '</div>';
  visible.forEach(function(t) {
    var isSel = t.id === sel.id;
    html += '<div class="pa-tbl-r' + (isSel ? ' is-selected' : '') + '" style="grid-template-columns: 20px 1fr 120px 80px 130px 100px 70px 80px;height:50px" onclick="edPltSelect(\'' + esc(t.id) + '\')">'
         +    '<span style="display:grid;place-items:center;color:' + (t.fav ? 'var(--warn)' : 'var(--fg-4)') + '">' + paIcon('star', 12) + '</span>'
         +    '<div class="title"><span class="t" style="font-weight:500">' + esc(t.name) + '</span><span class="meta">' + esc(t.desc) + '</span></div>'
         +    '<span>' + _paCatPill(t.cat) + '</span>'
         +    '<span class="pa-pill pa-pill-country">' + esc(t.country) + '</span>'
         +    '<span style="display:flex;align-items:center;gap:6px">' + paAvatar(t.maintainer, 18) + '<span style="font-size:12px">' + esc(t.maintainer.split(' ')[0]) + '</span></span>'
         +    '<span>' + _paApprovalPill(t.approved) + '</span>'
         +    '<span class="mono" style="font-size:12px;color:var(--fg-2)">' + t.usage30d + '</span>'
         +    '<span style="font-size:11px;color:var(--fg-3)">' + esc(t.last) + '</span>'
         + '</div>';
  });
  html += '</div>';

  html += '</div></div>'; // close left column

  // Right drawer
  html += '<aside style="border-left:1px solid var(--line-1);background:var(--bg-1);display:flex;flex-direction:column;min-height:0;overflow:auto">';
  if (sel) {
    html += '<div style="padding:16px 18px 14px;border-bottom:1px solid var(--line-1)">'
         +    '<div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--fg-3)">'
         +      '<span class="mono">' + esc(sel.id) + '</span><span>·</span>'
         +      _paCatPill(sel.cat)
         +      '<span class="pa-pill pa-pill-country">' + esc(sel.country) + '</span>'
         +      '<span style="margin-left:auto">' + paIcon('more', 13) + '</span>'
         +    '</div>'
         +    '<div style="margin-top:10px">' + _paApprovalPill(sel.approved) + '</div>'
         +    '<h2 style="margin:10px 0 6px;font-size:19px;font-weight:600;letter-spacing:-0.015em;line-height:1.25">' + esc(sel.name) + '</h2>'
         +    '<p style="margin:0;font-size:13px;color:var(--fg-2);line-height:1.5">' + esc(sel.desc) + '</p>'
         + '</div>';
    // Stats
    html += '<div style="padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;border-bottom:1px solid var(--line-1)">'
         +    '<div><div style="font-size:10px;color:var(--fg-3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Usos en 30d</div>'
         +    '<div class="mono" style="font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-top:2px">' + sel.usage30d + '</div></div>'
         +    '<div><div style="font-size:10px;color:var(--fg-3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Cierre promedio</div>'
         +    '<div class="mono" style="font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-top:2px">4.2 <span style="font-size:12px;color:var(--fg-3);font-weight:400">días</span></div></div>'
         + '</div>';
    // Precarga
    html += '<div style="padding:14px 18px;border-bottom:1px solid var(--line-1)">'
         +    '<div style="font-size:10px;color:var(--fg-3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Va a precargar</div>';
    var fields = [
      { l: 'Tipo de trabajo', v: sel.cat, edit: false },
      { l: 'Prioridad', v: 'Media', edit: true },
      { l: 'SLA objetivo', v: '5 días hábiles', edit: true },
      { l: 'Confidencialidad', v: 'Restringido', edit: false },
      { l: 'Líder por defecto', v: 'Manager del país', edit: true }
    ];
    fields.forEach(function(f, i) {
      html += '<div style="display:grid;grid-template-columns:120px 1fr 14px;align-items:center;padding:7px 0;border-top:' + (i ? '1px solid var(--line-1)' : '0') + ';font-size:12px">'
           +    '<span style="color:var(--fg-3)">' + esc(f.l) + '</span>'
           +    '<span style="color:var(--fg-1)">' + esc(f.v) + '</span>'
           +    '<span style="color:var(--fg-4)" title="' + (f.edit ? 'Editable al usar' : 'Bloqueado') + '">' + paIcon(f.edit ? 'spark' : 'lock', 10) + '</span>'
           + '</div>';
    });
    html += '<div style="font-size:10px;color:var(--fg-3);margin-top:8px;display:flex;gap:10px">'
         +    '<span>' + paIcon('spark', 9) + ' editable al usar</span>'
         +    '<span>' + paIcon('lock', 9) + ' bloqueado por aprobación</span>'
         + '</div>'
         + '</div>';
    // Maintainer
    html += '<div style="padding:14px 18px;flex:1">'
         +    '<div style="font-size:10px;color:var(--fg-3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Maintainer</div>'
         +    '<div style="display:flex;align-items:center;gap:10px">' + paAvatar(sel.maintainer, 28)
         +      '<div><div style="font-size:13px;font-weight:500">' + esc(sel.maintainer) + '</div>'
         +      '<div style="font-size:11px;color:var(--fg-3)">Aprobada · próxima revisión jul 2026</div></div>'
         +    '</div>'
         + '</div>';
    // Actions
    html += '<div style="padding:14px;border-top:1px solid var(--line-1);display:flex;flex-direction:column;gap:6px">'

         + '</div>';
  }
  html += '</aside>';
  html += '</div>'; // close grid

  v.innerHTML = html;
}

function edPltSelect(id) {
  EDPLT.selectedId = id;
  rEdPlantillas(D);
}
function edPltSetFilter(key) {
  EDPLT.filter = key;
  rEdPlantillas(D);
}
function edPltCreateFromTemplate(id) {
  var t = TEMPLATES.find(function(x){ return x.id === id; });
  if (!t) return;
  // Por ahora: abrir el wizard de Crear con un toast indicando la plantilla
  if (typeof toast === 'function') toast('Plantilla "' + t.name + '" cargada', 'info');
  if (typeof edCrearOpen === 'function') edCrearOpen();
}
