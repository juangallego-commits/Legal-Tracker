// ─── PANEL DETALLE: TABS DE COMENTARIOS Y DOCUMENTOS ───────────
// Switch entre paneles "Comentarios" y "Documentos" en el right rail
// del task panel. Solo uno visible a la vez. Por default arranca en
// Comentarios. El click marca el tab activo + muestra/oculta los panes.
function edTkPanelSwitchTab(btn) {
  if (!btn) return;
  var pane = btn.dataset.pane;
  var tabs = btn.parentNode;
  if (!tabs) return;
  // Toggle is-active en tabs
  var allTabs = tabs.querySelectorAll('.tk-panel-tab');
  for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove('is-active');
  btn.classList.add('is-active');
  // Mostrar/ocultar panes (.tk-pane) bajo el rail-body
  var rail = tabs.nextElementSibling;
  if (!rail) return;
  var panes = rail.querySelectorAll('.tk-pane');
  for (var j = 0; j < panes.length; j++) {
    panes[j].style.display = (panes[j].dataset.pane === pane) ? '' : 'none';
  }
  // El input de comentarios solo tiene sentido en el pane de comments
  var input = document.querySelector('.tk-panel-rail-input');
  if (input) input.style.display = (pane === 'comments') ? '' : 'none';
}

// ─── COMMENTS THREAD DEL PANEL ──────────────────────────────────
// Lazy-load: cuando el panel se renderea, se llama edPanelLoadComments
// con el taskId para fetch async. Antes muestra "Loading…", al
// terminar reemplaza con el hilo. El input es textarea + Send button.
// Cmd+Enter envía. Optimistic: el comment aparece al instante en el
// thread mientras el server confirma.
function edPanelLoadComments(taskId) {
  if (!taskId) return;
  var host = $('tkComments'); if (!host) return;
  google.script.run
    .withSuccessHandler(function(comments) {
      _edPanelRenderComments(comments || [], taskId);
      // Bind Cmd+Enter en el textarea
      var ta = $('tkCommentInput');
      if (ta) {
        ta.onkeydown = function(e) {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            edPanelSubmitComment(taskId);
          }
        };
      }
    })
    .withFailureHandler(function(e) {
      console.error('getTaskComments failure', e);
      host.innerHTML = '<div class="tk-comments-empty">No se pudieron cargar los comentarios. Recargá para reintentar.</div>';
    })
    .getTaskComments(taskId);
}
function _edPanelRenderComments(comments, taskId) {
  var host = $('tkComments'); if (!host) return;
  // Actualizar el count en la tab "Comentarios · N"
  var countSpan = $('tkCommentsCount');
  if (countSpan) countSpan.textContent = '· ' + comments.length;
  if (!comments.length) {
    host.innerHTML = '<div class="tk-comments-empty">Aún no hay comentarios. Iniciá la conversación.</div>';
    return;
  }
  var meEmail = (USER && USER.email) || (D && D._user && D._user.email) || '';
  var html = '';
  comments.forEach(function(c) {
    var when = _commentRelativeTime(c.ts);
    var initials = (c.author_name || '?').split(/\s+/).slice(0, 2).map(function(w){ return (w[0] || '').toUpperCase(); }).join('') || '?';
    var mine = c.author_email && (c.author_email === meEmail);
    html += '<div class="tk-comment-item' + (mine ? ' mine' : '') + '">'
         +    '<div class="tk-comment-av" title="' + esc(c.author_name || c.author_email || '') + '">' + esc(initials) + '</div>'
         +    '<div class="tk-comment-body">'
         +      '<div class="tk-comment-head">'
         +        '<span class="tk-comment-author">' + esc(c.author_name || c.author_email || 'Unknown') + '</span>'
         +        '<span class="tk-comment-when">' + esc(when) + '</span>'
         +      '</div>'
         +      '<div class="tk-comment-text">' + esc(c.body || '').replace(/\n/g, '<br>') + '</div>'
         +    '</div>'
         + '</div>';
  });
  host.innerHTML = html;
}
function _commentRelativeTime(iso) {
  if (!iso) return '';
  var ms = new Date(iso).getTime();
  if (isNaN(ms)) return iso;
  return _relativeAgo(ms);
}
function edPanelSubmitComment(taskId) {
  var ta = $('tkCommentInput'); if (!ta) return;
  var body = (ta.value || '').trim();
  if (!body) { toast('Escribí un comentario primero', 'error'); return; }
  var btn = $('tkCommentSubmit');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar'; }
      if (res && res.success && res.comment) {
        // Append optimistically al thread
        var host = $('tkComments');
        if (host) {
          // Si era el primer comment, reemplazamos el empty state
          if (host.querySelector('.tk-comments-empty')) host.innerHTML = '';
          var c = res.comment;
          var when = _commentRelativeTime(c.ts);
          var initials = (c.author_name || '?').split(/\s+/).slice(0, 2).map(function(w){ return (w[0] || '').toUpperCase(); }).join('') || '?';
          var div = document.createElement('div');
          div.className = 'tk-comment-item mine new';
          div.innerHTML = ''
            + '<div class="tk-comment-av">' + esc(initials) + '</div>'
            + '<div class="tk-comment-body">'
            +   '<div class="tk-comment-head">'
            +     '<span class="tk-comment-author">' + esc(c.author_name || 'Vos') + '</span>'
            +     '<span class="tk-comment-when">hace un momento</span>'
            +   '</div>'
            +   '<div class="tk-comment-text">' + esc(c.body || '').replace(/\n/g, '<br>') + '</div>'
            + '</div>';
          host.appendChild(div);
          host.scrollTop = host.scrollHeight;
        }
        ta.value = '';
        toast('Comentario enviado', 'success');
      } else {
        toast('Error: ' + ((res && res.error) || 'no se pudo enviar'), 'error');
      }
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar'; }
      console.error('addTaskComment failure', e);
      toast('Error del backend: ' + (e && e.message || 'desconocido'), 'error');
    })
    .addTaskComment(taskId, body);
}

function _buildEdTimeline(t) {
  // Timeline sintética desde campos disponibles. No tocamos backend en Fase 1.
  var items = [];
  if (typeof t.etaDays === 'number' && t.etaDays < 0) {
    items.push({ when: 'Hoy', what: 'Marcada como <b>vencida</b>. Revisá la siguiente acción.', dot: 'crit' });
  } else if (t.etaDays === 0) {
    items.push({ when: 'Hoy', what: '<b>Vence hoy.</b> Cerrar antes de fin de día.', dot: 'crit' });
  }
  if (t.status === 'Bloqueado' && t.blockedReason) {
    items.push({ when: '—', what: 'Estado: <b>Bloqueada</b> · ' + esc(t.blockedReason), dot: 'crit' });
  }
  if (t.cerrado) {
    items.push({ when: t.cerrado, what: 'Tarea <b>cerrada</b>.', dot: 'good' });
  }
  if (t.creado) {
    items.push({ when: t.creado, what: 'Tarea creada' + (t.resp ? ' · asignada a <b>' + esc(t.resp) + '</b>' : ''), dot: 'info' });
  }
  if (items.length === 0) {
    items.push({ when: '—', what: 'Sin actividad registrada.', dot: 'info' });
  }
  return items;
}

// HQ countries-first landing for the global tracker. Grid de países
// con KPIs clave + sparkline. Click → drill-down al tracker filtrado.
function _rEdTrackerHQCountries(D, v) {
  var countries = (D && D.countries) || [];
  var allTasks = (D && D.tasks) || [];
  var totalOpen   = allTasks.filter(function(t){ return t.status !== 'Listo'; }).length;
  var totalOver   = countries.reduce(function(a, c){ return a + (c.overdue || 0); }, 0);
  var totalAtRisk = countries.filter(function(c){ return (c.overdue || 0) > 3 || (c.slaPct || 100) < 85; }).length;
  var slaAvg = 0;
  if (countries.length) {
    var slaSum = countries.reduce(function(a, c){ return a + (c.slaPct || 0); }, 0);
    slaAvg = Math.round(slaSum / countries.length);
  }
  // Sort: worst first (overdue desc, then sla asc)
  var sorted = countries.slice().sort(function(a, b) {
    var dOv = (b.overdue || 0) - (a.overdue || 0);
    if (dOv !== 0) return dOv;
    return (a.slaPct || 0) - (b.slaPct || 0);
  });
  // Max trend value across all countries for sparkline normalization
  var maxTrend = 1;
  countries.forEach(function(c) {
    (c.trend || []).forEach(function(n){ if (n > maxTrend) maxTrend = n; });
  });

  var html = ''
    + '<div class="ed-eye">Tracker global · ' + countries.length + ' países</div>'
    + '<h1 class="ed-h1" style="margin-bottom:8px">LATAM <em>de un vistazo</em>.</h1>'
    + '<p class="ed-lede" style="margin-bottom:28px"><b>' + totalOpen + '</b> tareas activas en <b>' + countries.length + '</b> países'
    +   (totalOver ? '. <span class="crit">' + totalOver + ' vencidas</span> ahora mismo' : '')
    +   '. Elegí un país para entrar al detalle o saltá a todos los países.</p>';

  // Hero summary band (4 KPIs)
  html += '<div class="hq-summary-band">'
       +    '<div class="hq-summary-stat"><div class="lbl">Activas</div><div class="num">' + (totalOpen || '—') + '</div><div class="ctx">en LATAM</div></div>'
       +    '<div class="hq-summary-stat"><div class="lbl">Vencidas</div><div class="num crit">' + (totalOver || '—') + '</div><div class="ctx">' + (totalOver ? 'reasignar' : 'todo en orden') + '</div></div>'
       +    '<div class="hq-summary-stat"><div class="lbl">SLA promedio</div><div class="num good">' + (slaAvg ? slaAvg + '%' : '—') + '</div><div class="ctx">en tiempo</div></div>'
       +    '<div class="hq-summary-stat"><div class="lbl">En riesgo</div><div class="num crit">' + (totalAtRisk || '—') + '</div><div class="ctx">' + (totalAtRisk ? 'monitorear' : 'sin riesgo') + '</div></div>'
       + '</div>';

  // Quick action: jump to all-tasks tracker (skip the countries-first)
  html += '<div class="hq-quick-actions">'
       +    '<button class="ed-btn" onclick="edSetCountryFilter(\'__ALL__\')">Ver todos los países juntos →</button>'
       + '</div>';

  // Country grid header
  html += '<section class="ed-section">'
       +    '<div class="ed-h2">— Países</div>';

  if (!sorted.length) {
    html += '<div class="ed-lede">No hay datos de países disponibles.</div></section>';
    v.innerHTML = html;
    return;
  }

  html += '<div class="hq-country-grid">';
  sorted.forEach(function(c) {
    var sla = c.slaPct == null ? null : c.slaPct;
    var slaCls = sla == null ? 'dim' : (sla >= 90 ? 'good' : (sla >= 75 ? 'warn' : 'crit'));
    var ovCls = (c.overdue || 0) > 3 ? 'crit' : ((c.overdue || 0) > 0 ? 'warn' : '');
    var atRisk = (c.overdue || 0) > 3 || (sla != null && sla < 85);
    var trend = c.trend || [];
    // Build sparkline polyline
    var sparkSvg = '<svg class="hq-card-spark" viewBox="0 0 100 28" preserveAspectRatio="none">';
    if (trend.length > 1) {
      var pts = trend.map(function(n, i) {
        var x = (i / (trend.length - 1)) * 100;
        var y = 28 - (n / maxTrend) * 26 - 1;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      sparkSvg += '<polyline points="' + pts + '" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>';
    }
    sparkSvg += '</svg>';
    var leader = c.leader || c.lider || '—';
    var name = c.name || c.code || '—';

    html += '<div class="hq-card ' + (atRisk ? 'at-risk' : '') + '" onclick="edSetCountryFilter(\'' + esc(c.code || '') + '\')" tabindex="0" role="button" '
         +    'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();edSetCountryFilter(\'' + esc(c.code || '') + '\');}" aria-label="Entrar a ' + esc(name) + '">'
         +    '<div class="hq-card-head">'
         +      '<div class="hq-card-flag">' + esc(c.code || '??') + '</div>'
         +      '<div class="hq-card-meta">'
         +        '<div class="hq-card-name">' + esc(name) + '</div>'
         +        '<div class="hq-card-lead">' + esc(leader) + '</div>'
         +      '</div>'
         +      (atRisk ? '<div class="hq-card-flag-risk" title="En riesgo">⚠</div>' : '')
         +    '</div>'
         +    '<div class="hq-card-stats">'
         +      '<div class="hq-card-stat"><div class="num">' + (c.open || 0) + '</div><div class="lbl">Activas</div></div>'
         +      '<div class="hq-card-stat"><div class="num ' + ovCls + '">' + (c.overdue || 0) + '</div><div class="lbl">Vencidas</div></div>'
         +      '<div class="hq-card-stat"><div class="num ' + slaCls + '">' + (sla == null ? '—' : sla + '%') + '</div><div class="lbl">SLA</div></div>'
         +    '</div>'
         +    '<div class="hq-card-spark-wrap ' + slaCls + '">'
         +      '<span class="hq-card-spark-lbl">Throughput de 12 semanas</span>'
         +      sparkSvg
         +    '</div>'
         +    '<div class="hq-card-cta">Entrar →</div>'
         + '</div>';
  });
  html += '</div></section>';

  v.innerHTML = html;
}

function rEdTracker(D) {
  var v = $('vEdTracker'); if (!v) return;
  var role = _effectiveRole();
  var userName = _effectiveUserName();
  var userCode = _effectiveUserCode();
  var allTasks = (D && D.tasks) || [];

  if (role === 'head' && !EDT.country && !EDT.selectedId && !EDT.skipCountriesView) {
    return _rEdTrackerHQCountries(D, v);
  }

  var roleTasks = _edFilterByRole(allTasks, role, userName, userCode);

  var cAll      = roleTasks.filter(function(t){ return t.status !== 'Listo'; }).length;
  var cOverdue  = roleTasks.filter(function(t){ return typeof t.etaDays === 'number' && t.etaDays < 0 && t.status !== 'Listo'; }).length;
  var cToday    = roleTasks.filter(function(t){ return t.etaDays === 0 && t.status !== 'Listo'; }).length;
  var cBlocked  = roleTasks.filter(function(t){ return t.status === 'Bloqueado'; }).length;
  var cMine     = roleTasks.filter(function(t){ return t.resp === userName && t.status !== 'Listo'; }).length;
  var cAlta     = roleTasks.filter(function(t){ return t.priority === 'Alta' && t.status !== 'Listo'; }).length;

  var rows = _edApplySearch(_edApplySecondaryFilters(_edApplyFilter(roleTasks, EDT.filter)), EDT.search);
  rows = _edSortByUrgency(rows);

  var sel = EDT.selectedId ? rows.find(function(t){ return t.id == EDT.selectedId; }) || roleTasks.find(function(t){ return t.id == EDT.selectedId; }) : null;

  var scopeLabel;
  if (EDT.country) scopeLabel = EDT.country;
  else if (role === 'head') scopeLabel = 'Global';
  else if (role === 'manager') scopeLabel = 'Equipo ' + (userCode || '');
  else scopeLabel = 'Tus tareas';

  var html = '<div class="pa-page" style="max-width:1280px">';

  // Page header
  html += '<div class="pa-page-h">'
       +    '<span class="pa-page-title">Tracker</span>'
       +    '<span class="pa-page-sub">' + cAll + ' tareas activas · ' + esc(scopeLabel) + '</span>'
       +    '<div class="pa-page-meta">';
  if (role === 'head' && (EDT.country || EDT.skipCountriesView)) {
    html += '<button class="pa-btn pa-btn-outline" onclick="edClearCountryFilter()">' + paIcon('arrowR', 12, '', 'transform:rotate(180deg)') + ' Volver a países</button>';
  }
  if (role === 'manager' || role === 'head') {
    html += '<button class="pa-btn pa-btn-outline" onclick="edExportMenuToggle(event)" id="edExportBtn">' + paIcon('download', 12) + ' Exportar</button>';
    html += '<div class="dd-menu" id="edExportMenu" style="display:none;position:absolute;right:32px;top:90px;min-width:220px">'
         +    '<button class="dd-item" onclick="exportToXLSX()">' + paIcon('download', 13, 'ico') + ' Excel (vista actual)</button>'
         +    '<button class="dd-item" onclick="edExportPDFOpen()">' + paIcon('doc', 13, 'ico') + ' PDF mensual</button>'
         + '</div>';
  }
  html += '</div></div>';

  // Filter chips
  function chip(key, label, count, tone, active) {
    var cls = 'pa-chip';
    if (tone === 'critical') cls += ' is-critical';
    if (tone === 'warn') cls += ' is-warn';
    if (active) cls += ' is-active';
    return '<div class="' + cls + '" onclick="edSetFilter(\'' + key + '\')">' + esc(label) + ' <span class="ct">' + count + '</span></div>';
  }

  html += '<div class="pa-filterbar">'
       +    chip('all',     'Todas',         cAll,     null,       EDT.filter === 'all')
       +    chip('overdue', 'Vencidas',      cOverdue, 'critical', EDT.filter === 'overdue')
       +    chip('today',   'Vencen hoy',    cToday,   'warn',     EDT.filter === 'today')
       +    chip('blocked', 'Bloqueadas',    cBlocked, null,       EDT.filter === 'blocked')
       +    chip('alta',    'Prioridad alta',cAlta,    null,       EDT.filter === 'alta')
       +    '<div class="pa-chip-divider"></div>'
       +    chip('mine',    'Asignadas a mí',cMine,    null,       EDT.filter === 'mine')
       +    '<div style="margin-left:auto;display:flex;gap:6px;align-items:center">'
       +      '<div class="pa-search" style="width:220px">'
       +        paIcon('search', 12)
       +        '<input type="text" placeholder="Buscar en tracker…" value="' + esc(EDT.search) + '" oninput="edSetSearch(this.value)">'
       +      '</div>';
  // Country select (head only): drill-down rápido país-por-país sin volver al countries-first.
  if (role === 'head') {
    var allCountries = (D && D.countries) || [];
    var countryOpts = allCountries
      .slice()
      .sort(function(a, b){ return (b.open || 0) - (a.open || 0); })
      .map(function(c) {
        var selA = (EDT.country === c.code) ? ' selected' : '';
        var label = c.code + ' · ' + (c.name || c.code) + (c.open ? ' (' + c.open + ')' : '');
        return '<option value="' + esc(c.code) + '"' + selA + '>' + esc(label) + '</option>';
      }).join('');
    if (countryOpts) {
      html += '<select class="pa-select" style="width:auto;height:26px;font-size:12px;padding:0 28px 0 10px" onchange="edSetCountryFilter(this.value || \'__ALL__\')">'
           +    '<option value="">Todos los países</option>' + countryOpts
           + '</select>';
    }
  }
  // Project select
  var pIdsWithTasks = {};
  roleTasks.forEach(function(t){ if (t.proyectoId) pIdsWithTasks[t.proyectoId] = true; });
  var projOpts = (D && D.projects || [])
    .filter(function(p){ return pIdsWithTasks[p.id]; })
    .sort(function(a,b){ return (a.nombre || '').localeCompare(b.nombre || ''); })
    .map(function(p) {
      var selAttr = (String(EDT.projectFilter || '') === String(p.id)) ? ' selected' : '';
      return '<option value="' + esc(p.id) + '"' + selAttr + '>' + esc(p.nombre || '#' + p.id) + '</option>';
    }).join('');
  if (projOpts) {
    html += '<select class="pa-select" style="width:auto;height:26px;font-size:12px;padding:0 28px 0 10px" onchange="edSetProjectFilter(this.value)">'
         +    '<option value="">Todos los proyectos</option>' + projOpts
         + '</select>';
  }
  html += '</div></div>';

  // Active secondary filters
  if (EDT.projectFilter || EDT.respFilter || EDT.confFilter) {
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px;align-items:center">';
    if (EDT.projectFilter) {
      var pName2 = (D && D.projects || []).find(function(p){ return String(p.id) === String(EDT.projectFilter); });
      var pLbl2 = pName2 ? pName2.nombre : ('#' + EDT.projectFilter);
      html += '<span class="pa-pill pa-pill-tipo">Proyecto: ' + esc(pLbl2) + ' <span style="cursor:pointer;margin-left:4px" onclick="edSetProjectFilter(null)">×</span></span>';
    }
    if (EDT.respFilter) {
      html += '<span class="pa-pill pa-pill-tipo">Resp: ' + esc(EDT.respFilter) + ' <span style="cursor:pointer;margin-left:4px" onclick="edSetRespFilter(null)">×</span></span>';
    }
    if (EDT.confFilter) {
      var cfMeta3 = (typeof ED_CONF_LEVELS !== 'undefined' && ED_CONF_LEVELS[EDT.confFilter]) || { label: EDT.confFilter };
      html += '<span class="pa-pill pa-pill-tipo">Conf: ' + esc(cfMeta3.label) + ' <span style="cursor:pointer;margin-left:4px" onclick="edSetConfFilter(null)">×</span></span>';
    }
    html += '<button class="pa-btn pa-btn-ghost" style="font-size:11px;height:22px" onclick="edClearSecondaryFilters()">Limpiar</button>';
    html += '</div>';
  }

  // Bulk action bar
  var bulkCount = (EDT.selectedIds || []).length;
  var canReassign = (role === 'manager' || role === 'head');
  if (bulkCount > 0) {
    html += '<div class="pa-bulkbar">'
         +    paIcon('check', 13)
         +    '<b style="font-weight:600">' + bulkCount + ' seleccionada' + (bulkCount > 1 ? 's' : '') + '</b>'
         +    '<span style="color:var(--fg-3);font-size:12px">·</span>'
         +    '<button class="pa-btn" onclick="edTkBulkAction(\'avanzar\')">' + paIcon('arrowR', 12) + ' Avanzar</button>'
         +    '<button class="pa-btn" onclick="edTkBulkAction(\'bloquear\')">' + paIcon('block', 12) + ' Bloquear</button>'
         +    (canReassign ? '<button class="pa-btn" onclick="edTkBulkAction(\'reasignar\')">' + paIcon('users', 12) + ' Reasignar</button>' : '')
         +    '<button class="pa-btn pa-btn-ghost" style="margin-left:auto;color:var(--fg-2)" onclick="edTkBulkClear()">Cancelar</button>'
         + '</div>';
  }

  // TABLE
  var totalRows = rows.length;
  var selN = (EDT.selectedIds || []).length;
  var masterCls = 'pa-check';
  if (totalRows > 0 && selN === totalRows) masterCls += ' is-checked';
  else if (selN > 0) masterCls += ' is-indeterminate';
  var masterTitle = (selN === totalRows && totalRows > 0) ? 'Deseleccionar todo' : 'Seleccionar todo';
  html += '<div class="pa-tbl">'
       +    '<div class="pa-tbl-h">'
       +      '<div onclick="edTkMasterToggle()" title="' + masterTitle + '" style="cursor:pointer;display:grid;place-items:center"><span class="' + masterCls + '"></span></div>'
       +      '<div title="Confidencialidad" aria-label="Confidencialidad"></div>'
       +      '<div>ID ' + paIcon('sort', 10) + '</div>'
       +      '<div>Tarea</div>'
       +      '<div>' + (role === 'specialist' ? 'Proyecto' : 'Responsable') + '</div>'
       +      '<div>Prioridad</div>'
       +      '<div>Estado</div>'
       +      '<div>ETA ' + paIcon('sort', 10) + '</div>'
       +    '</div>';
  if (rows.length === 0) {
    var emptyIc = cAll === 0 ? 'inbox' : 'search';
    var emptyMsg, emptyHint;
    if (cAll === 0) {
      emptyMsg = role === 'specialist' ? 'No tenés tareas activas en tu agenda.' : 'No hay tareas activas que trackear.';
      emptyHint = role === 'specialist' ? 'Aprovechá para trabajo de proyecto.' : 'Creá una tarea para empezar.';
    } else if (EDT.search) {
      emptyMsg = 'No hay tareas que coincidan con "' + esc(EDT.search) + '".';
      emptyHint = 'Probá con menos filtros o limpiá la búsqueda.';
    } else {
      emptyMsg = 'No hay tareas en este filtro.';
      emptyHint = 'Cambiá a "Todas" para ver todo.';
    }
    // CTA: si está vacío porque no hay tareas (no por filtros), invitar
    // a crear la primera. Si está vacío por filtros/search, ofrecer limpiar.
    var ctaBtn = '';
    if (cAll === 0) {
      ctaBtn = '<button class="pa-btn pa-btn-primary" onclick="edCrearOpen()" style="margin-top:6px">' + paIcon('plus', 12) + ' Crear tu primera tarea</button>';
    } else if (EDT.search || EDT.filter !== 'all' || EDT.projectFilter || EDT.respFilter || EDT.confFilter) {
      ctaBtn = '<button class="pa-btn pa-btn-outline" onclick="edClearSecondaryFilters();edSetFilter(\'all\');edSetSearch(\'\')" style="margin-top:6px">Limpiar filtros</button>';
    }
    html += '<div style="padding:48px 20px;text-align:center">'
         +    '<div style="width:40px;height:40px;border-radius:10px;background:var(--bg-2);display:grid;place-items:center;color:var(--fg-3);margin:0 auto 12px">' + paIcon(emptyIc, 20) + '</div>'
         +    '<div style="font-size:13px;font-weight:600;color:var(--fg-1)">' + esc(emptyMsg) + '</div>'
         +    '<div style="font-size:12px;color:var(--fg-3);margin:6px 0 14px">' + esc(emptyHint) + '</div>'
         +    ctaBtn
         + '</div>';
  } else {
    rows.forEach(function(t) {
      var pn = _projNameForTask(t);
      var meta = (t.tipoTrabajo || '—') + ' · ' + (t.pais || '—') + (pn && pn !== 'Sin proyecto' ? ' · ' + pn : '');
      var etaTxt = t.eta || paEtaText(t.etaDays);
      var isSel = sel && sel.id == t.id;
      var isChecked = (EDT.selectedIds || []).indexOf(String(t.id)) >= 0;
      var cfLvl = _confLevel(t);
      html += '<div class="pa-tbl-r' + (isSel ? ' is-selected' : '') + '" data-task-id="' + esc(t.id) + '" onclick="edSelectTask(\'' + esc(t.id) + '\')">'
           +    '<span onclick="event.stopPropagation();edTkToggleSelectId(\'' + esc(t.id) + '\')"><span class="pa-check' + (isChecked ? ' is-checked' : '') + '"></span></span>'
           +    paConfDot(cfLvl)
           +    '<span class="id mono">' + esc(t.id) + '</span>'
           +    '<div class="title"><span class="t">' + esc(t.nombre || '') + '</span><span class="meta">' + esc(meta) + '</span></div>';
      if (role === 'specialist') {
        html += '<span style="font-size:12px;color:var(--fg-2)">' + esc(pn) + '</span>';
      } else if (t.resp) {
        html += '<span class="resp" onclick="event.stopPropagation();edSetRespFilter(\'' + esc(t.resp) + '\')">' + paAvatar(t.resp, 18) + '<span style="font-size:12px">' + esc(t.resp) + '</span></span>';
      } else {
        html += '<span style="color:var(--fg-3)">—</span>';
      }
      html += paPriorityPill(t.priority)
           +  paStatusPill(t.status)
           +  '<span class="eta mono' + (t.etaDays != null && t.etaDays < 0 ? ' overdue' : '') + '">' + esc(etaTxt) + '</span>'
           + '</div>';
    });
  }
  html += '</div>';
  html += '</div>'; // pa-page

  // PANEL detalle como floating si hay seleccionada
  if (sel) {
    html += _renderTkPanel(sel);
  }

  // Preservar el scrollTop para que las acciones que re-renderean (bulk
  // select, filter chips, search) no devuelvan al usuario al top de la
  // tabla. Restauramos en el siguiente tick — innerHTML lo resetea.
  var prevScroll = v.scrollTop;
  v.innerHTML = html;
  if (prevScroll) v.scrollTop = prevScroll;
  // Post-render: auto-resize del textarea de notas si el panel está
  // abierto. Sin esto, las notas largas aparecen con scroll interno
  // pequeño hasta que el usuario tipea algo.
  var ta = v.querySelector('.tk-notas-edit');
  if (ta) edPanelAutosizeNotes(ta);
  // Lazy-load comments thread cuando el panel está abierto.
  var commentsHost = v.querySelector('#tkComments');
  if (commentsHost) {
    var commentTaskId = commentsHost.closest('[data-task-id]');
    if (commentTaskId) edPanelLoadComments(commentTaskId.getAttribute('data-task-id'));
  }
  // Hover preview: tooltip compacto tras 400ms de hover sobre una fila.
  v.querySelectorAll('.pa-tbl-r[data-task-id]').forEach(_edTkAttachPreview);
  if (EDT.lastViewedId) {
    var lvId = String(EDT.lastViewedId);
    EDT.lastViewedId = null;
    setTimeout(function() {
      var row = v.querySelector('.pa-tbl-r[data-task-id="' + lvId + '"]');
      if (!row) return;
      row.scrollIntoView({ block: 'center', behavior: 'smooth' });
      row.classList.add('flash-highlight');
      setTimeout(function(){ row.classList.remove('flash-highlight'); }, 1400);
    }, 50);
  }
}

// Helper: toggle selección de tarea por ID (para el checkbox del tracker)
function edTkToggleSelectId(id) {
  var sid = String(id);
  if (!EDT.selectedIds) EDT.selectedIds = [];
  var ix = EDT.selectedIds.indexOf(sid);
  if (ix >= 0) EDT.selectedIds.splice(ix, 1);
  else EDT.selectedIds.push(sid);
  rEdTracker(D);
}

// Render del panel detalle (sliding overlay desde la derecha)
function _renderTkPanel(sel) {
  if (!sel) return '';
  var pn = _projNameForTask(sel);
  var role = _effectiveRole();
  var blockCls = (sel.status === 'Bloqueado' || (typeof sel.etaDays === 'number' && sel.etaDays < 0)) ? 'crit' : '';
  var stateBody;
  if (sel.status === 'Bloqueado') {
    stateBody = '<b>Bloqueada.</b> ' + esc(sel.blockedReason || sel.accionable || 'Necesita desbloqueo manual.');
  } else if (typeof sel.etaDays === 'number' && sel.etaDays < 0) {
    stateBody = '<b>Vencida hace ' + Math.abs(sel.etaDays) + ' días.</b> ' + esc(sel.accionable || '');
  } else {
    stateBody = esc(sel.accionable || 'Sin acción registrada.');
  }
  var timeline = (typeof _buildEdTimeline === 'function') ? _buildEdTimeline(sel) : [];
  var tlHtml = '';
  timeline.forEach(function(it) {
    var iconName = ({ good:'check', warn:'alert', crit:'block', info:'arrowR' })[it.dot] || 'dot';
    tlHtml += '<div class="tk-hist-item">'
           +    '<span class="tk-hist-icon tone-' + (it.dot || 'info') + '">' + paIcon(iconName, 10) + '</span>'
           +    '<div style="font-size:13px;color:var(--fg-2)">' + it.what + '</div>'
           +    '<div class="mono" style="font-size:11px;color:var(--fg-3)">' + esc(it.when) + '</div>'
           + '</div>';
  });
  var selCfLvl = _confLevel(sel);
  var selCfMeta = ED_CONF_LEVELS[selCfLvl] || { label: 'Estándar', desc: '' };
  var canReassign = (role === 'manager' || role === 'head');

  var html = '<aside class="tk-panel" id="tkPanel">';
  // Main column
  html += '<div class="tk-panel-main">'
       +    '<div class="tk-eyebrow">'
       +      '<span class="mono">#' + esc(sel.id) + '</span>'
       +      '<span>·</span>'
       +      (sel.pais ? '<span class="pa-pill pa-pill-country">' + esc(sel.pais) + '</span><span>·</span>' : '')
       +      'Proyecto <span style="color:var(--fg-1)">' + esc(pn) + '</span>'
       +      '<span style="margin-left:auto;display:flex;gap:6px">'
       +        '<button class="pa-btn pa-btn-icon" onclick="edClosePanel()" title="Cerrar">' + paIcon('close', 12) + '</button>'
       +      '</span>'
       +    '</div>'
       +    '<div class="tk-conf-band is-' + selCfLvl + '">'
       +      paIcon('lock', 12)
       +      esc(selCfMeta.label.toUpperCase()) + ' · ' + esc(selCfMeta.desc)
       +    '</div>'
       +    '<h1 class="tk-title editable" data-task-id="' + esc(sel.id) + '" ondblclick="edPanelEditTitle(this)" title="Doble-click para editar">' + esc(sel.nombre || '') + '</h1>'
       +    '<div class="tk-pillrow">'
       +      paPriorityPill(sel.priority)
       +      paStatusPill(sel.status)
       +      (sel.tipoTrabajo ? '<span class="pa-pill pa-pill-tipo">' + esc(sel.tipoTrabajo) + '</span>' : '')
       +      (sel.riesgo ? '<span class="pa-pill pa-pill-tipo">Riesgo · ' + esc(sel.riesgo) + '</span>' : '')
       +      (sel.deadline ? '<span class="pa-pill pa-pill-tipo">' + paIcon('calendar', 10) + ' ' + esc(sel.deadline) + (sel.eta ? ' · ' + esc(sel.eta) : '') + '</span>' : '')
       +    '</div>'
       +    '<div class="tk-status-block">'
       +      '<div class="lbl">Estado actual</div>'
       +      '<div class="body">' + stateBody + '</div>'
       +    '</div>'
       +    '<div class="tk-fields">';
  var fields = [

// Tooltip que aparece tras 400ms de hover y muestra resp / deadline /
// próxima acción. Útil para escanear sin abrir el panel.
var _edTkPreviewTimer = null;
function _edTkEnsurePreview() {
  var p = $('edTkPreview');
  if (p) return p;
  p = document.createElement('div');
  p.id = 'edTkPreview';
  p.className = 'tk-preview';
  p.style.display = 'none';
  document.body.appendChild(p);
  return p;
}
function _edTkAttachPreview(row) {
  row.addEventListener('mouseenter', function() {
    if (_edTkPreviewTimer) clearTimeout(_edTkPreviewTimer);
    var id = row.dataset.taskId;
    _edTkPreviewTimer = setTimeout(function() {
      var task = (D && D.tasks || []).find(function(t){ return t.id == id; });
      if (!task) return;
      var p = _edTkEnsurePreview();
      var deadlineLine = esc(task.deadline || '—') + (task.eta ? ' · ' + esc(task.eta) : '');
      p.innerHTML =
        '<div class="tk-preview-row"><span class="lbl">Resp.</span>' + esc(task.resp || '—') + '</div>' +
        '<div class="tk-preview-row"><span class="lbl">Plazo</span>' + deadlineLine + '</div>' +
        '<div class="tk-preview-row"><span class="lbl">Acción</span>' + esc(task.accionable || '—') + '</div>';
      var rect = row.getBoundingClientRect();
      p.style.display = 'block';
      // Posicionamiento: debajo de la fila, alineado al inicio
      p.style.left = Math.max(10, rect.left) + 'px';
      p.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
    }, 400);
  });
  row.addEventListener('mouseleave', function() {
    if (_edTkPreviewTimer) { clearTimeout(_edTkPreviewTimer); _edTkPreviewTimer = null; }
    var p = $('edTkPreview');
    if (p) p.style.display = 'none';
  });
}

// MARKER:EDITORIAL_AGRUPADAS_BEGIN
// Vista intermedia "Por urgencia" — agrupa tareas activas del USER
// en franjas (Pendientes / Hoy / Esta semana / Más adelante) con
// narrativa por bucket. Tabs (prioridad/proyecto/tipo/riesgo) son
// decorativos en Fase 1 (solo "Por prioridad" funcional).
// ───────────────────────────────────────────────────────────────

function _agBuckets(tasks) {
  var overdue = [], today = [], week = [], later = [];
  for (var i = 0; i < tasks.length; i++) {
    var t = tasks[i];
    if (t.status === 'Listo') continue;
    var d = (typeof t.etaDays === 'number') ? t.etaDays : null;
    if (d == null) { later.push(t); continue; }
    if (d < 0) overdue.push(t);
    else if (d === 0) today.push(t);
    else if (d <= 5) week.push(t);
    else later.push(t);
  }
  // ordenar por urgencia dentro de cada bucket
  function sortAsc(a, b) {
    var aBlk = a.status === 'Bloqueado' ? -1 : 0;
    var bBlk = b.status === 'Bloqueado' ? -1 : 0;
    if (aBlk !== bBlk) return aBlk - bBlk;
    var ad = (typeof a.etaDays === 'number') ? a.etaDays : 9999;
    var bd = (typeof b.etaDays === 'number') ? b.etaDays : 9999;
    return ad - bd;
  }
  return { overdue: overdue.sort(sortAsc), today: today.sort(sortAsc), week: week.sort(sortAsc), later: later.sort(sortAsc) };
}

function _agBucketNarr(key, tasks) {
  // Contextual bucket narrative based on real counts, blocks, y nombre de la
  // más urgente cuando aporta. Devuelve HTML (b/span); el caller decide si lo
  // strippea (header sin formato) o lo deja (cuerpo).
  if (tasks.length === 0) {
    if (key === 'overdue') return 'Sin tareas vencidas. <b>Estás en forma.</b>';
    if (key === 'today') return 'Nada vence hoy. <b>Día limpio.</b>';
    if (key === 'week') return 'No hay tareas agendadas para esta semana.';
    return 'No hay tareas con SLA cómodo.';
  }
  var blockedCount = tasks.filter(function(t){ return t.status === 'Bloqueado'; }).length;
  var altaCount = tasks.filter(function(t){ return t.priority === 'Alta'; }).length;
  // tasks viene ordenado por etaDays asc (más urgente primero) — usable para "la más crítica".
  var top = tasks[0];
  var topName = top && top.nombre ? esc(String(top.nombre).substring(0, 50)) : '';
  if (key === 'overdue') {
    var blockedFrag = blockedCount ? ('<span class="warn">' + blockedCount + ' esperando a tercero.</span> ') : '';
    var topFrag = topName ? (' La más crítica: <b>«' + topName + '»</b>.') : '';
    return blockedFrag + '<b>Sugerido:</b> follow-up o escalamiento suave.' + topFrag;
  }
  if (key === 'today') {
    var altaFrag = altaCount ? ('<b>' + altaCount + ' de prioridad alta</b>. ') : '';
    var topToday = topName ? (' Empezá por <b>«' + topName + '»</b>.') : '';
    return altaFrag + 'Cerrar antes de fin de día.' + topToday;
  }
  if (key === 'week') {
    return altaCount
      ? ('<b>' + altaCount + ' de prioridad alta</b> con margen cómodo. Arrancá por la de mayor scope.')
      : 'Tareas con margen cómodo. Planificá tu semana.';
  }
  return '<b>El SLA es cómodo.</b> Podés tomarte tu tiempo.';
}

  // Buckets como secciones con tabla densa

         + '</div>';
    if (bk.tasks.length === 0) {
      var emptyMsg, emptyIcon;

      else if (bk.key === 'week')    { emptyMsg = 'Sin tareas en cola esta semana.'; emptyIcon = '◐'; }
      else                            { emptyMsg = 'Sin tareas con margen cómodo.';    emptyIcon = '◇'; }
      html += '<div class="pa-card" style="display:flex;align-items:center;gap:12px;padding:14px 18px;color:var(--fg-3)">'
           +    '<span style="width:32px;height:32px;border-radius:8px;background:var(--bg-2);display:grid;place-items:center;font-size:14px;color:var(--fg-2)">' + emptyIcon + '</span>'

        var conf = _confLevel(t);
        html += '<div class="pa-tbl-r" style="grid-template-columns: 20px 64px 1fr 100px 110px 90px" onclick="edGoTaskInTracker(\'' + esc(t.id) + '\')">'
             +    paConfDot(conf)
             +    '<span class="id mono">' + esc(t.id) + '</span>'
             +    '<div class="title"><span class="t">' + esc(t.nombre || '') + '</span><span class="meta">' + esc(meta) + '</span></div>'
             +    paPriorityPill(t.priority)
             +    paStatusPill(t.status)
             +    '<span class="eta mono' + (t.etaDays != null && t.etaDays < 0 ? ' overdue' : '') + '">' + esc(t.eta || paEtaText(t.etaDays)) + '</span>'

// MARKER:EDITORIAL_ACTUALIZAR_BEGIN
// Panel deslizable lateral (560px) con 3 variantes:
//   avanzar  → siguiente estado del flujo
//   cerrar   → marca Listo + resumen en notas (mueve a Historial)
//   bloquear → marca Bloqueado + razón en notas
// Sin: AI, adjuntos, notif preview — Fase 2.
// ───────────────────────────────────────────────────────────────

var EDU = { taskId: null, variant: null, newConf: null };

// Helper: el usuario puede opcionalmente cambiar el nivel de confidencialidad
// al cerrar o bloquear. newConf null = no cambia; valor = se incluye en el update.
function edUSetConf(nivel) {
  if (!ED_CONF_LEVELS[nivel]) return;
  // Toggle: si clickea el mismo nivel, lo des-selecciona.
  EDU.newConf = (EDU.newConf === nivel) ? null : nivel;
  if (!EDU.taskId) return;
  var task = D && D.tasks && D.tasks.find(function(t){ return t.id == EDU.taskId; });
  if (!task) return;
  var host = $('uaHost'); if (host) host.innerHTML = _uaRender(task, EDU.variant);
}
var _UA_FLOW = ['Pendiente', 'En curso', 'En revisión', 'Listo'];

function _uaNextStatus(current) {
  var idx = _UA_FLOW.indexOf(current);
  if (idx < 0 || idx >= _UA_FLOW.length - 1) return 'Listo';
  return _UA_FLOW[idx + 1];
}

function _uaFlowIndices(current, variant) {
  var nowIdx = _UA_FLOW.indexOf(current);
  if (nowIdx < 0) nowIdx = 0;
  var targetIdx;
  if (variant === 'cerrar') targetIdx = 3;
  else if (variant === 'bloquear') targetIdx = -1;
  else targetIdx = Math.min(nowIdx + 1, 3);
  return { nowIdx: nowIdx, targetIdx: targetIdx };
}

function _uaRenderFlow(task, variant) {
  var idx = _uaFlowIndices(task.status, variant);
  var html = '<div class="ua-flow">';
  for (var i = 0; i < _UA_FLOW.length; i++) {
    var dotCls = i < idx.nowIdx ? 'done' : i === idx.nowIdx ? 'now' : i === idx.targetIdx ? 'target' : '';
    var lblCls = i === idx.nowIdx ? 'now' : i === idx.targetIdx ? 'target' : '';
    html += '<div class="ua-flow-step">'
         +    '<div class="ua-flow-dot ' + dotCls + '"></div>'
         +    '<div class="ua-flow-lbl ' + lblCls + '">' + esc(_UA_FLOW[i]) + '</div>'
         + '</div>';
    if (i < _UA_FLOW.length - 1) {
      var lineCls = i < idx.nowIdx ? 'done' : '';
      html += '<div class="ua-flow-line ' + lineCls + '"></div>';
    }
  }
  html += '</div>';
  return html;
}

function _uaRenderOptions(variant) {
  function opt(key, lbl, name) {
    var active = variant === key ? ' active' : '';
    return '<button type="button" class="ua-opt' + active + '" onclick="edUSwitchVariant(\'' + key + '\')">'
         +    '<div class="ua-opt-lbl">' + esc(lbl) + '</div>'
         +    '<div class="ua-opt-name">' + esc(name) + '</div>'
         + '</button>';
  }
  return '<div class="ua-options">'
       +    opt('avanzar',  'Avanzar',  '→ siguiente estado')
       +    opt('cerrar',   'Cerrar',   'Marcar como hecha')
       +    opt('bloquear', 'Bloquear', 'Esperando a algo')
       + '</div>';
}

function _uaRenderActionCard(variant, task) {
  if (variant === 'cerrar') {
    return '<div class="ua-action cerrar">'
         +   '<div class="ua-action-mark">✓</div>'
         +   '<div>'
         +     '<div class="ua-action-h">Estás por cerrar esta tarea.</div>'
         +     '<div class="ua-action-sub">Se mueve al <b>Historial</b> con tu resumen como nota de cierre.</div>'
         +   '</div>'
         + '</div>';
  }
  if (variant === 'bloquear') {
    return '<div class="ua-action bloquear">'
         +   '<div class="ua-action-mark">!</div>'
         +   '<div>'
         +     '<div class="ua-action-h">Marcar la tarea como bloqueada.</div>'
         +     '<div class="ua-action-sub">La tarea queda en pausa con el motivo documentado. <b>No consume capacidad activa</b> mientras está bloqueada.</div>'
         +   '</div>'
         + '</div>';
  }
  var next = _uaNextStatus(task.status);
  return '<div class="ua-action avanzar">'
       +   '<div class="ua-action-mark">→</div>'
       +   '<div>'
       +     '<div class="ua-action-h">Avanzar a <em>' + esc(_statusLabel(next)) + '</em>.</div>'
       +     '<div class="ua-action-sub">Pasar al siguiente paso del flujo. Podés sumar una nota opcional con contexto.</div>'
       +   '</div>'
       + '</div>';
}

function _uaRenderConfField(task) {
  // Sólo se muestra en variantes cerrar/bloquear: pills opcionales para cambiar
  // el nivel de confidencialidad. Si EDU.newConf es null, ninguna queda activa.
  var current = _confLevel(task);
  var sel = EDU.newConf;
  function pill(lvl) {
    var meta = ED_CONF_LEVELS[lvl];
    var active = (sel === lvl) ? ' active' : '';
    return '<button type="button" class="cr-pill-btn ' + lvl + active + '" '
         + 'onclick="edUSetConf(\'' + lvl + '\')">' + esc(meta.label) + '</button>';
  }
  var hint = sel
    ? 'Cambiará a <b>' + esc(ED_CONF_LEVELS[sel].label) + '</b>. Click de nuevo para deseleccionar.'
    : 'Actual: <b>' + esc(ED_CONF_LEVELS[current].label) + '</b>. Click un nivel para cambiarlo.';
  return '<div class="ua-field">'
       +   '<div class="ua-label">Cambiar confidencialidad <span class="opt">(opcional)</span></div>'
       +   '<div class="cr-pills-row">' + pill('estandar') + pill('restringido') + pill('confidencial') + '</div>'
       +   '<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.45">' + hint + '</div>'
       + '</div>';
}

function _uaRenderBody(task, variant) {
  var actionCard = _uaRenderActionCard(variant, task);

  if (variant === 'cerrar') {
    fieldHtml = '<div class="ua-field">'
              +   '<div class="ua-label">¿Qué se hizo? <span class="req">*</span></div>'
              +   '<textarea class="ua-input ua-textarea" id="uaResumen" placeholder="Resumen rápido de cómo se cerró"></textarea>'
              + '</div>';
  } else if (variant === 'bloquear') {
    fieldHtml = '<div class="ua-field">'
              +   '<div class="ua-label">¿Qué te está bloqueando? <span class="req">*</span></div>'
              +   '<textarea class="ua-input ua-textarea" id="uaRazon" placeholder="ej: RR.HH. no respondió en 4 días."></textarea>'
              + '</div>';
  } else {
    fieldHtml = '<div class="ua-field">'

              + '</div>';
  }

  var confHtml = (variant === 'cerrar' || variant === 'bloquear') ? _uaRenderConfField(task) : '';
  return '<div class="ua-body">' + _uaRenderOptions(variant) + actionCard + fieldHtml + confHtml + '</div>';
}

function _uaRenderFoot(variant) {
  var info, btn;
  if (variant === 'cerrar') {
    info = '<b>Al cerrar:</b> se mueve al historial · libera 1 slot en tu carga.';
    btn = 'Cerrar tarea ✓';
  } else if (variant === 'bloquear') {
    info = '<b>Al bloquear:</b> la tarea deja de consumir tu capacidad activa.';
    btn = 'Marcar bloqueada';
  } else {
    info = '<b>Al avanzar:</b> la tarea pasa al siguiente estado.';
    btn = 'Avanzar →';
  }
  return '<div class="ua-foot">'
       +   '<div class="ua-foot-info">' + info + '</div>'
       +   '<button type="button" class="ed-btn" onclick="edUClose()">Cancelar</button>'
       +   '<button type="button" class="ed-btn accent" onclick="edUSubmit()">' + esc(btn) + '</button>'
       + '</div>';
}

function _uaRender(task, variant) {
  var pn = _projNameForTask(task);
  return '<div class="ua-overlay" onclick="if(event.target===this)edUClose()">'
       +   '<div class="ua-backdrop" onclick="edUClose()"></div>'
       +   '<aside class="ua-panel" role="dialog" aria-modal="true" aria-label="Actualizar tarea">'
       +     '<div class="ua-head">'
       +       '<button type="button" class="ua-x" onclick="edUClose()" aria-label="Cerrar">×</button>'
       +       '<div class="ua-eye">— Update status</div>'
       +       '<div class="ua-id">' + esc(task.id + ' · ' + pn) + '</div>'
       +       '<div class="ua-title">' + esc(task.nombre || '') + '</div>'
       +     '</div>'
       +     _uaRenderFlow(task, variant)
       +     _uaRenderBody(task, variant)
       +     _uaRenderFoot(variant)
       +   '</aside>'
       + '</div>';
}

function edUOpen(taskId, variant) {
  if (!D || !D.tasks) { if (typeof toast === 'function') toast('Sin datos cargados', 'error'); return; }
  var task = D.tasks.find(function(t){ return t.id == taskId; });
  if (!task) { if (typeof toast === 'function') toast('Tarea no encontrada', 'error'); return; }
  EDU.taskId = task.id;
  EDU.variant = variant || 'avanzar';
  EDU.newConf = null;
  var host = $('uaHost'); if (!host) return;
  host.innerHTML = _uaRender(task, EDU.variant);
}

function edUClose() {
  EDU.taskId = null;
  EDU.variant = null;
  EDU.newConf = null;
  var host = $('uaHost'); if (host) host.innerHTML = '';
}

function edUSwitchVariant(v) {
  if (!EDU.taskId) return;
  EDU.variant = v;
  // Avanzar no muestra el field de confidencialidad — limpiamos para no arrastrar selección.
  if (v === 'avanzar') EDU.newConf = null;
  var task = D.tasks.find(function(t){ return t.id == EDU.taskId; });
  if (!task) return;
  var host = $('uaHost'); if (host) host.innerHTML = _uaRender(task, v);
}

function edUSubmit() {
  if (!EDU.taskId || !EDU.variant) return;
  var task = D.tasks.find(function(t){ return t.id == EDU.taskId; });
  if (!task) return;
  var fields = {};
  if (EDU.variant === 'cerrar') {
    var resumen = ($('uaResumen') && $('uaResumen').value || '').trim();
    if (!resumen) { if (typeof toast === 'function') toast('Falta el resumen para cerrar', 'error'); return; }
    fields.status = 'Listo';
    fields.notas = 'CIERRE: ' + resumen;
  } else if (EDU.variant === 'bloquear') {
    var razon = ($('uaRazon') && $('uaRazon').value || '').trim();
    if (!razon) { if (typeof toast === 'function') toast('Falta el motivo para bloquear', 'error'); return; }
    fields.status = 'Bloqueado';
    fields.notas = razon;
  } else {
    // Si "Avanzar" llevaría a 'Listo' (cierre), forzamos la variant 'cerrar'
    // para pedir resumen y respetar la validación de cierre.
    var next = _uaNextStatus(task.status);
    if (next === 'Listo') {
      if (typeof toast === 'function') toast('Para cerrar la tarea, completá el resumen.', 'info');
      edUSwitchVariant('cerrar');
      return;
    }
    fields.status = next;
    var nota = ($('uaNota') && $('uaNota').value || '').trim();
    if (nota) fields.notas = nota;
  }
  // Si el usuario eligió cambiar el nivel de confidencialidad (sólo cerrar/bloquear),
  // lo incluimos en el batch update.
  if ((EDU.variant === 'cerrar' || EDU.variant === 'bloquear') && EDU.newConf) {
    fields.confidencialidad = EDU.newConf;
  }
  if (typeof showLoader === 'function') showLoader();
  // Capturamos el variant antes de edUClose() porque ahí se resetea
  // EDU. Lo necesitamos para decidir si auto-seleccionar la siguiente
  // tarea urgente tras un cierre exitoso.
  var submittedVariant = EDU.variant;
  google.script.run
    .withSuccessHandler(function(res) {
      if (typeof hideLoader === 'function') hideLoader();
      if (res && res.success === false) { if (typeof toast === 'function') toast(res.error || 'Error', 'error'); return; }
      var msg = submittedVariant === 'cerrar' ? 'Tarea cerrada' : submittedVariant === 'bloquear' ? 'Tarea bloqueada' : 'Tarea avanzada';
      if (typeof toast === 'function') toast(msg, 'success');
      edUClose();
      google.script.run.withSuccessHandler(function(fresh) {
        if (!fresh) return;
        D = fresh;
        if (typeof render === 'function') render();
        var active = document.querySelector('.view.active');
        if (!active) return;
        // Tras cierre en el tracker, auto-seleccionar la siguiente
        // tarea urgente (top de la lista filtrada) para que el usuario
        // pueda seguir cerrando sin clickear de nuevo.
        if (submittedVariant === 'cerrar' && active.id === 'vEdTracker') {
          var nextT = _edNextUrgent();
          EDT.selectedId = nextT ? nextT.id : null;
        }
        if (active.id === 'vEdHome' && typeof goEd === 'function') goEd('home');
        else if (active.id === 'vEdTracker' && typeof goEd === 'function') goEd('tracker');
        else if (active.id === 'vEdAgrupadas' && typeof goEd === 'function') goEd('agrupadas');
      }).withFailureHandler(function(e) {
        console.error(e);
        if (typeof hideLoader === 'function') hideLoader();
        if (typeof toast === 'function') toast('Error al recargar: ' + (e && e.message || 'desconocido'), 'error');
      }).getEditorialData();
    })
    .withFailureHandler(function(e) {
      if (typeof hideLoader === 'function') hideLoader();
      if (typeof toast === 'function') toast('Error: ' + (e && e.message || 'desconocido'), 'error');
    })
    .updateTaskFields(EDU.taskId, fields);
}

// Wizard editorial de 3 pasos para crear tarea — versión simplificada del
// rediseño de pendientes/ed-crear.jsx. Mantiene step indicator, pills, resumen
// final + submit a addTask. Descarta features que requieren backend nuevo:
// sugerencias IA, banda IA, niveles de confidencialidad, visibilidad multi-
// persona, adjuntos drive/local. El modal legacy #createOv se mantiene
// intacto para crear proyectos (openCreate('newProj')).
// ───────────────────────────────────────────────────────────────

var EDC = {
  step: 1,
  values: {
    titulo: '',
    descripcion: '',
    tipo: '',
    pais: '',
    prioridad: 'Media',
    riesgo: '',
    resp: '',
    deadline: '',
    proyectoId: '',
    confidencialidad: 'estandar'
  }
};

var _CR_TIPOS  = ['Contractual', 'Regulatorio', 'Contencioso', 'Privacy', 'Operativo'];
var _CR_PRIOS  = ['Alta', 'Media', 'Baja'];
var _CR_RIESGOS = ['Legal alto', 'Reputacional', 'Operativo'];
// Fallback solo si D.equipos llega vacío (no debería pasar). Sincronizado
// con todos los países activos del sheet Equipos al 2026-05.
var _CR_PAIS_FALLBACK = ['CO', 'MX', 'BR', 'AR', 'CL', 'PE', 'CR', 'UY', 'EC'];

function _crCountries() {
  if (D && D.equipos && D.equipos.length) {
    var seen = {}, out = [];
    D.equipos.forEach(function(eq){
      var c = eq && eq.code;
      // HQ es admin/global, no operativo — no aparece como opción de país de tarea.
      if (c && c !== 'HQ' && !seen[c]) { seen[c] = 1; out.push(c); }
    });
    if (out.length) return out;
  }
  return _CR_PAIS_FALLBACK.slice();
}

function _crResponsables() {
  if (typeof getAllMembers === 'function') {
    var m = getAllMembers();
    if (m && m.length) return m;
  }
  if (D && D.team && D.team.length) {
    return D.team.map(function(t){ return t && t.name; }).filter(Boolean);
  }
  return [];
}

function _crProjects() {
  var src = (D && (D.projectList || D.projects)) || [];
  return src.filter(function(p){
    if (!p) return false;
    var s = p.status || p.estado || '';
    return s !== 'Completado' && s !== 'Cancelado';
  });
}

function _crPillsHtml(field, options, activeVal, modCls) {
  return options.map(function(opt){
    var val = typeof opt === 'object' ? opt.value : opt;
    var lbl = typeof opt === 'object' ? opt.label : opt;
    var active = String(activeVal) === String(val) ? ' active' : '';
    var mod = modCls ? (' ' + modCls(val)) : '';
    return '<button type="button" class="cr-pill-btn' + mod + active + '" '
         + 'onclick="edCrearSetField(\'' + field + '\',\'' + escJs(String(val)) + '\')">'
         + esc(lbl) + '</button>';
  }).join('');
}

function _crPrioMod(val) {
  if (val === 'Alta') return 'alta';
  if (val === 'Media') return 'media';
  if (val === 'Baja') return 'baja';
  return '';
}
function _crRiesgoMod(val) {
  if (val === 'Legal alto') return 'alta';
  if (val === 'Reputacional') return 'media';
  if (val === 'Operativo') return 'baja';
  return '';
}
function _crConfMod(val) {
  // Mapea el nivel a la clase de confidencialidad para el pill (.estandar/.restringido/.confidencial)
  if (val === 'estandar') return 'estandar';
  if (val === 'restringido') return 'restringido';
  if (val === 'confidencial') return 'confidencial';
  return '';
}
var _CR_CONF_OPTS = [
  { value: 'estandar', label: 'Estándar' },
  { value: 'restringido', label: 'Restringido' },
  { value: 'confidencial', label: 'Confidencial' }
];

function _crSelectHtml(id, options, current, blankLabel) {
  var html = '';
  if (blankLabel != null) {
    var sel = !current ? ' selected' : '';
    html += '<option value=""' + sel + '>' + esc(blankLabel) + '</option>';
  }
  options.forEach(function(opt){
    var val = typeof opt === 'object' ? opt.value : opt;
    var lbl = typeof opt === 'object' ? opt.label : opt;
    var sel = String(current) === String(val) ? ' selected' : '';
    html += '<option value="' + esc(String(val)) + '"' + sel + '>' + esc(lbl) + '</option>';
  });
  return '<select id="' + id + '" class="cr-input">' + html + '</select>';
}

function _crProjectName(id) {
  if (!id) return 'Sin proyecto';
  var list = (D && (D.projectList || D.projects)) || [];
  for (var i = 0; i < list.length; i++) {
    if (String(list[i].id) === String(id)) return list[i].nombre || ('#' + id);
  }
  return '#' + id;
}

function _crErr(field) {
  return (EDC.errors && EDC.errors[field]) ? '<div class="cr-err">' + esc(EDC.errors[field]) + '</div>' : '';
}
function _crFieldCls(field) {
  return 'cr-field' + ((EDC.errors && EDC.errors[field]) ? ' has-err' : '');
}

function _crRenderStep2() {

    +   '</div>'
    +   '<div class="cr-field">'
    +     '<div class="cr-label">Nivel de riesgo</div>'
    +     '<div class="cr-pills-row">' + _crPillsHtml('riesgo', _CR_RIESGOS, v.riesgo, _crRiesgoMod) + '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="cr-grid2">'
    +   '<div class="' + _crFieldCls('resp') + '">'

    +     _crErr('resp')

    +   '<div class="' + _crFieldCls('deadline') + '">'

    + '<div class="cr-field">'
    +   '<div class="cr-label">Ligar a proyecto</div>'
    +   _crSelectHtml('crProj', projs, v.proyectoId, 'Sin proyecto').replace('<select id="crProj"', '<select id="crProj" onchange="edCrearSetField(\'proyectoId\', this.value)"')
    + '</div>'
    + '<div class="cr-field">'
    +   '<div class="cr-label">Confidencialidad</div>'

    +   '<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.45">' + esc(confDesc) + '</div>'
    + '</div>';
}

function _crRenderStep3() {
  var v = EDC.values;
  var pills = '';
  if (v.prioridad) pills += '<span class="ed-pill ' + esc((v.prioridad || '').toLowerCase()) + '">Prioridad ' + esc(_priorityLabel(v.prioridad)) + '</span>';

function _crStepClasses(stepNum, current) {
  if (current > stepNum) return 'cr-step done';
  if (current === stepNum) return 'cr-step active';
  return 'cr-step';
}

function _crRender(step) {

    1: 'Empezá por lo esencial',

    3: 'Revisión final. Cuando confirmes, se crea la tarea.'
  };
  var bodyHtml;

  else if (s === 2) bodyHtml = _crRenderStep2();
  else bodyHtml = _crRenderStep3();

  var footBtns = '';
  // Cancelar siempre presente como botón ghost (los pasos 2/3 antes solo
  // tenían X en la esquina; el brief pide Cancelar persistente).
  var cancelBtn = '<button type="button" class="ed-btn ghost" onclick="edCrearClose()">Cancelar</button>';

    footBtns = cancelBtn
             + '<button type="button" class="ed-btn" onclick="edCrearGoStep(1)">← Atrás</button>'
             + '<button type="button" class="ed-btn accent" onclick="edCrearGoStep(3)">Revisar y publicar →</button>';
  } else {
    footBtns = cancelBtn
             + '<button type="button" class="ed-btn" onclick="edCrearGoStep(2)">← Editar</button>'
             + '<button type="button" class="ed-btn accent" id="crSubmit" onclick="edCrearSubmit()">Publicar tarea</button>';
  }

  return '<div class="cr-overlay" onclick="if(event.target===this)edCrearClose()">'
       +   '<div class="cr-backdrop" onclick="edCrearClose()"></div>'
       +   '<div class="cr-modal" role="dialog" aria-modal="true" aria-label="Crear tarea">'
       +     '<div class="cr-head">'
       +       '<div>'
       +         '<div class="cr-eye">— Crear nueva tarea</div>'
       +         '<div class="cr-title">' + esc(titles[s] || '') + '</div>'
       +       '</div>'
       +       '<button type="button" class="cr-x" onclick="edCrearClose()" aria-label="Cerrar">×</button>'
       +     '</div>'
       +     '<div class="cr-steps">'
       +       '<div class="' + _crStepClasses(1, s) + '"><span class="cr-step-num">01</span> Esencial</div>'
       +       '<div class="' + _crStepClasses(2, s) + '"><span class="cr-step-num">02</span> Detalles</div>'
       +       '<div class="' + _crStepClasses(3, s) + '"><span class="cr-step-num">03</span> Confirmar</div>'
       +     '</div>'
       +     '<div class="cr-body">' + bodyHtml + '</div>'
       +     '<div class="cr-foot">'
       +       '<div class="cr-foot-info">' + (infos[s] || '') + '</div>'
       +       footBtns
       +     '</div>'
       +   '</div>'
       + '</div>';
}

function _crMount() {
  var host = $('crHost'); if (!host) return;
  host.innerHTML = _crRender(EDC.step);
}

function edCrearOpen() {
  // Pre-fill responsable y país con los datos del usuario efectivo.
  // Para specialist, responsable = ellos mismos (no pueden reasignar
  // de todos modos). Para manager/head, queda como sugerencia
  // editable.
  var currentName = (typeof _effectiveUserName === 'function') ? _effectiveUserName() : '';
  var currentCode = (typeof _effectiveUserCode === 'function') ? _effectiveUserCode() : '';
  EDC.step = 1;
  EDC.errors = {};
  EDC.values = {
    titulo: '',
    descripcion: '',
    tipo: '',
    pais: currentCode || '',
    prioridad: 'Media',
    riesgo: '',
    resp: currentName || '',
    deadline: '',
    proyectoId: '',
    confidencialidad: 'estandar'
  };
  // Restaurar borrador de localStorage si existe contenido útil (titulo o
  // descripcion). Solo override campos NO vacíos del draft — sino una
  // sesión previa que dejó resp/pais en blanco anula nuestros pre-fills
  // y la validación falla silenciosa al avanzar de paso.
  try {
    var saved = localStorage.getItem('lt-edc-draft');
    if (saved) {
      var v = JSON.parse(saved);
      if (v && (v.titulo || v.descripcion)) {
        Object.keys(v).forEach(function(k) {
          if (v[k]) EDC.values[k] = v[k];
        });
        if (typeof toast === 'function') toast('Borrador restaurado.', 'info');
      }
    }
  } catch(e){}
  _crMount();
  setTimeout(function() {
    var input = $('crTitulo');
    if (input) input.focus();
  }, 60);
}

function edCrearClose() {
  EDC.step = 1;
  var host = $('crHost'); if (host) host.innerHTML = '';
}

function edCrearSetField(key, value) {
  if (!EDC.values || !(key in EDC.values)) return;
  EDC.values[key] = value;
  // Limpiar el error del campo cuando el usuario lo edita (feedback inmediato).
  if (EDC.errors && EDC.errors[key]) {
    delete EDC.errors[key];
  }
  // Persistir borrador en localStorage para no perder el progreso si el modal se cierra accidentalmente.
  try { localStorage.setItem('lt-edc-draft', JSON.stringify(EDC.values)); } catch(e){}
  // Para campos texto/select que están dentro del DOM actual, no re-renderizamos
  // — el valor ya está en EDC.values. Para pills sí re-renderizamos para
  // reflejar el estado activo.
  var rerenderFields = { tipo: 1, pais: 1, prioridad: 1, riesgo: 1, confidencialidad: 1 };
  if (rerenderFields[key]) _crMount();
}

function edCrearGoStep(n) {
  // Validación del paso actual antes de avanzar.
  // Setea EDC.errors[field] para que el render del paso muestre el mensaje
  // inline debajo de cada campo invalid, y emite un toast resumen.
  var v = EDC.values;
  EDC.errors = {};
  if (n > EDC.step) {
    if (EDC.step === 1) {
      if (!v.titulo || !v.titulo.trim()) EDC.errors.titulo = 'Escribí un título descriptivo.';
      if (!v.tipo) EDC.errors.tipo = 'Elegí un tipo de trabajo.';
      if (!v.pais) EDC.errors.pais = 'Elegí un país.';
    } else if (EDC.step === 2) {
      if (!v.resp) EDC.errors.resp = 'Elegí quién es responsable.';
      if (!v.deadline) EDC.errors.deadline = 'Definí el plazo.';
    }
    var errKeys = Object.keys(EDC.errors);
    if (errKeys.length) {
      toast('Revisá ' + errKeys.length + (errKeys.length === 1 ? ' campo' : ' campos') + ' marcados.', 'error');
      _crMount();
      return;
    }
  }
  EDC.step = n;
  _crMount();
}

function edCrearSubmit() {
  var v = EDC.values;
  if (!v.titulo || !v.titulo.trim()) { toast('Falta el título', 'error'); return; }
  if (!v.resp) { toast('Falta el responsable', 'error'); return; }
  if (!v.pais) { toast('Falta el país', 'error'); return; }
  var btn = $('crSubmit'); if (btn) btn.disabled = true;
  if (typeof showLoader === 'function') showLoader();
  toast('Creando tarea…', 'info');
  console.log('[create-task] payload', v);
  google.script.run
    .withSuccessHandler(function(res) {
      if (typeof hideLoader === 'function') hideLoader();
      if (btn) btn.disabled = false;
      console.log('[create-task] response', res);
      if (res && res.success) {
        toast('✅ Tarea #' + res.id + ' creada', 'success');
        try { localStorage.removeItem('lt-edc-draft'); } catch(e){}
        edCrearClose();
        if (typeof reload === 'function') reload();
      } else {
        toast('Error: ' + ((res && res.error) || 'unknown'), 'error');
      }
    })
    .withFailureHandler(function(e) {
      if (typeof hideLoader === 'function') hideLoader();
      if (btn) btn.disabled = false;
      console.error('[create-task] failure', e);
      toast('Error del backend: ' + (e && e.message || 'desconocido'), 'error');
    })
    .addTask({
      nombre: v.titulo.trim(),
      proyectoId: v.proyectoId || '',
      pais: v.pais || '',
      priority: v.prioridad || 'Media',
      tipoTrabajo: v.tipo || '',
      riesgo: v.riesgo || '',
      resp: v.resp || '',
      lider: '',
      deadline: v.deadline || '',
      acc: '',
      notas: (v.descripcion || '').trim(),
      confidencialidad: v.confidencialidad || 'estandar'
    });
}

function _piRoleOf(project, userName, tasks) {
  if (!project) return 'Observador';
  if (project.lider === userName) return 'Owner';
  var hasMyTask = (tasks || []).some(function(t){ return t.proyectoId == project.id && t.resp === userName; });
  return hasMyTask ? 'Participante' : 'Observador';
}

function _piEnrichProject(p, D, userName) {
  var tasks  = (D && D.tasks)     || [];
  var hist   = (D && D.historial) || [];
  var pTasks = tasks.filter(function(t){ return t.proyectoId == p.id; });
  var pHist  = hist.filter(function(t){ return t.proyectoId == p.id; });
  var mine    = pTasks.filter(function(t){ return t.resp === userName; }).length;
  var overdue = pTasks.filter(function(t){ return typeof t.etaDays === 'number' && t.etaDays < 0 && t.status !== 'Listo'; }).length;
  var done    = pHist.length;
  var curso   = pTasks.filter(function(t){ return t.status === 'En curso' || t.status === 'En revisión'; }).length;
  var crit    = pTasks.filter(function(t){ return t.status === 'Bloqueado' || (typeof t.etaDays === 'number' && t.etaDays < 0 && t.status !== 'Listo'); }).length;
  var total   = pTasks.length + done;
  var pctNum  = total > 0 ? Math.round(done / total * 100) : 0;
  var donePct  = total > 0 ? Math.round(done / total * 100) : 0;
  var cursoPct = total > 0 ? Math.round(curso / total * 100) : 0;
  var critPct  = total > 0 ? Math.round(crit / total * 100) : 0;

  var deadlineDays = null;
  if (p.deadline && D && D.today) {
    var m1 = (p.deadline + '').match(/^(\d{4})-(\d{2})-(\d{2})/);
    var m2 = D.today.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m1 && m2) {
      var d1 = new Date(parseInt(m1[1],10), parseInt(m1[2],10)-1, parseInt(m1[3],10));
      var d2 = new Date(parseInt(m2[1],10), parseInt(m2[2],10)-1, parseInt(m2[3],10));
      deadlineDays = Math.round((d1.getTime() - d2.getTime()) / 86400000);
    }
  }

  var seen = {}, peopleArr = [], more = 0;
  for (var i = 0; i < pTasks.length; i++) {
    var r = pTasks[i].resp;
    if (!r || seen[r]) continue;
    seen[r] = true;
    if (peopleArr.length < 4) peopleArr.push({ name: r, initials: _userInitials(r) });
    else more++;
  }

  return {
    p: p,
    role: _piRoleOf(p, userName, tasks),
    tasks: pTasks.length,
    mine: mine,
    overdue: overdue,
    deadlineDays: deadlineDays,
    progress: { done: donePct, curso: cursoPct, crit: critPct },
    pctNum: pctNum,
    people: peopleArr,
    more: more
  };
}

function _piBucket(projects, tab, userName, tasks) {
  if (!projects || !projects.length) return [];
  if (tab === 'cerrados') {
    return projects.filter(function(p){ return p.status === 'Completado' || p.status === 'Cancelado'; });
  }
  var open = projects.filter(function(p){ return p.status === 'Activo' || p.status === 'En pausa'; });
  if (tab === 'lideras')    return open.filter(function(p){ return p.lider === userName; });
  if (tab === 'participas') return open.filter(function(p){
    if (p.lider === userName) return false;
    return tasks.some(function(t){ return t.proyectoId == p.id && t.resp === userName; });
  });
  return open;
}

function _piRenderHero(enriched) {
  var p = enriched.p;

    .sort(function(a, b) {

      var bd = (typeof b.etaDays === 'number') ? b.etaDays : 9999;
      return ad - bd;
    }).slice(0, 3);

  var miniHtml = '';

    miniHtml = '<div style="font-size:12px;color:var(--dim);padding:8px 0">Sin tareas tuyas activas en este proyecto.</div>';
  } else {
    for (var i = 0; i < myInProj.length; i++) {
      var t = myInProj[i];
      var tone = _etaToneClass(t.etaDays, t.status);
      miniHtml += '<div class="pi-mini-task" style="cursor:pointer" onclick="edGoTaskInTracker(\'' + esc(t.id) + '\')">'
               +   '<span class="pi-mini-id">' + esc(t.id) + '</span>'

               +   '<span class="pi-mini-eta ' + tone + '">' + esc(t.eta || '') + '</span>'
               + '</div>';
    }
  }

  var heroHeadline = enriched.overdue
    ? 'Hay <b>' + enriched.overdue + ' vencida' + (enriched.overdue === 1 ? '' : 's') + '</b>. <span style="color:var(--muted);font-weight:600">Resolver primero.</span>'
    : (myInProj.length ? 'Tenés <b>' + myInProj.length + ' tarea' + (myInProj.length === 1 ? '' : 's') + ' tuya' + (myInProj.length === 1 ? '' : 's') + '</b>. <span style="color:var(--muted);font-weight:600">Por urgencia.</span>'
                       : 'Sin tareas tuyas activas. <span style="color:var(--muted);font-weight:600">Solo seguimiento.</span>');

  return '<div class="pi-hero">'
       +   '<div>'
       +     '<div class="pi-hero-eye">— ' + (dl != null && dl <= 14 ? 'Más urgente · ' : '') + esc(dlText) + '</div>'
       +     '<div class="pi-hero-name">' + esc(p.nombre || '') + '</div>'
       +     '<p class="pi-hero-lede">' + lede + '</p>'
       +     '<div class="pi-hero-meta">'
       +       '<div class="pi-hero-stat"><div class="pi-hero-stat-num">' + (enriched.tasks ? String(enriched.tasks) : "—") + '</div><div class="pi-hero-stat-lbl">tareas activas</div></div>'
       +       '<div class="pi-hero-stat"><div class="pi-hero-stat-num ' + (enriched.overdue ? 'crit' : '') + '">' + (enriched.overdue ? String(enriched.overdue) : "—") + '</div><div class="pi-hero-stat-lbl">vencida' + (enriched.overdue === 1 ? '' : 's') + '</div></div>'
       +       '<div class="pi-hero-stat"><div class="pi-hero-stat-num">' + (teamCount ? String(teamCount) : "—") + '</div><div class="pi-hero-stat-lbl">equipo</div></div>'
       +       '<div class="pi-hero-stat"><div class="pi-hero-stat-num ' + dlCls + '">' + (dl == null ? '—' : (dl < 0 ? Math.abs(dl) : dl)) + '<em>d</em></div><div class="pi-hero-stat-lbl">' + (dl != null && dl < 0 ? 'vencido' : 'al cierre') + '</div></div>'
       +     '</div>'
       +   '</div>'
       +   '<div class="pi-hero-card">'
       +     '<div class="pi-hero-card-eye">— Próximas tareas tuyas</div>'
       +     '<div class="pi-hero-card-h">' + heroHeadline + '</div>'
       +     miniHtml
       +     '<div style="margin-top:14px"><button class="ed-btn primary" onclick="edPiOpen(\'' + esc(p.id) + '\')">Abrir proyecto →</button></div>'
       +   '</div>'
       + '</div>';
}

// ─── PROYECTO · DETALLE ─────────────────────────────────────────
// Render dentro de vEdProyectosIndex cuando EDP.detailId está set.
// Header (nombre + pills + meta), barra multi-segmento por estado,
// 3 KPIs (totales, %completado, próximo deadline) y tabla de tareas.
function _piRenderDetail(p, D) {
  var allTasks = (D && D.tasks) || [];
  var hist     = (D && D.historial) || [];
  var pTasksActive = allTasks.filter(function(t){ return t.proyectoId == p.id; });
  var pTasksDone   = hist.filter(function(t){ return t.proyectoId == p.id; });
  var allP = pTasksActive.concat(pTasksDone);

  // Conteo por status (Pendiente, En curso, En revisión, Bloqueado, Listo)
  var byStatus = { 'Pendiente': 0, 'En curso': 0, 'En revisión': 0, 'Bloqueado': 0, 'Listo': 0 };
  pTasksActive.forEach(function(t){ if (byStatus[t.status] != null) byStatus[t.status]++; });
  byStatus['Listo'] = pTasksDone.length;
  var total = allP.length;
  var pct = total ? Math.round((byStatus['Listo'] / total) * 100) : 0;

  // Próximo deadline: tarea activa con deadlineISO más cercano (futuro o pasado).
  var nextDl = null;
  pTasksActive.forEach(function(t) {
    if (!t.deadlineISO) return;
    if (!nextDl || t.deadlineISO < nextDl.deadlineISO) nextDl = t;
  });
  var nextDlText = nextDl ? (nextDl.deadline + (nextDl.eta ? ' · ' + nextDl.eta : '')) : '—';

  // Avatares de participantes
  var people = (p.participantes || []).slice(0, 6);
  var moreP = (p.participantes || []).length - people.length;
  var avHtml = '';
  people.forEach(function(name) {
    var ini = name.split(/\s+/).slice(0, 2).map(function(w){ return (w[0] || '').toUpperCase(); }).join('');
    avHtml += '<span class="pi-detail-av" title="' + esc(name) + '">' + esc(ini || '?') + '</span>';
  });
  if (moreP > 0) avHtml += '<span class="pi-detail-av more" title="' + moreP + ' más">+' + moreP + '</span>';

  // Barra multi-segmento (porcentajes)
  function segPct(n) { return total ? (n / total * 100) : 0; }
  var segPend = segPct(byStatus['Pendiente']);
  var segCur  = segPct(byStatus['En curso']);
  var segRev  = segPct(byStatus['En revisión']);
  var segBlk  = segPct(byStatus['Bloqueado']);
  var segLis  = segPct(byStatus['Listo']);

  var html = ''
    + '<button class="ed-btn pi-detail-back" onclick="edPiClose()">← Volver a proyectos</button>'
    + '<div class="pi-detail-head">'
    +   '<h1 class="pi-detail-name">' + esc(p.nombre || '') + '</h1>'
    +   '<div class="pi-detail-pills">'
    +     '<span class="ed-pill ' + (p.priority || '').toLowerCase() + '">' + esc(_priorityLabel(p.priority)) + '</span>'
    +     '<span class="ed-pill">' + esc(p.status || 'Activo') + '</span>'
    +   '</div>'
    +   '<div class="pi-detail-meta">'
    +     '<span><span class="lbl">Líder</span>' + esc(p.lider || '—') + '</span>'
    +     '<span><span class="lbl">Plazo</span>' + esc(p.deadline || '—') + '</span>'
    +     (p.pais ? '<span><span class="lbl">País</span>' + esc(p.pais) + '</span>' : '')
    +     (p.tipoTrabajo ? '<span><span class="lbl">Tipo</span>' + esc(p.tipoTrabajo) + '</span>' : '')
    +   '</div>'
    +   (p.descripcion ? '<p class="pi-detail-desc">' + esc(p.descripcion) + '</p>' : '')
    +   (avHtml ? '<div class="pi-detail-people">' + avHtml + '</div>' : '')
    + '</div>';

  // Barra multi-segmento por estado
  html += '<div class="pi-detail-progress">'
       +    '<div class="pi-detail-bar">'
       +      '<div class="pi-detail-seg pend"  style="width:' + segPend + '%" title="Pendiente: ' + byStatus['Pendiente'] + '"></div>'
       +      '<div class="pi-detail-seg curso" style="width:' + segCur + '%" title="En curso: ' + byStatus['En curso'] + '"></div>'
       +      '<div class="pi-detail-seg rev"   style="width:' + segRev + '%" title="En revisión: ' + byStatus['En revisión'] + '"></div>'
       +      '<div class="pi-detail-seg blk"   style="width:' + segBlk + '%" title="Bloqueado: ' + byStatus['Bloqueado'] + '"></div>'
       +      '<div class="pi-detail-seg done"  style="width:' + segLis + '%" title="Listo: ' + byStatus['Listo'] + '"></div>'
       +    '</div>'
       +    '<div class="pi-detail-legend">'
       +      '<span><i class="dot pend"></i>Pendiente · ' + byStatus['Pendiente'] + '</span>'
       +      '<span><i class="dot curso"></i>En curso · ' + byStatus['En curso'] + '</span>'
       +      '<span><i class="dot rev"></i>Revisión · ' + byStatus['En revisión'] + '</span>'
       +      '<span><i class="dot blk"></i>Bloqueada · ' + byStatus['Bloqueado'] + '</span>'

function _edHistFilterByRole(D) {
  var hist = (D && D.historial) || [];
  var role = (typeof _effectiveRole === 'function') ? _effectiveRole() : 'specialist';
  if (role === 'specialist') {
    var name = _effectiveUserName();
    return hist.filter(function(t){ return t.resp === name; });
  }
  if (role === 'manager') {
    var code = _effectiveUserCode();
    return hist.filter(function(t){ return t.pais === code; });
  }
  // head: todo
  return hist.slice();
}

// Días hábiles entre dos Date — replica local del helper usado en rResumen()
// para no depender del orden de declaración entre archivos editados.
function _edBizDaysBetween(from, to) {
  var biz = 0, cur = new Date(from);
  while (cur < to) {
    cur.setDate(cur.getDate() + 1);
    var dy = cur.getDay();
    if (dy !== 0 && dy !== 6) biz++;
  }
  return biz;
}

// ¿Cerrada dentro de SLA? Devuelve null si no podemos calcular (faltan fechas).
function _edWasOnTime(t) {
  if (!t || !t.creado || !t.cerrado) return null;
  var c = pd(t.creado), f = pd(t.cerrado);
  if (!c || !f) return null;
  var biz = _edBizDaysBetween(c, f);
  var lim = (typeof SLA_LIMITS !== 'undefined' && SLA_LIMITS[t.priority]) || 5;
  return biz <= lim;
}

// Días hábiles cerrada vs SLA (negativo = sobró tiempo / on-time).
function _edDaysVsSla(t) {
  if (!t || !t.creado || !t.cerrado) return null;
  var c = pd(t.creado), f = pd(t.cerrado);
  if (!c || !f) return null;
  var biz = _edBizDaysBetween(c, f);
  var lim = (typeof SLA_LIMITS !== 'undefined' && SLA_LIMITS[t.priority]) || 5;
  return biz - lim;
}

function _edHistOnClick() {
  if (typeof toast === 'function') {
    toast('Tarea cerrada — el historial detallado llega pronto', 'info');
  }
}

function rEdHistorial(D) {
  var v = $('vEdHistorial'); if (!v) return;
  var role = (typeof _effectiveRole === 'function') ? _effectiveRole() : 'specialist';
  var hist = _edHistFilterByRole(D);
  var total = hist.length;

  // Métricas: on-time / tarde / esta semana
  var onTime = 0, late = 0, unknown = 0;
  hist.forEach(function(t){
    var ot = _edWasOnTime(t);
    if (ot === true) onTime++;
    else if (ot === false) late++;
    else unknown++;
  });
  var weekCutoff = Date.now() - 7 * 864e5;
  var thisWeek = hist.filter(function(t){
    var f = pd(t.cerrado);
    return f && f.getTime() >= weekCutoff;
  }).length;

  // Eyebrow/H1/Lede by role
  var todayLine = D && D.today ? _todayHumanStr(D.today) : '';
  var eyebrow;
  if (role === 'specialist') {
    eyebrow = 'Tu historial · ' + total + (total === 1 ? ' tarea cerrada' : ' tareas cerradas');
  } else if (role === 'manager') {
    eyebrow = 'Historial · ' + total + (total === 1 ? ' tarea cerrada en tu equipo' : ' tareas cerradas en tu equipo');
  } else {

       + '</div>';

  // Table
  html += '<div class="pa-section-h">'

  if (total === 0) {

  } else {
    var rows = hist.slice().sort(function(a, b){
      var fa = pd(a.cerrado), fb = pd(b.cerrado);
      var ta = fa ? fa.getTime() : 0;

      var dvs = _edDaysVsSla(t);
