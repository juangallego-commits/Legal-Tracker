<script>
// ════════════════════════════════════════════════════════════════
// 1 · CONSTANTS
// ════════════════════════════════════════════════════════════════
const PRIO_ORDER   = {'Alta':0,'Media':1,'Baja':2};
const STATUS_ORDER = {'Bloqueado':0,'En curso':1,'Pendiente':2,'En revisión':3,'Listo':4};
const ALL_STATUSES = ['Pendiente','En curso','En revisión','Bloqueado','Listo'];
const SLA_LIMITS   = {'Alta':2,'Media':5,'Baja':7};

// Badge CSS class maps
const BADGE_PRIO    = {'Alta':'b-alta','Media':'b-media','Baja':'b-baja'};
const EMOJI_PRIO    = {'Alta':'🔴','Media':'🟡','Baja':'🟢'};
const BADGE_STATUS  = {'Pendiente':'b-pendiente','En curso':'b-curso','En revisión':'b-revision','Bloqueado':'b-bloqueado','Listo':'b-listo'};
const BADGE_PSTATUS = {'Activo':'ps-activo','En pausa':'ps-pausa','Completado':'ps-completado','Cancelado':'ps-cancelado'};
const BADGE_RIESGO  = {'Legal alto':'b-riesgo-legal','Reputacional':'b-riesgo-reput','Operativo':'b-riesgo-oper'};

// Avatar gradients
const AVC = [
  'linear-gradient(135deg,#FF4940,#FF6B5B)','linear-gradient(135deg,#5B9BFF,#3B7BEF)',
  'linear-gradient(135deg,#2DD4A0,#059669)','linear-gradient(135deg,#A78BFA,#7C3AED)',
  'linear-gradient(135deg,#FFB938,#E5A020)','linear-gradient(135deg,#22D3EE,#0891B2)',
  'linear-gradient(135deg,#F472B6,#DB2777)','linear-gradient(135deg,#FF6B35,#E85D26)',
  'linear-gradient(135deg,#818CF8,#4F46E5)'
];

// ════════════════════════════════════════════════════════════════
// 2 · STATE
// ════════════════════════════════════════════════════════════════
// Data y usuario inyectados por el template en Dashboard.html antes del include.
// __USER__ viene resuelto por doGet() contra la allowlist de la hoja Equipos;
// si el visitante no está autorizado, ni siquiera se renderiza este script.
var D = (typeof window !== 'undefined' && window.__DATA__) ? window.__DATA__ : {};
var USER = (typeof window !== 'undefined' && window.__USER__) ? window.__USER__ : null;
var F = { country:'ALL', status:'ALL', project:'ALL', search:'', resp:'ALL', projStatus:'ALL' };
var SORT = { col: null, asc: true };
var CH = {};
var EDIT_ID = null;
var EDIT_KIND = null; // 'task' | 'project' — qué se está editando
var CURRENT_USER = USER ? USER.name : null;
var AVC_MAP = {};

// ════════════════════════════════════════════════════════════════
// 2.1 · THEME / TOKEN HELPERS (Fase 0)
// ════════════════════════════════════════════════════════════════
// Read a CSS custom property from :root. Returns the resolved value
// (works for #hex, rgba(), and var() chains).
function getTok(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// Toggle theme (light is default). Persists to localStorage.
// Charts inline token values at construction, so we destroy + re-render
// the active view to pick up the new palette.
function setTheme(theme) {
  if (theme === 'dark') document.documentElement.dataset.theme = 'dark';
  else delete document.documentElement.dataset.theme;
  try { localStorage.setItem('lt-theme', theme === 'dark' ? 'dark' : 'light'); } catch (e) {}
  Chart.defaults.color = getTok('--muted');
  Object.keys(CH).forEach(function(k){ try { CH[k] && CH[k].destroy(); } catch (e) {} CH[k] = null; });
  var active = document.querySelector('.view.active');
  if (!active || !active.id) return;
  // Las vistas editoriales no están en VIEWS y se reendrean vía goEd.
  if (active.id === 'vEdHome' && typeof goEd === 'function') { goEd('home'); return; }
  if (active.id === 'vEdTracker' && typeof goEd === 'function') { goEd('tracker'); return; }
  if (typeof go === 'function') {
    var v = active.id.replace(/^v/, '');
    v = v.charAt(0).toLowerCase() + v.slice(1);
    go(v);
  }
}

// Restore preferred theme on load.
(function(){
  try {
    var pref = localStorage.getItem('lt-theme');
    if (pref === 'dark') document.documentElement.dataset.theme = 'dark';
  } catch (e) {}
})();

// Chart styling derived from tokens. Call inside chart configs so colors
// follow theme switches (combined with CH[k].update() in setTheme).
function chartTheme() {
  return {
    prio:      [getTok('--critical'), getTok('--warn'), getTok('--good')],
    info:      getTok('--info'),
    accent:    getTok('--accent'),
    muted:     getTok('--muted'),
    dim:       getTok('--dim'),
    ink:       getTok('--ink'),
    surface:   getTok('--surface'),
    surface2:  getTok('--surface2'),
    rule:      getTok('--rule'),
    ruleSoft:  getTok('--rule-soft')
  };
}

Chart.defaults.color = getTok('--muted');
Chart.defaults.font.family = "'Nunito Sans',sans-serif";
Chart.defaults.font.size = 12;

// ════════════════════════════════════════════════════════════════
// 3 · RENDER HELPERS (reusable fragment builders)
// ════════════════════════════════════════════════════════════════
// Badges: si se pasa taskId, el badge actúa como trigger de menú (prioridad/estado)
// vía event delegation (data-act). Sin taskId, es solo visual.
function renderPrioBadge(p, taskId) {
  var cls = BADGE_PRIO[p] || 'b-media';
  var emoji = EMOJI_PRIO[p] || '🟡';
  var attrs = taskId != null ? ' data-act="show-prio-menu" data-id="' + taskId + '"' : '';
  return '<span class="badge ' + cls + '"' + attrs + '>' + emoji + ' ' + esc(p || '') + '</span>';
}

function renderStatusBadge(s, taskId, small) {
  var cls = BADGE_STATUS[s] || 'b-pendiente';
  var attrs = taskId != null ? ' data-act="show-status-menu" data-id="' + taskId + '"' : '';
  var style = small ? ' style="font-size:10px;padding:2px 8px"' : '';
  return '<span class="badge ' + cls + '"' + attrs + style + '>' + esc(s || '') + '</span>';
}

function renderProjStatusBadge(s) {
  var cls = BADGE_PSTATUS[s] || 'ps-activo';
  return '<span class="badge ' + cls + '" style="font-size:10px;padding:2px 8px;cursor:default">' + (s || '') + '</span>';
}

// Parses deadline, returns { html, overdue, diff } for the table cell.
function renderDeadlineBadge(deadline) {
  if (!deadline) return { html: '<span class="dl-none">—</span>', overdue: false, diff: null };
  var cls = 'dl-ok', diff = null, dd = pd(deadline);
  if (dd) {
    diff = Math.ceil((dd - new Date()) / 864e5);
    if (diff < 0) cls = 'dl-over';
    else if (diff <= 2) cls = 'dl-warn';
  }
  var overdue = diff !== null && diff < 0;
  var html = '<span class="dl-badge ' + cls + '">' + esc(deadline) + (overdue ? ' ⚠' : '') + '</span>';
  return { html: html, overdue: overdue, diff: diff };
}

function renderTipoCell(tipo) {
  return tipo ? '<span class="b-tt">' + esc(tipo) + '</span>' : '—';
}
function renderRiesgoCell(riesgo) {
  if (!riesgo) return '—';
  var rc = BADGE_RIESGO[riesgo] || '';
  return '<span class="b-tt ' + rc + '">' + esc(riesgo) + '</span>';
}

// Unique member list across equipos (replaces 4 duplicated loops).
function getAllMembers() {
  var all = [];
  if (D.equipos) D.equipos.forEach(function(eq) {
    if (eq.leader && all.indexOf(eq.leader) < 0) all.push(eq.leader);
    (eq.members || []).forEach(function(m) { if (all.indexOf(m) < 0) all.push(m); });
  });
  return all.sort();
}

// Checks if a task is overdue by SLA (business days since creation).
function taskOverdueBySLA(t) {
  if (t.status === 'Listo' || !t.creadoRaw) return false;
  var created = new Date(t.creadoRaw), now = new Date(), bizDays = 0, cur = new Date(created);
  while (cur < now) {
    cur.setDate(cur.getDate() + 1);
    var d = cur.getDay();
    if (d !== 0 && d !== 6) bizDays++;
  }
  return bizDays > (SLA_LIMITS[t.priority] || 5);
}

// ════════════════════════════════════════════════════════════════
// 4 · MAIN RENDER ORCHESTRATOR
// ════════════════════════════════════════════════════════════════

function render() {
  var tasks = ft(), team = fTeam();
  var lastDone = (D.historial && D.historial.length > 0)
    ? (' · Última: ' + D.historial[0].nombre.substring(0, 25))
    : '';
  $('metaInfo').textContent = 'Sem. ' + (D.semana || '') + ' · Act. ' + (D.generated || '') + lastDone;
  $('totalB').textContent     = tasks.length + ' tareas';
  $('pillAll').textContent    = '🌐 Todos (' + D.tasks.length + ')';
  $('tabTracker').textContent = 'Tracker (' + D.tasks.length + ')';
  $('tabHistorial').textContent = 'Historial (' + (D.historial || []).length + ')';
  $('tabProyectos').textContent = 'Proyectos (' + (D.projects || []).length + ')';
  var ov = D.sla ? D.sla.overdue : 0;
  $('ovBadge').classList.toggle('show', ov > 0);
  $('ovN').textContent = ov;
  rDonut(tasks);
  rLoad(team);
  rTeam(team);
  rTable(tasks);
  rPChips();
  rRChips();
  rActiveFilters();
  rAnalytics(tasks, team);
  rHist();
  rProjects();
}

// ═══ FILTER ═══
function taskProjectName(t) {
  if (t.proyectoId && D.projects) {
    var pp = D.projects.find(function(p){ return p.id == t.proyectoId; });
    if (pp) return pp.nombre;
  }
  return t.proyecto || '';
}

// Filtro principal de tareas: combina country, status, project, resp y búsqueda.
function ft() {
  return D.tasks.filter(function(t) {
    if (F.country !== 'ALL') {
      var c = t.pais || mc(t.resp);
      if (c !== F.country) return false;
    }
    if (F.status !== 'ALL' && t.status !== F.status) return false;
    if (F.project !== 'ALL' && taskProjectName(t) !== F.project) return false;
    if (F.resp !== 'ALL' && t.resp !== F.resp) return false;
    if (F.search) {
      var s = F.search.toLowerCase();
      var pn = taskProjectName(t);
      if ((t.nombre || '').toLowerCase().indexOf(s) < 0 &&
          (t.acc    || '').toLowerCase().indexOf(s) < 0 &&
          (t.resp   || '').toLowerCase().indexOf(s) < 0 &&
          (pn       || '').toLowerCase().indexOf(s) < 0 &&
          (t.notas  || '').toLowerCase().indexOf(s) < 0) return false;
    }
    return true;
  });
}

function fTeam() {
  if (F.country === 'ALL') return D.team;
  return D.team.filter(function(t){ return t.country === F.country; });
}

function fHist() {
  return (D.historial || []).filter(function(t) {
    if (F.country !== 'ALL') {
      var c = t.pais || mc(t.resp);
      if (c !== F.country) return false;
    }
    if (F.search) {
      var s = F.search.toLowerCase();
      var pn = '';
      if (t.proyectoId && D.projects) {
        var pp = D.projects.find(function(p){ return p.id == t.proyectoId; });
        if (pp) pn = pp.nombre;
      }
      if ((t.nombre || '').toLowerCase().indexOf(s) < 0 &&
          (pn || '').toLowerCase().indexOf(s) < 0) return false;
    }
    return true;
  });
}

// Retorna el código de país al que pertenece un miembro (leader o member).
function mc(n) {
  if (!n || !D.equipos) return '';
  for (var i = 0; i < D.equipos.length; i++) {
    var e = D.equipos[i];
    if (e.leader === n) return e.code;
    if (e.members && e.members.indexOf(n) >= 0) return e.code;
  }
  return '';
}

function fC(c) {
  F.country = c;
  F.resp = 'ALL';
  document.querySelectorAll('.cpill').forEach(function(b) {
    b.classList.toggle('active', b.dataset.country === c);
  });
  persistFilters();
  render();
}

function fSt(s) {
  F.status = s;
  document.querySelectorAll('#fBar .fbtn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === (s === 'ALL' ? 'Todos' : s));
  });
  persistFilters();
  rTable(ft());
  rActiveFilters();
}

function fPr(p) {
  F.project = F.project === p ? 'ALL' : p;
  persistFilters();
  rPChips();
  rTable(ft());
  rActiveFilters();
}
// Buscador con debounce 200ms — evita recomputar render() en cada keystroke.
var _searchDebounced = debounce(function() {
  F.search = $('sInput').value;
  persistFilters();
  render();
}, 200);
function onS(){ _searchDebounced(); }
function tSort(col) {
  if (SORT.col === col) SORT.asc = !SORT.asc;
  else { SORT.col = col; SORT.asc = true; }
  rTable(ft());
}

function fR(name) {
  F.resp = F.resp === name ? 'ALL' : name;
  persistFilters();
  rRChips();
  rTable(ft());
  rActiveFilters();
}

function fPSt(s) {
  F.projStatus = s;
  document.querySelectorAll('#projFBar .fbtn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === (s === 'ALL' ? 'Todos' : s));
  });
  persistFilters();
  rProjects();
}

// Toggle del filtro "Mis tareas". CURRENT_USER siempre está definido
// (viene resuelto del server via SSO + allowlist).
function toggleMyTasks() {
  var btn = $('myTasksBtn');
  if (F._myTasks) {
    F._myTasks = false;
    F.resp = 'ALL';
    btn.classList.remove('active');
    $('sInput').value = '';
    F.search = '';
  } else {
    if (!CURRENT_USER) { toast('Sesión no identificada', 'error'); return; }
    F._myTasks = true;
    F.resp = CURRENT_USER;
    btn.classList.add('active');
  }
  render();
}
function rRChips() {
  var c = $('rChips');
  if (!c) return;
  var team = fTeam().filter(function(t){ return t.total > 0; });
  c.innerHTML = '<span class="filter-label">Resp:</span>' + team.map(function(t) {
    var active = F.resp === t.name ? ' active' : '';
    return '<button class="pchip' + active + '" data-act="filter-resp" data-arg="' + esc(t.name) + '">'
      + esc(t.name.split(' ').slice(0, 2).join(' ')) + '</button>';
  }).join('');
}
function fTeamCard(name) {
  F.resp = F.resp === name ? 'ALL' : name;
  render();
  var target = document.querySelector('.table-wrap');
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
// ═══ BUILD ═══
function buildUI() {
  // Country pills + country dropdowns
  if (D.equipos) D.equipos.forEach(function(eq) {
    var b = document.createElement('button');
    b.className = 'cpill'; b.dataset.country = eq.code;
    var cnt = D.tasks.filter(function(t) { return (t.pais || mc(t.resp)) === eq.code; }).length;
    b.textContent = eq.code + ' (' + cnt + ')';
    b.title = eq.country;
    b.onclick = function() { fC(eq.code); };
    $('cBar').appendChild(b);
    ['fPais', 'pPais'].forEach(function(id) {
      var o = document.createElement('option');
      o.value = eq.code; o.textContent = eq.code + ' — ' + eq.country;
      $(id).appendChild(o);
    });
  });

  // Member dropdowns (5 selects share the same source)
  getAllMembers().forEach(function(m) {
    ['fResp', 'fLider', 'pResp', 'pLider', 'pPart'].forEach(function(id) {
      var o = document.createElement('option');
      o.value = m; o.textContent = m;
      $(id).appendChild(o);
    });
  });

  // Project dropdown in task form
  if (D.projectList) D.projectList.forEach(function(p) {
    var o = document.createElement('option');
    o.value = p.id; o.textContent = p.nombre;
    $('fProj').appendChild(o);
  });

  // Auto-fill país + líder when responsable changes
  function autoFillFromResp(respId, paisId, liderId) {
    $(respId).addEventListener('change', function() {
      var cc = mc(this.value); if (!cc) return;
      $(paisId).value = cc;
      var eq = D.equipos.find(function(e) { return e.code === cc; });
      if (eq) $(liderId).value = eq.leader;
    });
  }
  autoFillFromResp('fResp', 'fPais', 'fLider');
  autoFillFromResp('pResp', 'pPais', 'pLider');
}

// ═══ CHARTS ═══
// Donut de distribución por prioridad. Anota el total de tareas en el centro.
function rDonut(tasks) {
  var c = $('cPrio');
  if (!c) return;
  if (CH.p) CH.p.destroy();
  var a = 0, m = 0, b = 0;
  tasks.forEach(function(t) {
    if (t.priority === 'Alta') a++;
    else if (t.priority === 'Media') m++;
    else b++;
  });
  var n = tasks.length;
  var th = chartTheme();
  CH.p = new Chart(c, {
    type: 'doughnut',
    data: {
      labels: ['Alta', 'Media', 'Baja'],
      datasets: [{
        data: [a, m, b],
        backgroundColor: th.prio,
        borderColor: th.surface, borderWidth: 4, hoverOffset: 10
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '74%',
      plugins: {
        legend: { position: 'bottom', labels: { padding: 18, usePointStyle: true, pointStyle: 'circle', font: { size: 12, weight: 600 } } },
        tooltip: { backgroundColor: th.surface2, padding: 12, cornerRadius: 10 }
      },
      animation: { duration: 900 }
    },
    plugins: [{
      id: 'ct',
      afterDraw: function(ch) {
        var x = ch.ctx;
        x.save();
        x.font = "800 32px 'JetBrains Mono',monospace";
        x.fillStyle = th.ink;
        x.textAlign = 'center'; x.textBaseline = 'middle';
        x.fillText(n, ch.width / 2, ch.height / 2 - 8);
        x.font = "600 11px 'Nunito Sans',sans-serif";
        x.fillStyle = th.muted;
        x.fillText('tareas', ch.width / 2, ch.height / 2 + 16);
        x.restore();
      }
    }]
  });
}

// Barra horizontal de carga: por persona si hay country filter, por equipo si no.
// Skip si el card está oculto por role-gating (specialist).
function rLoad(team) {
  var c = $('cLoad');
  if (!c) return;
  var card = $('cardLoad');
  if (card && getComputedStyle(card).display === 'none') return;
  if (CH.l) CH.l.destroy();
  var labels, dA, dM, dB;
  if (F.country !== 'ALL') {
    $('loadT').textContent = 'Carga por persona';
    labels = team.map(function(t){ return t.name.split(' ').slice(0, 2).join(' '); });
    dA = team.map(function(t){ return t.alta; });
    dM = team.map(function(t){ return t.media; });
    dB = team.map(function(t){ return t.baja; });
  } else {
    $('loadT').textContent = 'Carga por equipo';
    var cd = {};
    team.forEach(function(t) {
      var cc = t.country || '?';
      if (!cd[cc]) cd[cc] = { a: 0, m: 0, b: 0 };
      cd[cc].a += t.alta; cd[cc].m += t.media; cd[cc].b += t.baja;
    });
    var k = Object.keys(cd).sort();
    labels = k;
    dA = k.map(function(x){ return cd[x].a; });
    dM = k.map(function(x){ return cd[x].m; });
    dB = k.map(function(x){ return cd[x].b; });
  }
  var th = chartTheme();
  CH.l = new Chart(c, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'Alta',  data: dA, backgroundColor: th.prio[0], borderRadius: 6, barPercentage: .5, categoryPercentage: .7 },
        { label: 'Media', data: dM, backgroundColor: th.prio[1], borderRadius: 6, barPercentage: .5, categoryPercentage: .7 },
        { label: 'Baja',  data: dB, backgroundColor: th.prio[2], borderRadius: 6, barPercentage: .5, categoryPercentage: .7 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true, indexAxis: 'y',
      scales: {
        x: { stacked: true, grid: { color: th.ruleSoft }, ticks: { stepSize: 2 } },
        y: { stacked: true, grid: { display: false }, ticks: { font: { size: 12, weight: 700 } } }
      },
      plugins: {
        legend: { position: 'top', align: 'end', labels: { padding: 14, usePointStyle: true, pointStyle: 'circle', font: { size: 11, weight: 600 } } },
        tooltip: { backgroundColor: th.surface2, padding: 12, cornerRadius: 10 }
      },
      animation: { duration: 700 }
    }
  });
}

// ═══ TEAM ═══
function rTeam(team) {
  var g = $('tGrid');
  if (!g) return;
  var at = team.filter(function(t){ return t.total > 0; });
  if (!at.length) { g.innerHTML = ''; return; }
  g.innerHTML = at.map(function(t, i) {
    var bg = AVC[i % AVC.length];
    var s = '';
    if (t.alta > 0)       s += '<span class="tcard-stat" style="background:var(--red-dim);color:var(--red)">' + t.alta + ' alta</span>';
    if (t.enCurso > 0)    s += '<span class="tcard-stat" style="background:var(--blue-dim);color:var(--blue)">' + t.enCurso + ' curso</span>';
    if (t.bloqueado > 0)  s += '<span class="tcard-stat" style="background:var(--yellow-dim);color:var(--yellow)">' + t.bloqueado + ' bloq</span>';
    if (t.enRevision > 0) s += '<span class="tcard-stat" style="background:var(--purple-dim);color:var(--purple)">' + t.enRevision + ' rev</span>';
    if (t.pendiente > 0)  s += '<span class="tcard-stat" style="background:var(--surface3);color:var(--text-muted)">' + t.pendiente + ' pend</span>';
    var sel = F.resp === t.name ? ' tcard-sel' : '';
    return '<div class="tcard' + sel + '" style="cursor:pointer" data-act="filter-team" data-arg="' + esc(t.name) + '">'
      +   '<div class="tcard-top">'
      +     '<div class="tcard-av" style="background:' + bg + '">' + esc(t.initials) + '</div>'
      +     '<div>'
      +       '<div class="tcard-name">' + esc(t.name.split(' ').slice(0, 2).join(' ')) + '</div>'
      +       '<div class="tcard-sub">' + esc(t.country || '') + ' · ' + t.total + '</div>'
      +     '</div>'
      +   '</div>'
      +   '<div class="tcard-stats">' + s + '</div>'
      + '</div>';
  }).join('');
}

// ═══ TABLE ═══
function rTable(tasks) {
  var tb = $('tBody');
  if (!tb) return;
  if (!tasks.length) {
    tb.innerHTML = '<tr><td colspan="11"><div class="empty"><div class="empty-icon">📋</div>No hay tareas</div></td></tr>';
    return;
  }
  // Ordenamiento por columna clickeable (SORT.col)
  if (SORT.col) {
    var sc = SORT.col, sa = SORT.asc;
    tasks = tasks.slice().sort(function(a, b) {
      if (sc === 'priority') {
        return ((PRIO_ORDER[a.priority] || 1) - (PRIO_ORDER[b.priority] || 1)) * (sa ? 1 : -1);
      }
      if (sc === 'status') {
        return ((STATUS_ORDER[a.status] || 2) - (STATUS_ORDER[b.status] || 2)) * (sa ? 1 : -1);
      }
      if (sc === 'deadline') {
        var da = pd(a.deadline), db = pd(b.deadline);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return (da - db) * (sa ? 1 : -1);
      }
      var va = (a[sc] || '').toString().toLowerCase();
      var vb = (b[sc] || '').toString().toLowerCase();
      return va < vb ? (sa ? -1 : 1) : va > vb ? (sa ? 1 : -1) : 0;
    });
  }
  var pMap = {};
  if (D.projects) D.projects.forEach(function(p){ pMap[p.id] = p.nombre; });
  tb.innerHTML = tasks.map(function(t) {
    var dl = renderDeadlineBadge(t.deadline);
    var projName = t.proyectoId && pMap[t.proyectoId] ? pMap[t.proyectoId] : (t.proyecto || '—');
    return '<tr>' +
      '<td class="col-id">' + t.id + '</td>' +
      '<td class="col-nombre" data-act="open-edit" data-id="' + t.id + '">' + esc(t.nombre) + '</td>' +
      '<td><span style="color:var(--purple);font-size:12px">' + esc(projName) + '</span></td>' +
      '<td class="col-resp">' + esc(t.resp) + '</td>' +
      '<td>' + renderPrioBadge(t.priority, t.id) + '</td>' +
      '<td>' + renderStatusBadge(t.status, t.id) + '</td>' +
      '<td>' + dl.html + '</td>' +
      '<td>' + renderTipoCell(t.tipoTrabajo) + '</td>' +
      '<td>' + renderRiesgoCell(t.riesgo) + '</td>' +
      '<td class="col-acc">' + esc(t.acc || '') + '</td>' +
      '<td><button class="btn-icon" data-act="show-task-menu" data-id="' + t.id + '" aria-label="Acciones tarea ' + t.id + '">⋮</button></td>' +
    '</tr>';
  }).join('');
  ['nombre','resp','priority','status','deadline'].forEach(function(c){var el=$('sI_'+c);if(el)el.textContent=SORT.col===c?(SORT.asc?'▲':'▼'):''});
}

// ═══ PROJECTS ═══
function rProjects() {
  var g = $('projGrid');
  if (!g) return;

  var projs = (D.projects || []).filter(function(p) {
    if (F.country !== 'ALL' && p.pais !== F.country) return false;
    if (F.projStatus !== 'ALL' && p.status !== F.projStatus) return false;
    if (F.search) {
      var s = F.search.toLowerCase();
      if ((p.nombre || '').toLowerCase().indexOf(s) < 0 &&
          (p.descripcion || '').toLowerCase().indexOf(s) < 0) return false;
    }
    return true;
  });

  if (!projs.length) {
    g.innerHTML = '<div class="empty"><div class="empty-icon">📁</div>No hay proyectos'
      + (F.country !== 'ALL' ? ' en ' + F.country : '') + '</div>';
    return;
  }

  g.innerHTML = projs.map(function(p) {
    var ts = p.taskStats || { total: 0, listo: 0, pendiente: 0, enCurso: 0, enRevision: 0, bloqueado: 0 };
    var pct = ts.total > 0 ? Math.round(ts.listo / ts.total * 100) : 0;
    var pColor = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--blue)' : 'var(--rappi)';

    var prioBadge = '<span class="badge ' + (BADGE_PRIO[p.priority] || 'b-media')
      + '" style="font-size:10px;padding:2px 8px;cursor:default">'
      + (EMOJI_PRIO[p.priority] || '🟡') + ' ' + esc(p.priority || '') + '</span>';
    var statusBadge = renderProjStatusBadge(p.status);

    var stats = '';
    if (ts.pendiente > 0)  stats += '<span class="pcard-stat" style="background:var(--surface3);color:var(--text-muted)">' + ts.pendiente + ' pend</span>';
    if (ts.enCurso > 0)    stats += '<span class="pcard-stat" style="background:var(--blue-dim);color:var(--blue)">' + ts.enCurso + ' curso</span>';
    if (ts.enRevision > 0) stats += '<span class="pcard-stat" style="background:var(--purple-dim);color:var(--purple)">' + ts.enRevision + ' rev</span>';
    if (ts.bloqueado > 0)  stats += '<span class="pcard-stat" style="background:var(--yellow-dim);color:var(--yellow)">' + ts.bloqueado + ' bloq</span>';
    if (ts.listo > 0)      stats += '<span class="pcard-stat" style="background:var(--green-dim);color:var(--green)">' + ts.listo + ' listo</span>';

    // Lista de tareas del proyecto (colapsada por defecto)
    var taskRows = (p.tasks || []).map(function(t) {
      return '<div class="pcard-task">'
        + '<span class="pcard-task-id">#' + t.id + '</span>'
        + '<span class="pcard-task-name">' + esc(t.nombre) + '</span>'
        + renderStatusBadge(t.status, null, true)
        + '</div>';
    }).join('');

    var info = '<div class="pcard-info">'
      + (p.responsable ? '<span>👤 ' + esc(p.responsable.split(' ').slice(0, 2).join(' ')) + '</span>' : '')
      + (p.participantes && p.participantes.length > 0 ? '<span>👥 +' + p.participantes.length + '</span>' : '')
      + (p.deadline ? '<span>📅 ' + esc(p.deadline) + '</span>' : '')
      + '<span>📋 ' + ts.total + ' tareas</span>'
      + '</div>';

    var progress = '<div class="pcard-progress">'
      + '<div class="pbar-track"><div class="pbar-fill" style="width:' + pct + '%;background:' + pColor + '"></div></div>'
      + '<div class="pbar-label"><span>' + pct + '% completado</span><span>' + ts.listo + '/' + ts.total + '</span></div>'
      + '</div>';

    var countryTag = p.pais
      ? '<span style="font-size:11px;color:var(--text-dim);font-weight:700">' + esc(p.pais) + '</span>'
      : '';

    return '<div class="pcard">'
      + '<div class="pcard-top">'
      +   '<button class="pcard-edit btn-icon" data-act="open-edit-project" data-id="' + p.id + '" aria-label="Editar proyecto ' + esc(p.nombre) + '" title="Editar proyecto">⋮</button>'
      +   '<div class="pcard-meta">' + prioBadge + statusBadge + countryTag + '</div>'
      +   '<div class="pcard-name">' + esc(p.nombre) + '</div>'
      +   (p.descripcion ? '<div class="pcard-desc">' + esc(p.descripcion) + '</div>' : '')
      +   info
      +   progress
      + '</div>'
      + (stats ? '<div class="pcard-stats">' + stats + '</div>' : '')
      + '<div class="pcard-footer">'
      +   '<button class="pcard-add" data-act="create-task-in-project" data-id="' + p.id + '" title="Añadir tarea a este proyecto (preload)">+ tarea</button>'
      +   (ts.total > 0
            ? '<button class="pcard-toggle" data-act="toggle-ptasks"><span class="arrow">▶</span> Ver tareas (' + ts.total + ')</button>'
            : '')
      + '</div>'
      + (ts.total > 0 ? '<div class="pcard-tasks" id="pt' + p.id + '">' + taskRows + '</div>' : '')
      + '</div>';
  }).join('');
}

function rAnalytics(tasks, team) {

function goSub(v) {
  var subs = ['newTask', 'newProj'];
  subs.forEach(function(x) {
    var e = $('sv' + x.charAt(0).toUpperCase() + x.slice(1));
    if (e) e.classList.toggle('active', x === v);

// Helper: build <option> tags. items can be array of strings or [{value,label}].
function buildOptions(items, current, includeBlank) {
  var opts = includeBlank ? '<option value="">' + (typeof includeBlank === 'string' ? includeBlank : '—') + '</option>' : '';
  return opts + items.map(function(item) {
    var v = (typeof item === 'object') ? item.value : item;
    var l = (typeof item === 'object') ? item.label : item;
    var sel = (current == v) ? ' selected' : '';
    return '<option value="' + esc(String(v)) + '"' + sel + '>' + esc(l) + '</option>';
  }).join('');
}

// Sección en el modal de edición: lista de docs actuales + botón subir + pegar link.
// kind: 'task' | 'project'. itemId: id del item. docs: array actual.
function renderDocsSection(kind, itemId, docs) {
  var chips = (docs || []).map(function(d, i) {
    var urlEsc = esc(d.url || '#');
    var nameEsc = esc(d.name || 'Documento');
    var tooltip = d.external ? 'Link externo' : 'Subido por ' + esc(d.uploadedBy || '—');
    return '<span class="doc-chip" title="' + tooltip + '">'

      +      '<button class="doc-chip-x" data-act="remove-doc" data-kind="' + kind + '" data-item-id="' + itemId + '" data-i="' + i + '" aria-label="Quitar">✕</button>'
      +    '</span>';
  }).join('');

  return '<div class="form-section"><div class="form-section-title">Documentos</div>'
    + '<div class="doc-list" id="docList">' + (chips || '<span class="doc-empty">Ningún documento adjunto</span>') + '</div>'
    + '<div class="doc-actions">'
    +   '<label class="doc-upload-btn">'
    +     '📤 Subir archivo'
    +     '<input type="file" id="docFileInput" data-kind="' + kind + '" data-item-id="' + itemId + '" style="display:none" onchange="onDocFileSelected(this)">'
    +   '</label>'
    +   '<div class="doc-link-row">'
    +     '<input type="text" id="docLinkUrl" placeholder="Pegar link de Drive" class="doc-link-input">'
    +     '<input type="text" id="docLinkName" placeholder="Nombre (opcional)" class="doc-link-input">'
    +     '<button class="btn-secondary btn-sm" onclick="attachDocLinkFromForm(\'' + kind + '\', ' + itemId + ')">Vincular</button>'
    +   '</div>'
    + '</div></div>';
}

// File input → base64 → backend. Muestra loader y spinner durante upload.
function onDocFileSelected(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var kind = input.dataset.kind;
  var itemId = Number(input.dataset.itemId);
  if (file.size > 45 * 1024 * 1024) {
    toast('Archivo muy grande (máx 45 MB en Apps Script)', 'error');
    input.value = '';
    return;
  }
  var reader = new FileReader();
  reader.onerror = function(){ toast('Error leyendo archivo', 'error'); input.value = ''; };
  reader.onload = function() {
    var dataUrl = reader.result; // data:<mime>;base64,<data>
    var base64 = String(dataUrl).split(',')[1];
    toast('Subiendo ' + file.name + '...', 'info');
    showLoader();
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoader();
        input.value = '';
        if (res && res.success) {
          toast('✅ ' + file.name + ' subido', 'success');
          reopenEditWithFreshData();
        } else {
          toast('Error: ' + ((res && res.error) || 'upload falló'), 'error');
        }
      })
      .withFailureHandler(function(e) {
        hideLoader();
        input.value = '';
        toast('Error: ' + e.message, 'error');
      })
      .uploadDocument(kind, itemId, { name: file.name, mimeType: file.type, data: base64 });
  };
  reader.readAsDataURL(file);
}

// Pegar un link de Drive existente.
function attachDocLinkFromForm(kind, itemId) {
  var url = $('docLinkUrl').value.trim();
  var name = $('docLinkName').value.trim();
  if (!url) { toast('Pegá un link primero', 'error'); return; }
  showLoader();
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoader();
      if (res && res.success) {
        toast('✅ Link vinculado', 'success');
        reopenEditWithFreshData();
      } else {
        toast('Error: ' + ((res && res.error) || ''), 'error');
      }
    })
    .withFailureHandler(function(e){ hideLoader(); toast('Error: ' + e.message, 'error'); })
    .attachDocumentLink(kind, itemId, { url: url, name: name });
}

// Después de agregar/quitar un doc, recargamos la data del server y re-abrimos
// el modal con la lista refrescada (sin cerrar/volver a abrir visualmente).
function reopenEditWithFreshData() {
  var id = EDIT_ID, kind = EDIT_KIND;
  if (!id) return;
  showLoader();
  google.script.run
    .withSuccessHandler(function(d) {
      hideLoader();
      D = d;
      render();
      // Refresh solo el modal body con data nueva
      if ($('editOv').classList.contains('show')) {
        if (kind === 'task') openEdit(id);
        else if (kind === 'project') openEditProj(id);
      }
    })
    .withFailureHandler(function(e){ hideLoader(); toast('Error al refrescar: ' + e.message, 'error'); })
    .getTrackerData();
}

function openEdit(id) {
  var t = D.tasks.find(function(x) { return x.id == id; });
  if (!t) return;
  EDIT_ID = id;
  EDIT_KIND = 'task';
  $('editT').textContent = 'Editar tarea #' + id;

// Posiciona el dropdown contenido al viewport — evita que se corte en mobile.
function openDD(anchor, html) {
  var m = $('ddM'), o = $('ddO');
  m.innerHTML = html;
  m.style.display = 'block';
  o.style.display = 'block';
  var r = anchor.getBoundingClientRect();
  var mw = m.offsetWidth || 180;
  var mh = m.offsetHeight || 0;
  var vw = window.innerWidth, vh = window.innerHeight;
  // Horizontal: si se sale por la derecha, alinear a la derecha; dejar 8px de margen.
  var left = Math.min(r.left, vw - mw - 8);
  if (left < 8) left = 8;
  // Vertical: si no cabe debajo, abrir arriba del anchor.
  var top = r.bottom + 6;
  if (top + mh > vh - 8 && r.top - mh - 6 > 8) top = r.top - mh - 6;
  m.style.top = top + 'px';
  m.style.left = left + 'px';
}
function closeDD() {
  $('ddM').style.display = 'none';
  $('ddO').style.display = 'none';
}

// Update single field del tarea (dropdown menu items).
// Optimistic: para cambios no-destructivos aplica el cambio en D.tasks antes de
// que el server responda. Si falla, rollback + toast de error. El reload()
// posterior sincroniza stats (KPI/SLA/team/countries) reales del server.
function uf(id, f, v) {
  closeDD();
  var willMoveToHistorial = (f === 'status' && v === 'Listo');
  var task = D.tasks.find(function(x){ return x.id == id; });
  var prevValue = task ? task[f] : null;

  // Aplicar cambio optimista (solo si no va a moverse al historial)
  if (!willMoveToHistorial && task) {
    task[f] = v;
    render();
  }

  showLoader();
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        toast(r.moved ? '✅ Movida a Historial' : '✅ OK', 'success');
        reload(); // Sincroniza stats reales del server
      } else {
        // Rollback: restaurar valor previo
        if (!willMoveToHistorial && task) { task[f] = prevValue; render(); }
        toast('Error: ' + (r.error || ''), 'error');
      }
      hideLoader();
    })
    .withFailureHandler(function(e) {
      if (!willMoveToHistorial && task) { task[f] = prevValue; render(); }
      toast('Error: ' + e.message, 'error');
      hideLoader();
    })
    .updateTaskField(id, f, v);
}

// ═══ HELPERS ═══
function $(id){ return document.getElementById(id); }

// Escapa contenido para insertar en innerHTML (HTML entity encoding).
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// NOTA: escJs ya no se usa (reemplazado por event delegation con data-act).
// Se conserva por si algún hotfix futuro lo necesita.
function escJs(s) {
  if (s == null) return '';
  return String(s)
    .replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"')
    .replace(/\n/g, '\\n').replace(/\r/g, '\\r')
    .replace(/</g, '\\x3c').replace(/>/g, '\\x3e').replace(/&/g, '\\x26');
}
// Parser de fechas robusto: DD/MM/YYYY primero (formato local), luego ISO local,
// luego parser nativo. Evita ambigüedad MM/DD vs DD/MM y desfases de zona horaria.
function pd(s) {
  if (!s) return null;
  s = String(s).trim();

  // 1) DD/MM/YYYY — probar primero para evitar MM/DD/YYYY del parser nativo
  var p = s.split('/');
  if (p.length === 3) {
    var dd = parseInt(p[0], 10), mm = parseInt(p[1], 10), yy = parseInt(p[2], 10);
    if (!isNaN(dd) && !isNaN(mm) && !isNaN(yy)) {
      var d = new Date(yy, mm - 1, dd);
      if (!isNaN(d.getTime())) return d;
    }
  }

  // 2) ISO YYYY-MM-DD — construir local (no UTC) para evitar desfase TZ
  var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) {
    var d2 = new Date(parseInt(iso[1], 10), parseInt(iso[2], 10) - 1, parseInt(iso[3], 10));
    if (!isNaN(d2.getTime())) return d2;
  }

  // 3) Fallback: parser nativo
  var d3 = new Date(s);
  if (!isNaN(d3.getTime())) return d3;
  return null;
}
function toast(msg, type) {
  var e = $('toast');
  e.textContent = msg;
  e.className = 'toast toast-' + (type || 'info') + ' show';
  clearTimeout(e._t);

}

// ═══ RESUMEN EJECUTIVO (head) ═══
// Vista diseñada para el rol head: visibilidad agregada + detectar problemas
// sistémicos. KPIs globales, comparativa por país, proyectos en riesgo y
// tendencia de cierre últimas 8 semanas.
function rResumen() {
  if (!USER || USER.role !== 'head') return;

  var tasks    = D.tasks || [];
  var hist     = D.historial || [];
  var projects = D.projects || [];
  var equipos  = D.equipos || [];

  // Helper: días hábiles entre dos Date
  function bizDaysBetween(from, to) {
    var biz = 0, cur = new Date(from);
    while (cur < to) {
      cur.setDate(cur.getDate() + 1);
      var dy = cur.getDay();
      if (dy !== 0 && dy !== 6) biz++;
    }
    return biz;
  }

  // ── KPIs globales
  var vencidasNow = tasks.filter(taskOverdueBySLA).length;
  var cutoffMs = Date.now() - 30 * 864e5;
  var recentDone = hist.filter(function(t) {
    var f = pd(t.cerrado);
    return f && f.getTime() >= cutoffMs;
  });
  var lateGlobal = recentDone.filter(function(t) {
    if (!t.creado || !t.cerrado) return false;
    var c = pd(t.creado), f = pd(t.cerrado);
    if (!c || !f) return false;
    return bizDaysBetween(c, f) > (SLA_LIMITS[t.priority] || 5);
  }).length;
  var onTimeGlobal = recentDone.length > 0
    ? Math.round((recentDone.length - lateGlobal) / recentDone.length * 100)
    : null;
  var activeProjects = projects.filter(function(p) {
    return p.status !== 'Completado' && p.status !== 'Cancelado';
  }).length;

  if ($('rxActivas'))   $('rxActivas').textContent   = tasks.length;
  if ($('rxVencidas'))  $('rxVencidas').textContent  = vencidasNow;
  if ($('rxOnTime'))    $('rxOnTime').textContent    = onTimeGlobal == null ? '—' : (onTimeGlobal + '%');
  if ($('rxProyectos')) $('rxProyectos').textContent = activeProjects;

  // ── Comparativa por país
  var countryMap = {};
  equipos.forEach(function(eq) {
    countryMap[eq.code] = {
      code: eq.code, name: eq.country, leader: eq.leader,
      activas: 0, vencidas: 0, bloqueadas: 0,
      cerradas30: 0, late30: 0, proyectos: 0
    };
  });
  tasks.forEach(function(t) {
    var cc = t.pais || mc(t.resp);
    if (!countryMap[cc]) return;
    countryMap[cc].activas++;
    if (taskOverdueBySLA(t))     countryMap[cc].vencidas++;
    if (t.status === 'Bloqueado') countryMap[cc].bloqueadas++;
  });
  recentDone.forEach(function(t) {
    var cc = t.pais || mc(t.resp);
    if (!countryMap[cc]) return;
    countryMap[cc].cerradas30++;
    if (!t.creado || !t.cerrado) return;
    var c = pd(t.creado), f = pd(t.cerrado);
    if (!c || !f) return;
    if (bizDaysBetween(c, f) > (SLA_LIMITS[t.priority] || 5)) countryMap[cc].late30++;
  });
  projects.forEach(function(p) {
    if (p.status === 'Completado' || p.status === 'Cancelado') return;
    if (countryMap[p.pais]) countryMap[p.pais].proyectos++;
  });

  var countries = Object.keys(countryMap).map(function(k){ return countryMap[k]; });
  // Ordenar por "temperatura": vencidas*2 + bloqueadas desc
  countries.sort(function(a, b) {
    var heatA = a.vencidas * 2 + a.bloqueadas;
    var heatB = b.vencidas * 2 + b.bloqueadas;
    if (heatA !== heatB) return heatB - heatA;
    return b.activas - a.activas;
  });

  if ($('rxCountriesBadge')) $('rxCountriesBadge').textContent = countries.length + (countries.length === 1 ? ' país' : ' países');
  if ($('rxCountriesBody')) {
    $('rxCountriesBody').innerHTML = countries.map(function(c) {
      var ot = c.cerradas30 > 0 ? Math.round((c.cerradas30 - c.late30) / c.cerradas30 * 100) : null;
      var otColor = ot == null ? 'var(--text-dim)'
                  : ot >= 90   ? 'var(--green)'
                  : ot >= 70   ? 'var(--yellow)'
                               : 'var(--red)';
      var venColor = c.vencidas   > 0 ? 'var(--red)'    : 'var(--text-dim)';
      var blqColor = c.bloqueadas > 0 ? 'var(--yellow)' : 'var(--text-dim)';
      return '<tr>'
        + '<td><strong>' + esc(c.code) + '</strong> <span style="color:var(--text-dim);font-size:11px;margin-left:4px">' + esc(c.name || '') + '</span></td>'
        + '<td class="col-resp">' + esc(c.leader || '—') + '</td>'
        + '<td>' + c.activas + '</td>'
        + '<td><span style="color:' + venColor + ';font-weight:700">' + c.vencidas + '</span></td>'
        + '<td><span style="color:' + blqColor + ';font-weight:700">' + c.bloqueadas + '</span></td>'
        + '<td><span style="color:' + otColor + ';font-weight:700">' + (ot == null ? '—' : ot + '%') + '</span></td>'
        + '<td>' + c.proyectos + '</td>'
        + '</tr>';
    }).join('');
  }

  // ── Proyectos en riesgo: ≥2 bloqueadas o ≥3 vencidas
  var risky = projects
    .filter(function(p){ return p.status !== 'Completado' && p.status !== 'Cancelado'; })
    .map(function(p) {
      var pTasks  = tasks.filter(function(t){ return t.proyectoId == p.id; });
      var blocked = pTasks.filter(function(t){ return t.status === 'Bloqueado'; }).length;
      var overdue = pTasks.filter(taskOverdueBySLA).length;
      return { p: p, blocked: blocked, overdue: overdue, risk: blocked * 2 + overdue };
    })
    .filter(function(x){ return x.blocked >= 2 || x.overdue >= 3; })
    .sort(function(a, b){ return b.risk - a.risk; })
    .slice(0, 8);

  if ($('rxRiskBadge')) $('rxRiskBadge').textContent = risky.length + (risky.length === 1 ? ' proyecto' : ' proyectos');
  if ($('rxRiskList')) {
    if (!risky.length) {
      $('rxRiskList').innerHTML = '<div class="empty" style="padding:40px"><div class="empty-icon">✅</div>Sin proyectos en riesgo</div>';
    } else {
      $('rxRiskList').innerHTML = risky.map(function(x) {
        return '<div class="rx-risk-item" data-act="open-edit-project" data-id="' + x.p.id + '">'
          + '<div class="rx-risk-info">'
          +   '<div class="rx-risk-name">' + esc(x.p.nombre) + '</div>'
          +   '<div class="rx-risk-meta">'
          +     esc(x.p.pais || '—')
          +     (x.p.responsable ? ' · ' + esc(x.p.responsable.split(' ').slice(0,2).join(' ')) : '')
          +   '</div>'
          + '</div>'
          + '<div class="rx-risk-stats">'
          +   (x.blocked > 0 ? '<span class="rx-risk-stat" style="background:var(--yellow-dim);color:var(--yellow)">🟡 ' + x.blocked + '</span>' : '')
          +   (x.overdue > 0 ? '<span class="rx-risk-stat" style="background:var(--red-dim);color:var(--red)">⚠ ' + x.overdue + '</span>' : '')
          + '</div>'
          + '</div>';
      }).join('');
    }
  }

  // ── Tendencia: tareas cerradas por semana (últimas 8 semanas)
  var now = new Date();
  var thisWeekStart = new Date(now);
  thisWeekStart.setHours(0, 0, 0, 0);
  var dow = thisWeekStart.getDay();
  var daysToMonday = dow === 0 ? 6 : dow - 1;
  thisWeekStart.setDate(thisWeekStart.getDate() - daysToMonday);

  var buckets = [0,0,0,0,0,0,0,0];
  hist.forEach(function(t) {
    var f = pd(t.cerrado);
    if (!f) return;
    var diffMs = thisWeekStart.getTime() - f.getTime();
    var weeksAgo = Math.floor(diffMs / (7 * 864e5));
    // Tareas cerradas durante la semana actual aparecen como weeksAgo = -1 (porque
    // thisWeekStart es lunes 00:00 y la tarea se cerró después).
    if (weeksAgo === -1) weeksAgo = 0;
    if (weeksAgo >= 0 && weeksAgo < 8) buckets[weeksAgo]++;
  });

  var labels = [], data = [];
  for (var i = 7; i >= 0; i--) {
    var wDate = new Date(thisWeekStart.getTime() - i * 7 * 864e5);
    labels.push(wDate.getDate() + '/' + (wDate.getMonth() + 1));
    data.push(buckets[i]);
  }

  var canvas = $('rxTrend');
  if (canvas) {
    if (CH.rxTrend) CH.rxTrend.destroy();
    var thT = chartTheme();
    CH.rxTrend = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Cerradas',
          data: data,
          backgroundColor: thT.info,
          borderRadius: 6,
          barPercentage: .6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11, weight: 700 } } },
          y: { grid: { color: thT.ruleSoft }, ticks: { precision: 0 } }
        },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: thT.surface2, padding: 12, cornerRadius: 10 }
        }
      }
    });
  }
}

// ═══ MI EQUIPO (manager + head) ═══
// Grid de miembros con sus stats + Hotspots (tareas vencidas/bloqueadas).
// Para managers el team del backend ya viene filtrado a su país.
// Para heads el team incluye a todos los miembros.
function rMiEquipo() {
  if (!USER || USER.role === 'specialist') return;

  var equipo = D.team || [];
  var tasks  = D.tasks || [];
  var hist   = D.historial || [];

  // Para manager: filtrar team a su país (el backend ya lo hace, defensive).
  if (USER.role === 'manager' && USER.code) {
    equipo = equipo.filter(function(m){ return m.country === USER.code; });
  }

  // Título
  var titleEl = $('meqTitle');
  if (titleEl) titleEl.textContent = USER.role === 'head' ? 'Todos los equipos' : 'Mi equipo (' + (USER.code || '—') + ')';
  var countEl = $('meqTeamCount');
  if (countEl) countEl.textContent = equipo.length + (equipo.length === 1 ? ' persona' : ' personas');

  // ─── Hotspots: tareas vencidas o bloqueadas, ordenadas por antigüedad de creación
  var hotspots = tasks.filter(function(t) {
    if (t.status === 'Bloqueado') return true;
    if (taskOverdueBySLA(t)) return true;
    return false;
  });
  // Ordena por días desde creación, descendente (más viejas primero)
  hotspots.sort(function(a, b) {
    var ca = a.creadoRaw ? new Date(a.creadoRaw).getTime() : Date.now();
    var cb = b.creadoRaw ? new Date(b.creadoRaw).getTime() : Date.now();
    return ca - cb;
  });

  var hsBody = $('meqHotspotsBody');
  var hsCount = $('meqHotspotsCount');
  if (hsCount) hsCount.textContent = hotspots.length + (hotspots.length === 1 ? ' tarea' : ' tareas');
  if (hsBody) {
    if (!hotspots.length) {
      hsBody.innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-icon">🎉</div>Sin hotspots — todo bajo control</div></td></tr>';
    } else {
      hsBody.innerHTML = hotspots.map(function(t) {
        var ageDays = t.creadoRaw
          ? Math.floor((Date.now() - new Date(t.creadoRaw).getTime()) / 864e5)
          : '—';
        var ageClass = (typeof ageDays === 'number' && ageDays > 14) ? ' critical'
                     : (typeof ageDays === 'number' && ageDays > 7)  ? ' warn' : '';
        var dl = renderDeadlineBadge(t.deadline);
        return '<tr>'
          +   '<td class="col-id">' + t.id + '</td>'
          +   '<td class="col-nombre" data-act="open-edit" data-id="' + t.id + '">' + esc(t.nombre) + '</td>'
          +   '<td class="col-resp">' + esc(t.resp) + '</td>'
          +   '<td>' + renderStatusBadge(t.status, t.id) + '</td>'
          +   '<td>' + dl.html + '</td>'
          +   '<td><span class="hotspot-days' + ageClass + '">' + ageDays + (typeof ageDays === 'number' ? 'd' : '') + '</span></td>'
          +   '<td><button class="btn-icon" data-act="show-task-menu" data-id="' + t.id + '" aria-label="Acciones">⋮</button></td>'
          + '</tr>';
      }).join('');
    }
  }

  // ─── Grid de miembros: para cada miembro, computar sus contadores
  // usando tasks + historial visibles (ya filtrados por rol en backend).
  var stats = {}; // name -> {activas, vencidas, bloqueadas, onTimePct, alta, media, baja}
  equipo.forEach(function(m) {
    stats[m.name] = {
      member: m,
      activas: 0,
      vencidas: 0,
      bloqueadas: 0,
      cerradas: 0,
      lateCerradas: 0,
      alta: 0, media: 0, baja: 0
    };
  });
  tasks.forEach(function(t) {
    var s = stats[t.resp];
    if (!s) return;
    s.activas++;
    if (t.priority === 'Alta')  s.alta++;
    if (t.priority === 'Media') s.media++;
    if (t.priority === 'Baja')  s.baja++;
    if (t.status === 'Bloqueado') s.bloqueadas++;
    if (taskOverdueBySLA(t))      s.vencidas++;
  });
  // On-time% a partir del historial (última ventana cercana a 30 días)
  var cutoffMs = Date.now() - 30 * 864e5;
  hist.forEach(function(t) {
    var s = stats[t.resp];
    if (!s || !t.creado || !t.cerrado) return;
    var c = pd(t.creado), f = pd(t.cerrado);
    if (!c || !f || f.getTime() < cutoffMs) return;
    var biz = 0, cur = new Date(c);
    while (cur < f) {
      cur.setDate(cur.getDate() + 1);
      var dy = cur.getDay();
      if (dy !== 0 && dy !== 6) biz++;
    }
    s.cerradas++;
    if (biz > (SLA_LIMITS[t.priority] || 5)) s.lateCerradas++;
  });

  var grid = $('meqGrid');
  if (!grid) return;
  if (!equipo.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>Sin miembros en el equipo</div>';
    return;
  }
  // Ordenar: los que tienen más vencidas/bloqueadas primero (lo que pide atención)
  var sorted = equipo.slice().sort(function(a, b) {
    var sa = stats[a.name], sb = stats[b.name];
    var heatA = (sa ? (sa.vencidas * 2 + sa.bloqueadas) : 0);
    var heatB = (sb ? (sb.vencidas * 2 + sb.bloqueadas) : 0);
    if (heatA !== heatB) return heatB - heatA;
    return a.name.localeCompare(b.name);
  });

  grid.innerHTML = sorted.map(function(m, idx) {
    var s = stats[m.name] || { activas:0, vencidas:0, bloqueadas:0, cerradas:0, lateCerradas:0, alta:0, media:0, baja:0 };
    var bg = AVC[idx % AVC.length];
    var onTime = s.cerradas > 0 ? Math.round((s.cerradas - s.lateCerradas) / s.cerradas * 100) : null;
    var isHot = s.vencidas > 0 || s.bloqueadas > 0;

    // Barra de distribución por prioridad (% del total activas)
    var total = s.alta + s.media + s.baja || 1;
    var bar = '<div class="meq-bar">'
      + (s.alta  > 0 ? '<div class="meq-bar-seg meq-bar-alta"  style="width:' + (s.alta/total*100)  + '%"></div>' : '')
      + (s.media > 0 ? '<div class="meq-bar-seg meq-bar-media" style="width:' + (s.media/total*100) + '%"></div>' : '')
      + (s.baja  > 0 ? '<div class="meq-bar-seg meq-bar-baja"  style="width:' + (s.baja/total*100)  + '%"></div>' : '')
      + '</div>';

    return '<div class="meq-card' + (isHot ? ' meq-hot' : '') + '">'
      + '<div class="meq-head">'
      +   '<div class="meq-av" style="background:' + bg + '">' + esc(m.initials || '') + '</div>'
      +   '<div>'
      +     '<div class="meq-name">' + esc(m.name) + '</div>'
      +     '<div class="meq-country">' + esc(m.country || '—') + '</div>'
      +   '</div>'
      + '</div>'
      + '<div class="meq-stats">'
      +   '<div class="meq-stat"><div class="meq-stat-num" style="color:var(--blue)">'   + s.activas    + '</div><div class="meq-stat-lbl">Activas</div></div>'
      +   '<div class="meq-stat"><div class="meq-stat-num" style="color:var(--red)">'    + s.vencidas   + '</div><div class="meq-stat-lbl">Vencidas</div></div>'
      +   '<div class="meq-stat"><div class="meq-stat-num" style="color:var(--yellow)">' + s.bloqueadas + '</div><div class="meq-stat-lbl">Bloq.</div></div>'
      +   '<div class="meq-stat"><div class="meq-stat-num" style="color:var(--green)">'
      +      (onTime == null ? '—' : (onTime + '%'))
      +      '</div><div class="meq-stat-lbl">On-time</div></div>'
      + '</div>'
      + '<div class="meq-bar-row">'
      +   '<span style="color:var(--red)">' + s.alta + '</span>'
      +   bar
      +   '<span style="color:var(--green)">' + s.baja + '</span>'
      + '</div>'
      + '<button class="meq-view-btn" data-act="view-member-tasks" data-arg="' + esc(m.name) + '">Ver sus tareas →</button>'
      + '</div>';
  }).join('');
}

// ═══ MI DESEMPEÑO ═══
// Calcula métricas personales del specialist:
//   1. Racha on-time: cuántas de las últimas tareas cerradas se cerraron
//      dentro del SLA de su prioridad (consecutivas desde la más reciente).
//      Es "motivacional" — se rompe con la primera tarde.
//   2. Tiempo promedio de cierre por prioridad: (cerrado - creado) en días
//      hábiles, promediado por grupo. Muestra los 30 días más recientes
//      para que refleje desempeño actual, no histórico de hace años.
function _computeAndRenderPerf(myDone) {
  var cutoffMs = Date.now() - 30 * 864e5;

  // Ayudante: días hábiles entre dos fechas (excluye sábados y domingos).
  function bizDaysBetween(from, to) {
    var biz = 0, cur = new Date(from);
    while (cur < to) {
      cur.setDate(cur.getDate() + 1);
      var dy = cur.getDay();
      if (dy !== 0 && dy !== 6) biz++;
    }
    return biz;
  }

  // ── Racha on-time (últimas 10, consecutivas desde la más reciente)
  var recent = myDone.slice().sort(function(a, b) {
    var ca = pd(a.cerrado), cb = pd(b.cerrado);
    if (!ca && !cb) return 0;
    if (!ca) return 1;
    if (!cb) return -1;
    return cb - ca;
  }).slice(0, 20);
  var streak = 0;
  for (var i = 0; i < recent.length; i++) {
    var t = recent[i];
    if (!t.creado || !t.cerrado) break;
    var c = pd(t.creado), f = pd(t.cerrado);
    if (!c || !f) break;
    var biz = bizDaysBetween(c, f);
    var limit = SLA_LIMITS[t.priority] || 5;
    if (biz > limit) break;
    streak++;
  }

  // ── Tiempo promedio de cierre por prioridad (últimos 30 días)
  var sums = { Alta: { n: 0, b: 0 }, Media: { n: 0, b: 0 }, Baja: { n: 0, b: 0 } };
  myDone.forEach(function(t) {
    if (!t.creado || !t.cerrado) return;
    var c = pd(t.creado), f = pd(t.cerrado);
    if (!c || !f) return;
    if (f.getTime() < cutoffMs) return;
    var bucket = sums[t.priority];
    if (!bucket) return;
    bucket.n++;
    bucket.b += bizDaysBetween(c, f);
  });

  function fmtAvg(bucket, slaLimit) {
    if (!bucket.n) return '—';
    var avg = bucket.b / bucket.n;
    return avg.toFixed(1);
  }

  // ── Render
  if ($('mtStreak')) {
    $('mtStreak').textContent = streak;
    $('mtStreak').style.color = streak >= 5 ? 'var(--green)'
                              : streak >= 1 ? 'var(--rappi)'
                                            : 'var(--text-dim)';
  }
  if ($('mtStreakSub')) {
    $('mtStreakSub').textContent = streak === 0
      ? 'última cerrada fuera de SLA'
      : streak === 1
        ? 'tarea cerrada a tiempo'
        : streak + ' tareas seguidas a tiempo';
    // Texto del hijo ya tiene el número; simplificamos:
    $('mtStreakSub').textContent = 'tareas seguidas a tiempo';
  }
  if ($('mtAvgAlta'))  $('mtAvgAlta').textContent  = fmtAvg(sums.Alta)  + (sums.Alta.n  ? 'd' : '');
  if ($('mtAvgMedia')) $('mtAvgMedia').textContent = fmtAvg(sums.Media) + (sums.Media.n ? 'd' : '');
  if ($('mtAvgBaja'))  $('mtAvgBaja').textContent  = fmtAvg(sums.Baja)  + (sums.Baja.n  ? 'd' : '');
}

// ═══ MIS TAREAS ═══
// Vista agrupada por urgencia. La ordenación no es por prioridad sino por
// cuán pronto vence la tarea, que es lo que le importa al specialist día a día.
// Buckets:
//   ⚠ Vencidas       deadline pasado y no Listo
//   🔥 Hoy           deadline = hoy
//   📅 Esta semana   deadline en los próximos 7 días
//   🔜 Después       deadline más lejano
//   📋 Sin deadline  task sin deadline definido
function rMisTareas() {
  if (!CURRENT_USER) return;
  var myTasks = D.tasks.filter(function(t){ return t.resp === CURRENT_USER; });
  var myDone  = (D.historial || []).filter(function(t){ return t.resp === CURRENT_USER; });

  // Atraso: tareas activas vencidas por SLA (no counts cerradas)
  var atraso = myTasks.filter(taskOverdueBySLA).length;

  // Cerradas esta semana (label textual del tracker)
  var semLabel = D.semana || '';
  var cerradasSemana = myDone.filter(function(t){ return t.semana === semLabel; }).length;

  // % on-time: de las tareas cerradas, cuáles cumplieron su SLA en días hábiles.
  var totalDone = myDone.length;
  var lateDone = myDone.filter(function(t) {
    if (!t.creado || !t.cerrado) return false;
    var c = pd(t.creado), f = pd(t.cerrado);
    if (!c || !f) return false;
    var biz = 0, cur = new Date(c);
    while (cur < f) {
      cur.setDate(cur.getDate() + 1);
      var dy = cur.getDay();
      if (dy !== 0 && dy !== 6) biz++;
    }
    return biz > (SLA_LIMITS[t.priority] || 5);
  }).length;
  var onTimePct = totalDone > 0 ? Math.round((totalDone - lateDone) / totalDone * 100) : 100;

  $('mt-total').textContent  = myTasks.length;
  $('mt-atraso').textContent = atraso;
  $('mt-semana').textContent = cerradasSemana;
  $('mt-ontime').textContent = onTimePct + '%';
  $('mtTitle').textContent   = 'Mis tareas activas — ' + CURRENT_USER + ' (' + myTasks.length + ')';

  // ─────────── Mi desempeño ────────────────────────────────────────────
  // Solo tiene sentido si el specialist ha cerrado al menos una tarea.
  var perfCard = $('mtPerfCard');
  if (perfCard) {
    if (!myDone.length) {
      perfCard.style.display = 'none';
    } else {
      perfCard.style.display = '';
      _computeAndRenderPerf(myDone);
    }
  }

  var tb = $('mtBody');
  if (!tb) return;
  if (!myTasks.length) {
    tb.innerHTML = '<tr><td colspan="8"><div class="empty"><div class="empty-icon">🎉</div>¡Sin tareas pendientes!</div></td></tr>';
    return;
  }

  // Clasificar tareas en buckets de urgencia
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var todayMs = today.getTime();
  var weekEndMs = todayMs + 7 * 864e5;

  var buckets = { vencidas: [], hoy: [], semana: [], despues: [], sinFecha: [] };
  myTasks.forEach(function(t) {
    if (!t.deadline) { buckets.sinFecha.push(t); return; }
    var d = pd(t.deadline);
    if (!d) { buckets.sinFecha.push(t); return; }
    d.setHours(0, 0, 0, 0);
    var dMs = d.getTime();
    if (dMs < todayMs)        buckets.vencidas.push(t);
    else if (dMs === todayMs) buckets.hoy.push(t);
    else if (dMs <= weekEndMs) buckets.semana.push(t);
    else                      buckets.despues.push(t);
  });

  // Sort dentro de cada bucket: por prioridad y luego por deadline ascendente
  var sortBucket = function(arr) {
    return arr.sort(function(a, b) {
      var pa = PRIO_ORDER[a.priority] || 1, pb = PRIO_ORDER[b.priority] || 1;
      if (pa !== pb) return pa - pb;
      var da = pd(a.deadline), db = pd(b.deadline);
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return da - db;
    });
  };
  Object.keys(buckets).forEach(function(k){ buckets[k] = sortBucket(buckets[k]); });

  var pMap = {};
  if (D.projects) D.projects.forEach(function(p){ pMap[p.id] = p.nombre; });

  // Render cada bucket no-vacío como sección separada
  var sections = [
    { key: 'vencidas', label: '⚠ Vencidas',      cls: 'mt-bucket-vencidas' },
    { key: 'hoy',      label: '🔥 Hoy',          cls: 'mt-bucket-hoy' },
    { key: 'semana',   label: '📅 Esta semana',  cls: 'mt-bucket-semana' },
    { key: 'despues',  label: '🔜 Después',      cls: 'mt-bucket-despues' },
    { key: 'sinFecha', label: '📋 Sin deadline', cls: 'mt-bucket-sinfecha' }
  ];

  var html = '';
  sections.forEach(function(s) {
    var bucket = buckets[s.key];
    if (!bucket.length) return;
    // Header row
    html += '<tr class="mt-section-row ' + s.cls + '">'
         +    '<td colspan="8">' + s.label + ' <span class="mt-section-count">' + bucket.length + '</span></td>'
         +  '</tr>';
    // Task rows
    bucket.forEach(function(t) {
      var dl = renderDeadlineBadge(t.deadline);
      var pn = t.proyectoId && pMap[t.proyectoId] ? pMap[t.proyectoId] : (t.proyecto || '—');
      html += '<tr>'
           +   '<td class="col-id">' + t.id + '</td>'
           +   '<td class="col-nombre" data-act="open-edit" data-id="' + t.id + '">' + esc(t.nombre) + '</td>'

// ═══ TAGS INPUT (accionables y participantes) ═══
function initTagsInput(containerId, hiddenId, suggestions) {
  var container = $(containerId), hidden = $(hiddenId);
  if (!container) return;
  var tags = [];

  function refresh() {
    hidden.value = tags.join(', ');
    container.querySelectorAll('.tag').forEach(function(t){ t.remove(); });
    var input = container.querySelector('.tags-text');
    tags.forEach(function(tag, i) {
      var span = document.createElement('span');
      span.className = 'tag';
      // tag-x usa event delegation via data-act="remove-tag"
      span.innerHTML = esc(tag) + '<span class="tag-x" data-act="remove-tag" data-container="'
        + esc(containerId) + '" data-i="' + i + '">×</span>';
      container.insertBefore(span, input);
    });
  }

  var input = document.createElement('input');
  input.className = 'tags-text';
  input.placeholder = tags.length ? '' : 'Escribe y presiona Enter...';
  input.onkeydown = function(e) {
    if ((e.key === 'Enter' || e.key === ',') && this.value.trim()) {
      e.preventDefault();
      var v = this.value.trim().replace(/,$/, '');
      if (v && tags.indexOf(v) < 0) tags.push(v);
      this.value = '';
      refresh();
    } else if (e.key === 'Backspace' && !this.value && tags.length) {
      tags.pop();
      refresh();
    }
  };
  container.appendChild(input);

  // Sugerencias: usa el ddMenu para mostrar una lista; items con data-act="add-tag".
  if (suggestions) {
    input.onkeyup = function() {
      var v = this.value.toLowerCase();
      if (v.length < 2) return;
      var match = suggestions.filter(function(s) {
        return s.toLowerCase().indexOf(v) >= 0 && tags.indexOf(s) < 0;
      });
      if (!match.length) return;
      var dd = $('ddM'), overlay = $('ddO');
      dd.innerHTML = '<div class="dd-label">Sugerencias</div>' + match.slice(0, 5).map(function(m) {
        return '<div class="dd-item" data-act="add-tag" data-container="' + esc(containerId)
          + '" data-val="' + esc(m) + '">' + esc(m) + '</div>';
      }).join('');
      dd.style.display = 'block';
      overlay.style.display = 'block';
      var r = input.getBoundingClientRect();
      dd.style.top = (r.bottom + 4) + 'px';
      dd.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 200)) + 'px';
    };
  }

  return {
    add: function(v){ if (v && tags.indexOf(v) < 0) { tags.push(v); refresh(); } },
    get: function(){ return tags; },
    clear: function(){ tags = []; refresh(); },
    remove: function(i){ tags.splice(i, 1); refresh(); }
  };
}

  'filter-resp':     function(el){ fR(el.dataset.arg); },

  'update-field-confirm': function(el){ cfUp(Number(el.dataset.id), el.dataset.field, el.dataset.val); },
  'add-tag':         function(el){ addTag(el.dataset.container, el.dataset.val); },
  'remove-tag':      function(el){ removeTag(el.dataset.container, Number(el.dataset.i)); },
  'clear-filter':    function(el){ var i = Number(el.dataset.i); if (_filterClearers[i]) { _filterClearers[i](); persistFilters(); render(); } },
  'clear-all-filters': function(){ clearAllFilters(); },
  'create-task-in-project': function(el){ openCreate('newTask', Number(el.dataset.id)); },
  'view-member-tasks': function(el) {
    // Desde "Mi equipo": ir al Tracker con el filtro del miembro aplicado
    F.resp = el.dataset.arg;
    persistFilters();
    go('tracker');
    render();
  },
  'remove-doc':      function(el){
    var kind = el.dataset.kind;
    var itemId = Number(el.dataset.itemId);
    var i = Number(el.dataset.i);
    if (!confirm('¿Quitar este documento del tracker? (no se borra del Drive)')) return;
    showLoader();
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoader();
        if (res && res.success) { toast('✅ Documento removido', 'success'); reopenEditWithFreshData(); }
        else toast('Error: ' + ((res && res.error) || ''), 'error');
      })
      .withFailureHandler(function(e){ hideLoader(); toast('Error: ' + e.message, 'error'); })
      .removeDocument(kind, itemId, i);
  }
};
document.addEventListener('click', function(e) {
  var el = e.target.closest && e.target.closest('[data-act]');
  if (!el) return;
  var handler = ACTIONS[el.dataset.act];
  if (!handler) return;
  // Los menús dropdown necesitan detener la propagación para no cerrarse al instante
  if (el.dataset.act.indexOf('show-') === 0) e.stopPropagation();
  handler(el, e);
});

// KEYBOARD SHORTCUTS
//  · Esc  → cierra modales/dropdowns
//  · /    → enfoca el buscador
// ════════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if ($('ddM') && $('ddM').style.display === 'block') { closeDD(); return; }
    if ($('createOv') && $('createOv').classList.contains('show')) { closeCreate(); return; }
    if ($('editOv') && $('editOv').classList.contains('show')) { closeEdit(); return; }
    if ($('confOv') && $('confOv').classList.contains('show')) { closeCf(); return; }
    return;
  }
  var ae = document.activeElement;
  var inInput = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT');
  if (inInput) return;
  if (e.key === '/') {
    var sInput = $('sInput');
    if (sInput) { e.preventDefault(); sInput.focus(); sInput.select(); }
    return;
  }
  // N → abrir modal de creación (no dentro de un input)
  if (e.key === 'n' || e.key === 'N') {
    if ($('createOv') && !$('createOv').classList.contains('show')) {
      e.preventDefault();
      openCreate();
    }
  }
});

// DEBOUNCE
// ════════════════════════════════════════════════════════════════
function debounce(fn, wait) {
  var t;
  return function() {
    var ctx = this, args = arguments;
    clearTimeout(t);
    t = setTimeout(function(){ fn.apply(ctx, args); }, wait);
  };
}

// PERSISTENCIA DE FILTROS
// Guarda/restaura F en localStorage para que el contexto de trabajo
// sobreviva al recargar. Excluye propiedades internas (_myTasks, etc).
// ════════════════════════════════════════════════════════════════
var FILTER_KEY = 'lt_filters_v1';
var PERSISTED_KEYS = ['country','status','project','resp','search','projStatus'];

function persistFilters() {
  try {
    var snapshot = {};
    PERSISTED_KEYS.forEach(function(k){ snapshot[k] = F[k]; });
    localStorage.setItem(FILTER_KEY, JSON.stringify(snapshot));
  } catch (e) { /* localStorage no disponible o bloqueado */ }
}

function restoreFilters() {
  try {
    var raw = localStorage.getItem(FILTER_KEY);
    if (!raw) return;
    var obj = JSON.parse(raw);
    PERSISTED_KEYS.forEach(function(k){ if (obj[k] !== undefined) F[k] = obj[k]; });
    if (F.search) $('sInput') && ($('sInput').value = F.search);
  } catch (e) {}
}

var _loaderCount = 0;
function showLoader() {
  _loaderCount++;
  var el = $('loaderBar');

}
function hideLoader() {
  _loaderCount = Math.max(0, _loaderCount - 1);
  if (_loaderCount === 0) {
    var el = $('loaderBar');
    if (el) el.classList.remove('show');
  }
}

  if (status === 'Bloqueado') return 'crit';
  if (etaDays == null) return 'dim';

  if (!t) return '';

    if (p && p.nombre) return p.nombre;

function _todayHumanStr(iso) {
  // Devuelve "Jue 23 abr" desde "YYYY-MM-DD" sin drift de timezone.
  if (!iso) return '';
  var m = iso.toString().match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  var d = new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10));
  var dows = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var mons = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return dows[d.getDay()] + ' ' + d.getDate() + ' ' + mons[d.getMonth()];
}

function goEd(viewId) {

         +    '<span></span><span>País / Líder</span><span>Abiertas</span><span>Vencidas</span><span>SLA</span><span>Tendencia 30d</span>'
         + '</div>';
    var maxTrend = countries.reduce(function(m, c){
      var arr = c.trend || [];
      for (var i = 0; i < arr.length; i++) if (arr[i] > m) m = arr[i];
      return m;
    }, 1);
    for (var i = 0; i < countries.length; i++) {
      var c = countries[i];

      var trend = c.trend || [];

      for (var k = 0; k < trend.length; k++) {
        var ratio = maxTrend > 0 ? trend[k] / maxTrend : 0;

           +    '<div class="hq-num ' + slaCls + '">' + (sla || '—') + (sla ? '%' : '') + '</div>'
           +    '<div class="hq-spark">' + sparkHtml + '</div>'
           + '</div>';
    }
  }
  html += '</section>';

  v.innerHTML = html;
