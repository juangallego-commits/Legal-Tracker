var EDT = { filter: 'all', search: '', selectedId: null };

function _etaTextFromDays(d) {
  if (typeof d !== 'number') return '';
  if (d < 0)  return 'venció hace ' + Math.abs(d) + 'd';
  if (d === 0) return 'vence HOY';
  if (d === 1) return 'mañana';
  return 'en ' + d + 'd';
}

function _edFilterByRole(tasks, role, userName, userCode) {
  // Specialist: solo sus tareas. Manager: su país. Head: todo.
  if (role === 'specialist') return tasks.filter(function(t){ return t.resp === userName; });
  if (role === 'manager')    return tasks.filter(function(t){ return (t.pais || '') === userCode; });
  return tasks;
}

function _edApplyFilter(tasks, filter) {
  if (filter === 'overdue') return tasks.filter(function(t){ return typeof t.etaDays === 'number' && t.etaDays < 0 && t.status !== 'Listo'; });
  if (filter === 'today')   return tasks.filter(function(t){ return t.etaDays === 0 && t.status !== 'Listo'; });
  if (filter === 'blocked') return tasks.filter(function(t){ return t.status === 'Bloqueado'; });
  return tasks.filter(function(t){ return t.status !== 'Listo'; });
}

function _edApplySearch(tasks, q) {
  if (!q) return tasks;
  var s = q.toLowerCase();
  return tasks.filter(function(t) {
    return ((t.id || '') + '').toLowerCase().indexOf(s) >= 0
        || ((t.nombre || '') + '').toLowerCase().indexOf(s) >= 0
        || ((t.resp || '') + '').toLowerCase().indexOf(s) >= 0
        || ((t.proyecto || '') + '').toLowerCase().indexOf(s) >= 0
        || ((t.tipoTrabajo || '') + '').toLowerCase().indexOf(s) >= 0;
  });
}

function _edSortByUrgency(tasks) {
  return tasks.slice().sort(function(a, b) {
    var aBlk = a.status === 'Bloqueado' ? -1 : 0;
    var bBlk = b.status === 'Bloqueado' ? -1 : 0;
    if (aBlk !== bBlk) return aBlk - bBlk;
    var ad = (typeof a.etaDays === 'number') ? a.etaDays : 9999;
    var bd = (typeof b.etaDays === 'number') ? b.etaDays : 9999;
    return ad - bd;
  });
}

// EDT actions wired desde la toolbar / filas del tracker
function edSetFilter(f) { EDT.filter = f; if (D) rEdTracker(D); }
function edSetSearch(q) { EDT.search = q || ''; if (D) rEdTracker(D); }
function edSelectTask(id) {
  EDT.selectedId = (EDT.selectedId === id) ? null : id;
  if (D) rEdTracker(D);
}
function edClosePanel() { EDT.selectedId = null; if (D) rEdTracker(D); }

function _panelCell(lbl, val, valCls) {
  return '<div class="tk-panel-cell">'
       +   '<div class="lbl">' + esc(lbl) + '</div>'
       +   '<div class="val' + (valCls ? ' ' + valCls : '') + '">' + esc(val == null || val === '' ? '—' : val) + '</div>'
       + '</div>';
}

function _buildEdTimeline(t) {
  // Timeline sintética desde campos disponibles. No tocamos backend en Fase 1.
  var items = [];
  if (typeof t.etaDays === 'number' && t.etaDays < 0) {
    items.push({ when: 'Hoy', what: 'Sistema marcó <b>vencida</b>. Revisá próxima acción.', dot: 'crit' });
  } else if (t.etaDays === 0) {
    items.push({ when: 'Hoy', what: '<b>Vence hoy.</b> Cerrar antes de fin de día.', dot: 'crit' });
  }
  if (t.status === 'Bloqueado' && t.blockedReason) {
    items.push({ when: '—', what: 'Estado: <b>Bloqueado</b> · ' + esc(t.blockedReason), dot: 'crit' });
  }
  if (t.cerrado) {
    items.push({ when: t.cerrado, what: 'Tarea <b>cerrada</b>.', dot: 'good' });
  }
  if (t.creado) {
    items.push({ when: t.creado, what: 'Tarea creada' + (t.resp ? ' · asignada a <b>' + esc(t.resp) + '</b>' : ''), dot: 'info' });
  }
  if (items.length === 0) {
    items.push({ when: '—', what: 'Sin actividad registrada.', dot: 'info' });
  }
  return items;
}

function rEdTracker(D) {
  var v = $('vEdTracker'); if (!v) return;
  var role = (D && D._role) || (USER && USER.role) || 'specialist';
  var userName = (USER && USER.name) || (D && D._user && D._user.name) || '';
  var userCode = (USER && USER.code) || (D && D._user && D._user.code) || '';
  var allTasks = (D && D.tasks) || [];
  var roleTasks = _edFilterByRole(allTasks, role, userName, userCode);

  // Counts por filtro (sobre el conjunto del rol, sin filtro activo)
  var cAll      = roleTasks.filter(function(t){ return t.status !== 'Listo'; }).length;
  var cOverdue  = roleTasks.filter(function(t){ return typeof t.etaDays === 'number' && t.etaDays < 0 && t.status !== 'Listo'; }).length;
  var cToday    = roleTasks.filter(function(t){ return t.etaDays === 0 && t.status !== 'Listo'; }).length;
  var cBlocked  = roleTasks.filter(function(t){ return t.status === 'Bloqueado'; }).length;

  var rows = _edApplySearch(_edApplyFilter(roleTasks, EDT.filter), EDT.search);
  rows = _edSortByUrgency(rows);

  var sel = EDT.selectedId ? rows.find(function(t){ return t.id == EDT.selectedId; }) || roleTasks.find(function(t){ return t.id == EDT.selectedId; }) : null;
  // Aplicar / quitar la clase with-panel sobre #edMain
  var edMain = document.getElementById('edMain');
  if (edMain) edMain.classList.toggle('with-panel', !!sel);

  // EYEBROW + H1 + LEDE
  var eyebrow = role === 'head' ? 'Tracker · Global'
              : role === 'manager' ? ('Tracker · Equipo ' + userCode)
              : 'Tracker · Mis tareas';
  var lede = role === 'head'
    ? ('LATAM con ' + cAll + ' tareas activas. Cliquea cualquier fila para ver detalle.')
    : role === 'manager'
      ? (cAll + ' tareas activas en tu equipo. Cliquea cualquier fila para ver detalle, historial y reasignar.')
      : ('Tus ' + cAll + ' tareas activas. Cliquea cualquiera para ver detalle, historial y siguiente acción.');

  var html = ''
    + '<div class="ed-eye">' + esc(eyebrow) + '</div>'
    + '<h1 class="ed-h1" style="margin-bottom:8px">Tracker</h1>'
    + '<p class="ed-lede" style="margin-bottom:28px">' + esc(lede) + '</p>';

  // TOOLBAR
  function fBtn(key, label, count, accent) {
    var active = EDT.filter === key;
    var countCls = accent && count ? ' style="color:var(--' + accent + ')"' : '';
    return '<button class="tk-filter' + (active ? ' active' : '') + '" onclick="edSetFilter(\'' + key + '\')">'
         +    esc(label)
         +    '<span class="tk-filter-count"' + countCls + '>' + count + '</span>'
         + '</button>';
  }
  html += '<div class="tk-toolbar">'
       +    fBtn('all',     'Todas',      cAll,     null)
       +    fBtn('overdue', 'Vencidas',   cOverdue, 'critical')
       +    fBtn('today',   'Hoy',        cToday,   'warn')
       +    fBtn('blocked', 'Bloqueadas', cBlocked, null)
       +    '<input class="tk-search" type="text" placeholder="⌘F filtrar por proyecto, persona, tipo…" '
       +      'value="' + esc(EDT.search) + '" oninput="edSetSearch(this.value)">'
       + '</div>';

  // TABLE
  var respCol = role === 'specialist' ? 'Proyecto' : 'Responsable';
  html += '<table class="tk-table">'
       +    '<thead><tr>'
       +      '<th>ID</th><th>Tarea</th><th>' + respCol + '</th><th>Prioridad</th><th>Estado</th><th>ETA</th>'
       +    '</tr></thead><tbody>';
  if (rows.length === 0) {
    html += '<tr><td colspan="6" style="padding:32px 14px;color:var(--dim);font-size:13px">Sin tareas para este filtro.</td></tr>';
  } else {
    for (var i = 0; i < rows.length; i++) {
      var t = rows[i];
      var pn = _projNameForTask(t);
      var meta = (t.tipoTrabajo || '—') + ' · ' + pn + (t.pais ? ' · ' + t.pais : '');
      var etaTxt = t.eta || _etaTextFromDays(t.etaDays);
      var etaTone = _etaToneClass(t.etaDays, t.status);
      var isSel = sel && sel.id == t.id;
      html += '<tr class="tk-row' + (isSel ? ' selected' : '') + '" onclick="edSelectTask(\'' + esc(t.id) + '\')">'
           +    '<td><span class="tk-id">' + esc(t.id) + '</span></td>'
           +    '<td>'
           +      '<div class="tk-name">' + esc(t.nombre || '') + '</div>'
           +      '<div class="tk-name-meta">' + esc(meta) + '</div>'
           +    '</td>'
           +    '<td>' + esc(role === 'specialist' ? pn : (t.resp || '—')) + '</td>'
           +    '<td><span class="ed-pill ' + (t.priority || '').toLowerCase() + '">' + esc(t.priority || '') + '</span></td>'
           +    '<td><span class="ed-pill ' + _statusClass(t.status) + '">' + esc(t.status || '') + '</span></td>'
           +    '<td><span class="tk-eta ' + etaTone + '">' + esc(etaTxt) + '</span></td>'
           + '</tr>';
    }
  }
  html += '</tbody></table>';

  // PANEL (si hay selección)
  if (sel) {
    var pn2 = _projNameForTask(sel);
    var blockCls = (sel.status === 'Bloqueado' || (typeof sel.etaDays === 'number' && sel.etaDays < 0)) ? 'crit' : '';
    var stateBody;
    if (sel.status === 'Bloqueado') {
      stateBody = '<b>Bloqueada.</b> ' + esc(sel.blockedReason || sel.accionable || 'Necesita desbloqueo manual.');
    } else if (typeof sel.etaDays === 'number' && sel.etaDays < 0) {
      stateBody = '<b>Vencida hace ' + Math.abs(sel.etaDays) + ' días.</b> ' + esc(sel.accionable || '');
    } else {
      stateBody = esc(sel.accionable || 'Sin acción registrada.');
    }
    var timeline = _buildEdTimeline(sel);
    var tlHtml = '';
    for (var k = 0; k < timeline.length; k++) {
      var it = timeline[k];
      tlHtml += '<div class="tk-tl-item">'
             +    '<div class="tk-tl-dot ' + (it.dot || '') + '"></div>'
             +    '<div class="tk-tl-when">' + esc(it.when) + '</div>'
             +    '<div class="tk-tl-what">' + it.what + '</div>'
             + '</div>';
    }
    html += '<aside class="tk-panel">'
         +    '<div class="tk-panel-head">'
         +      '<span class="tk-panel-eyebrow">' + esc(sel.id + (sel.pais ? ' · ' + sel.pais : '')) + '</span>'
         +      '<button class="tk-panel-close" onclick="edClosePanel()" aria-label="Cerrar">×</button>'
         +    '</div>'
         +    '<h2 class="tk-panel-title">' + esc(sel.nombre || '') + '</h2>'
         +    '<div class="tk-panel-pills">'
         +      '<span class="ed-pill ' + (sel.priority || '').toLowerCase() + '">' + esc(sel.priority || '') + '</span>'
         +      '<span class="ed-pill ' + _statusClass(sel.status) + '">' + esc(sel.status || '') + '</span>'
         +      (sel.tipoTrabajo ? '<span class="ed-pill curso">' + esc(sel.tipoTrabajo) + '</span>' : '')
         +    '</div>'
         +    '<div class="tk-panel-block ' + blockCls + '">'
         +      '<div class="blk-lbl">— Estado actual</div>'
         +      '<div class="blk-body">' + stateBody + '</div>'
         +    '</div>'
         +    '<div class="tk-panel-grid">'
         +      _panelCell('Responsable', sel.resp)
         +      _panelCell('Líder', sel.lider)
         +      _panelCell('Deadline', sel.deadline + (sel.eta ? ' · ' + sel.eta : ''),
                            (typeof sel.etaDays === 'number' && sel.etaDays < 0) ? 'crit' : '')
         +      _panelCell('SLA', sel.slaTarget)
         +      _panelCell('Riesgo', sel.riesgo, sel.riesgo === 'Legal alto' ? 'crit' : '')
         +      _panelCell('Proyecto', pn2)
         +    '</div>'
         +    '<div class="tk-panel-block">'
         +      '<div class="blk-lbl">— Historial</div>'
         +      '<div class="tk-timeline">' + tlHtml + '</div>'
         +    '</div>'
         +    '<div class="tk-actions">'
         +      '<button class="ed-btn primary">Escalar</button>'
         +      '<button class="ed-btn">Reasignar</button>'
         +      '<button class="ed-btn">Comentar</button>'
         +    '</div>'
         + '</aside>';
  }

  v.innerHTML = html;
}

// MARKER:EDITORIAL_TRACKER_END

// ───────────────────────────────────────────────────────────────
// MARKER:EDITORIAL_AGRUPADAS_BEGIN
// Vista intermedia "Por urgencia" — agrupa tareas activas del USER
// en franjas (Pendientes / Hoy / Esta semana / Más adelante) con
// narrativa por bucket. Tabs (prioridad/proyecto/tipo/riesgo) son
// decorativos en Fase 1 (solo "Por prioridad" funcional).
// ───────────────────────────────────────────────────────────────

function _agBuckets(tasks) {
  var overdue = [], today = [], week = [], later = [];
  for (var i = 0; i < tasks.length; i++) {
    var t = tasks[i];
    if (t.status === 'Listo') continue;
    var d = (typeof t.etaDays === 'number') ? t.etaDays : null;
    if (d == null) { later.push(t); continue; }
    if (d < 0) overdue.push(t);
    else if (d === 0) today.push(t);
    else if (d <= 5) week.push(t);
    else later.push(t);
  }
  // ordenar por urgencia dentro de cada bucket
  function sortAsc(a, b) {
    var aBlk = a.status === 'Bloqueado' ? -1 : 0;
    var bBlk = b.status === 'Bloqueado' ? -1 : 0;
    if (aBlk !== bBlk) return aBlk - bBlk;
    var ad = (typeof a.etaDays === 'number') ? a.etaDays : 9999;
    var bd = (typeof b.etaDays === 'number') ? b.etaDays : 9999;
    return ad - bd;
  }
  return { overdue: overdue.sort(sortAsc), today: today.sort(sortAsc), week: week.sort(sortAsc), later: later.sort(sortAsc) };
}

function _agBucketNarr(key, tasks) {
  // Narrativa contextual por bucket basada en counts y bloqueos reales.
  if (tasks.length === 0) {
    if (key === 'overdue') return 'Sin tareas pendientes de cierre. <b>Buen estado.</b>';
    if (key === 'today') return 'Nada vence hoy. <b>Día limpio.</b>';
    if (key === 'week') return 'Sin tareas previstas esta semana.';
    return 'Sin tareas con SLA holgado.';
  }
  var blockedCount = tasks.filter(function(t){ return t.status === 'Bloqueado'; }).length;
  var altaCount = tasks.filter(function(t){ return t.priority === 'Alta'; }).length;
  if (key === 'overdue') {
    var blockedFrag = blockedCount ? ('<span class="warn">' + blockedCount + ' en espera externa.</span> ') : '';
    return blockedFrag + '<b>Acción sugerida:</b> seguimiento o escalación amable.';
  }
  if (key === 'today') {
    return altaCount ? ('Prioridad <b>' + altaCount + ' Alta</b>. Cerrar antes del fin de día.') : 'Cerrar hoy para evitar vencimientos.';
  }
  if (key === 'week') {
    return altaCount
      ? ('<b>' + altaCount + ' Alta</b> con buen margen. Empezá por la de mayor alcance.')
      : 'Tareas con buen margen. Planificá tu semana.';
  }
  return '<b>SLA holgado.</b> Podés atenderlas con tiempo.';
}

function rEdAgrupadas(D) {
  var v = $('vEdAgrupadas'); if (!v) return;
  var name = (USER && USER.name) || (D && D._user && D._user.name) || '';
  var tasks = (D && D.tasks) ? D.tasks.filter(function(t){ return t.resp === name && t.status !== 'Listo'; }) : [];
  var b = _agBuckets(tasks);
  var totalActive = b.overdue.length + b.today.length + b.week.length + b.later.length;
  var firstName = name ? name.split(/\s+/)[0] : '';
  var todayLine = D && D.today ? _todayHumanStr(D.today) : '';

  var html = ''
    + '<div class="ed-eye">' + esc((firstName ? firstName + ' · ' : '') + 'Mis tareas — agrupadas por prioridad' + (todayLine ? ' · ' + todayLine : '')) + '</div>'
    + '<h1 class="ed-h1">' + esc(String(totalActive).padStart(2,'0')) + ' tareas, cuatro <em>franjas</em><br>de tiempo distintas.</h1>'
    + '<p class="ed-lede">Antes de meterte a la tabla densa, esta es la lectura rápida: dónde está cada cosa y qué te conviene atender primero. Empezá por las pendientes de cierre, las de "más adelante" pueden esperar tranquilas.</p>'
    + '<div class="ag-tabs">'
    +   '<div class="ag-tab active">Por prioridad</div>'
    +   '<div class="ag-tab" title="Próximamente">Por proyecto</div>'
    +   '<div class="ag-tab" title="Próximamente">Por tipo</div>'
    +   '<div class="ag-tab" title="Próximamente">Por riesgo</div>'
    + '</div>';

  var buckets = [
    { key: 'overdue', tone: 'warn', title: 'Pendientes de cierre', tasks: b.overdue },
    { key: 'today',   tone: 'warn', title: 'Vencen hoy',           tasks: b.today },
    { key: 'week',    tone: '',     title: 'Esta semana',          tasks: b.week },
    { key: 'later',   tone: '',     title: 'Más adelante',         tasks: b.later }
  ];

  for (var i = 0; i < buckets.length; i++) {
    var bk = buckets[i];
    html += '<div class="ag-bucket">'
         +    '<div class="ag-bhead">'
         +      '<div class="ag-btitle ' + bk.tone + '">— ' + esc(bk.title) + '</div>'
         +      '<div class="ag-bcount">' + String(bk.tasks.length).padStart(2,'0') + '</div>'
         +      '<div class="ag-bnarr">' + _agBucketNarr(bk.key, bk.tasks) + '</div>'
         +    '</div>';
    if (bk.tasks.length === 0) {
      html += '<div style="padding:14px 0;font-size:12px;color:var(--dim)">Sin tareas en esta franja.</div>';
    } else {
      html += '<div class="ag-cards">';
      for (var k = 0; k < bk.tasks.length; k++) {
        var t = bk.tasks[k];
        var tone = _etaToneClass(t.etaDays, t.status);
        var pn = _projNameForTask(t);
        var sla = t.slaTarget || '';
        var actionHtml = t.blockedReason
          ? '<span class="warn">En espera de ' + esc(t.blockedReason) + '.</span> ' + esc(t.accionable || '')
          : esc(t.accionable || '');
        html += '<div class="ag-card" onclick="goEd(\'tracker\')">'
             +    '<div class="ag-card-meta">'
             +      '<span>' + esc(t.id) + '</span>'
             +      '<span class="sep">·</span>'
             +      '<span>' + esc(pn) + '</span>'
             +      (sla ? '<span class="sep">·</span><span>SLA ' + esc(sla) + '</span>' : '')
             +    '</div>'
             +    '<div class="ag-card-name">' + esc(t.nombre || '') + '</div>'
             +    '<div class="ag-card-action">' + actionHtml + '</div>'
             +    '<div class="ag-card-foot">'
             +      '<span class="ed-pill ' + (t.priority || '').toLowerCase() + '">' + esc(t.priority || '') + '</span>'
             +      '<span class="ed-pill ' + _statusClass(t.status) + '">' + esc(t.status || '') + '</span>'
             +      '<span class="ag-card-eta ' + tone + '">' + esc(t.eta || '') + '</span>'
             +    '</div>'
             + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  v.innerHTML = html;
}

// MARKER:EDITORIAL_AGRUPADAS_END
</script>
