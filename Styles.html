<style>
:root {
  --bg: #0B0F1A;
  --surface: #141926;
  --surface2: #1C2237;
  --surface3: #242B42;
  --border: #2A3352;
  --border-light: #353F60;
  --text: #E8ECF4;
  --text-muted: #8892B0;
  --text-dim: #5A6588;
  --accent: #FF6B35;
  --accent-glow: rgba(255,107,53,0.15);
  --teal: #22D3EE;
  --teal-dim: rgba(34,211,238,0.12);
  --green: #34D399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #F87171;
  --red-dim: rgba(248,113,113,0.12);
  --yellow: #FBBF24;
  --yellow-dim: rgba(251,191,36,0.12);
  --purple: #A78BFA;
  --purple-dim: rgba(167,139,250,0.12);
  --blue: #60A5FA;
  --blue-dim: rgba(96,165,250,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  font-size: 14px; line-height: 1.5;
  min-height: 100vh; overflow-x: hidden;
}
.ambient {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 10%, rgba(255,107,53,0.06), transparent),
    radial-gradient(ellipse 500px 500px at 90% 80%, rgba(34,211,238,0.04), transparent);
}
.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 60px; }

/* ═══ Top Bar ═══ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px;
}
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.topbar-logo {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #FF8F65);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: white;
  box-shadow: 0 0 20px rgba(255,107,53,0.3);
}
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.topbar h1 span { color: var(--text-muted); font-weight: 400; }
.topbar-meta { display: flex; align-items: center; gap: 12px; }
.topbar-pill {
  padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 600;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
}
.topbar-pill.live {
  background: var(--accent-glow); border-color: rgba(255,107,53,0.3); color: var(--accent);
}
.topbar-pill.live::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent); margin-right: 8px;
  animation: pulse-dot 2s ease-in-out infinite;
}

/* Navigation links */
.nav-link {
  padding: 6px 16px; border-radius: 100px; font-size: 13px; font-weight: 600;
  color: var(--text-muted); text-decoration: none; transition: all 0.2s;
  border: 1px solid transparent;
}
.nav-link:hover { color: var(--text); border-color: var(--border); }
.nav-link.active {
  background: var(--surface2); color: var(--text); border-color: var(--border);
}

.btn-refresh {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-muted); font-size: 18px;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
.btn-refresh.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulse-dot {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(255,107,53,0.4); }
  50% { opacity:0.7; box-shadow:0 0 0 6px rgba(255,107,53,0); }
}

/* ═══ KPI Row ═══ */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.kpi {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px 24px; position: relative; overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
}
.kpi:hover { border-color: var(--border-light); transform: translateY(-2px); }
.kpi-icon {
  width: 38px; height: 38px; border-radius: 10px; display: flex;
  align-items: center; justify-content: center; font-size: 18px; margin-bottom: 14px;
}
.kpi-value {
  font-size: 36px; font-weight: 800; letter-spacing: -1.5px;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.kpi-label { font-size: 13px; color: var(--text-muted); margin-top: 6px; font-weight: 500; }
.kpi-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; }
.kpi.kpi-total .kpi-icon { background: var(--teal-dim); }
.kpi.kpi-total .kpi-value { color: var(--teal); }
.kpi.kpi-total .kpi-bar { background: linear-gradient(90deg, var(--teal), transparent); }
.kpi.kpi-alta .kpi-icon { background: var(--red-dim); }
.kpi.kpi-alta .kpi-value { color: var(--red); }
.kpi.kpi-alta .kpi-bar { background: linear-gradient(90deg, var(--red), transparent); }
.kpi.kpi-bloq .kpi-icon { background: var(--yellow-dim); }
.kpi.kpi-bloq .kpi-value { color: var(--yellow); }
.kpi.kpi-bloq .kpi-bar { background: linear-gradient(90deg, var(--yellow), transparent); }
.kpi.kpi-done .kpi-icon { background: var(--green-dim); }
.kpi.kpi-done .kpi-value { color: var(--green); }
.kpi.kpi-done .kpi-bar { background: linear-gradient(90deg, var(--green), transparent); }

/* ═══ Cards ═══ */
.charts-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 16px; margin-bottom: 28px; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: border-color 0.3s;
}
.card:hover { border-color: var(--border-light); }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border);
}
.card-title { font-size: 14px; font-weight: 600; }
.card-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 100px;
  background: var(--surface3); color: var(--text-muted); font-weight: 500;
}
.card-body { padding: 22px; }

/* Blocked banner */
.blocked-banner {
  margin: 0 0 24px; padding: 16px 20px; border-radius: var(--radius);
  background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25);
  border-left: 4px solid var(--yellow);
}
.blocked-banner b { color: var(--yellow); font-size: 14px; }
.blocked-banner ul { margin-top: 10px; padding-left: 20px; color: var(--text-muted); font-size: 13px; }

/* SLA */
.sla-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sla-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 16px 18px; text-align: center; }
.sla-prio { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.sla-time { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }
.sla-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Team */
.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.team-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px; transition: border-color 0.3s, transform 0.2s;
}
.team-card:hover { border-color: var(--border-light); transform: translateY(-2px); }
.team-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.team-avatar {
  width: 44px; height: 44px; border-radius: 12px; display: flex;
  align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: white; flex-shrink: 0;
}
.team-name { font-weight: 600; font-size: 15px; }
.team-role { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.team-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.team-stat { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.team-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.team-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.22,1,0.36,1); }
.team-pct { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

/* ═══ Table ═══ */
.filter-bar {
  display: flex; align-items: center; gap: 8px; padding: 16px 22px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-right: 4px; }
.filter-btn {
  padding: 5px 14px; border-radius: 100px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-size: 12px;
  font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 12px rgba(255,107,53,0.25); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 12px 14px; font-size: 11px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
  position: sticky; top: 0; background: var(--surface);
}
tbody td { padding: 12px 14px; border-bottom: 1px solid rgba(42,51,82,0.5); font-size: 13px; vertical-align: middle; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
.col-id { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 12px; width: 40px; }
.col-nombre { font-weight: 600; max-width: 260px; }
.col-resp { color: var(--text-muted); white-space: nowrap; }
.col-acc { color: var(--text-muted); max-width: 220px; font-size: 12px; }
.col-dl { white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.col-actions { width: 40px; text-align: center; }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-alta { background: var(--red-dim); color: var(--red); }
.badge-media { background: var(--yellow-dim); color: var(--yellow); }
.badge-baja { background: var(--green-dim); color: var(--green); }
.badge-pendiente { background: var(--surface3); color: var(--text-muted); }
.badge-en-curso { background: var(--blue-dim); color: var(--blue); }
.badge-bloqueado { background: var(--yellow-dim); color: var(--yellow); }
.badge-listo { background: var(--green-dim); color: var(--green); }

/* Clickable badges */
.badge-clickable {
  cursor: pointer; transition: all 0.15s; position: relative;
}
.badge-clickable:hover {
  filter: brightness(1.2);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
}
.badge-clickable::after {
  content: '▾'; margin-left: 3px; font-size: 9px; opacity: 0;
  transition: opacity 0.15s;
}
.badge-clickable:hover::after { opacity: 0.7; }

/* Action button */
.btn-icon {
  width: 28px; height: 28px; border-radius: 8px; border: 1px solid transparent;
  background: transparent; color: var(--text-dim); font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; display: inline-flex;
  align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--border); background: var(--surface3); color: var(--text); }

/* ═══ Dropdown Menu (floating) ═══ */
.dropdown-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 999; background: transparent;
}
.dropdown-menu {
  display: none; position: absolute; z-index: 1000;
  background: var(--surface2); border: 1px solid var(--border-light);
  border-radius: 12px; padding: 6px; min-width: 160px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
}
.dropdown-item {
  padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.12s; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.dropdown-item:hover { background: var(--surface3); }
.dropdown-active { background: var(--accent-glow); color: var(--accent); }
.dropdown-active:hover { background: rgba(255,107,53,0.2); }
.dropdown-label {
  padding: 6px 14px 4px; font-size: 10px; font-weight: 700;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
}
.dropdown-sep {
  height: 1px; background: var(--border); margin: 4px 8px;
}

/* ═══ Toast ═══ */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 600;
  z-index: 2000; transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
  opacity: 0; pointer-events: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.toast-show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-info { background: var(--surface2); border: 1px solid var(--border-light); color: var(--blue); }
.toast-success { background: #052e16; border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
.toast-warn { background: #451a03; border: 1px solid rgba(251,191,36,0.3); color: var(--yellow); }
.toast-error { background: #450a0a; border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

/* ═══ Form ═══ */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input, .form-group select {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
}
.form-group input::placeholder { color: var(--text-dim); }
.form-group select { cursor: pointer; }
.btn-submit {
  padding: 12px 28px; border-radius: var(--radius-sm); border: none;
  background: linear-gradient(135deg, var(--accent), #FF8F65); color: white;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(255,107,53,0.3);
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,107,53,0.4); }
.form-msg { margin-top: 12px; font-size: 13px; font-weight: 500; min-height: 20px; }
.form-msg-info { color: var(--blue); }
.form-msg-success { color: var(--green); }
.form-msg-warn { color: var(--yellow); }
.form-msg-error { color: var(--red); }

/* Footer */
.footer { text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); }

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.animate-in { opacity: 0; animation: fadeUp 0.5s ease forwards; }
.delay-1{animation-delay:.05s} .delay-2{animation-delay:.1s}
.delay-3{animation-delay:.15s} .delay-4{animation-delay:.2s}
.delay-5{animation-delay:.3s} .delay-6{animation-delay:.4s}
.delay-7{animation-delay:.5s} .delay-8{animation-delay:.6s}

/* Responsive */
@media (max-width: 1024px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr; }
  .topbar { flex-direction: column; align-items: flex-start; gap: 12px; }
  .app { padding: 0 16px 40px; }
  .kpi-value { font-size: 28px; }
  .sla-grid { grid-template-columns: 1fr; }
}
</style>
