<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* Surfaces */
  --bg: #0C0E14;
  --surface: #151820;
  --surface2: #1C2030;
  --surface3: #252A3A;
  --border: rgba(255,255,255,.06);
  --border-light: rgba(255,255,255,.1);
  /* Text */
  --text: #F0F2F8;
  --text-muted: #9099B0;
  --text-dim: #5C6480;
  /* Brand */
  --rappi: #FF4940;
  --rappi-glow: rgba(255,73,64,.12);
  /* Semantic */
  --green: #2DD4A0;      --green-dim: rgba(45,212,160,.1);
  --red: #FF5C5C;        --red-dim: rgba(255,92,92,.1);
  --yellow: #FFB938;     --yellow-dim: rgba(255,185,56,.1);
  --blue: #5B9BFF;       --blue-dim: rgba(91,155,255,.1);
  --purple: #A78BFA;     --purple-dim: rgba(167,139,250,.1);
  --cyan: #22D3EE;       --cyan-dim: rgba(34,211,238,.1);
  /* Shape */
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  /* Typography */
  --font: 'Nunito Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  /* Effects */
  --shadow: 0 8px 32px rgba(0,0,0,.4);
}

/* ═══════════════════════════════════════════════════════════════
   RESET + GLOBAL
   ═══════════════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

.ambient {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 700px 500px at 5% 5%, rgba(255,73,64,.05), transparent),
    radial-gradient(ellipse 500px 400px at 95% 90%, rgba(167,139,250,.03), transparent);
}
.app {
  position: relative; z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 28px 60px;
}

/* ═══════════════════════════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════════════════════════ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0; margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.topbar-logo {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--rappi);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 24px rgba(255,73,64,.35);
}
.topbar h1 { font-size: 19px; font-weight: 800; letter-spacing: -.5px; }
.topbar h1 span { color: var(--text-muted); font-weight: 400; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

/* ═══════════════════════════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════════════════════════ */
.nav-tabs {
  display: flex; gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 3px;
}
.nav-tab {
  padding: 7px 14px;
  border-radius: 10px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  border: none; background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text-muted); }
.nav-tab.active {
  background: var(--rappi); color: #fff;
  box-shadow: 0 0 16px rgba(255,73,64,.3);
}

.ov-badge {
  display: none;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  background: var(--red-dim); color: var(--red);
  border: 1px solid rgba(255,92,92,.2);
  animation: pulse 2s infinite;
}
.ov-badge.show { display: flex; align-items: center; gap: 5px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }

.btn-ref {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 17px;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-ref:hover { border-color: var(--rappi); color: var(--rappi); }

/* ═══════════════════════════════════════════════════════════════
   TOOLBAR
   ═══════════════════════════════════════════════════════════════ */
.toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.country-bar { display: flex; gap: 4px; flex-wrap: wrap; }

.cpill {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
}
.cpill:hover { border-color: var(--rappi); color: var(--rappi); }
.cpill.active {
  background: var(--rappi); color: #fff;
  border-color: var(--rappi);
  box-shadow: 0 0 12px rgba(255,73,64,.2);
}

.search-box { position: relative; }
.search-box input {
  width: 220px;
  padding: 8px 14px 8px 34px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  transition: border-color .2s;
}
.search-box input:focus {
  outline: none;
  border-color: var(--rappi);
  box-shadow: 0 0 0 3px rgba(255,73,64,.08);
}
.search-box input::placeholder { color: var(--text-dim); }
.search-box::before {
  content: '🔍';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════════
   VIEWS
   ═══════════════════════════════════════════════════════════════ */
.view { display: none; }
.view.active { display: block; }

/* ═══════════════════════════════════════════════════════════════
   CARDS
   ═══════════════════════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .3s;
}
.card:hover { border-color: var(--border-light); }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 14px; font-weight: 700; }
.card-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 100px;
  background: var(--surface3);
  color: var(--text-muted);
  font-weight: 600;
}
.card-body { padding: 20px; }

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 16px;
  margin-bottom: 22px;
}
.hero-grid .card-body { padding: 24px; min-height: 280px; }

/* ═══════════════════════════════════════════════════════════════
   TEAM CARDS
   ═══════════════════════════════════════════════════════════════ */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}
.tcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all .2s;
}
.tcard:hover { border-color: var(--border-light); transform: translateY(-2px); }
.tcard-sel {
  border-color: var(--rappi) !important;
  box-shadow: 0 0 0 2px rgba(255,73,64,.15);
}
.tcard-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.tcard-av {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; color: #fff;
  flex-shrink: 0;
}
.tcard-name { font-weight: 700; font-size: 13px; line-height: 1.2; }
.tcard-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.tcard-stats { display: flex; gap: 5px; flex-wrap: wrap; }
.tcard-stat { padding: 2px 7px; border-radius: var(--radius-xs); font-size: 10px; font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════
   TABLE + FILTERS
   ═══════════════════════════════════════════════════════════════ */
.filter-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-label { font-size: 11px; color: var(--text-dim); font-weight: 600; margin-right: 2px; }

.fbtn {
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  font-family: var(--font);
}
.fbtn:hover { border-color: var(--rappi); color: var(--rappi); }
.fbtn.active {
  background: var(--rappi-glow);
  color: var(--rappi);
  border-color: rgba(255,73,64,.3);
}

.pchip {
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
}
.pchip:hover { border-color: var(--purple); color: var(--purple); }
.pchip.active {
  background: var(--purple-dim);
  color: var(--purple);
  border-color: rgba(167,139,250,.3);
}

table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  padding: 11px 14px;
  font-size: 10px; font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .6px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky; top: 0;
  background: var(--surface);
}
tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
tbody tr { transition: background .12s; }
tbody tr:hover { background: rgba(255,255,255,.015); }

.col-id { color: var(--text-dim); font-family: var(--mono); font-size: 12px; width: 36px; }
.col-nombre { font-weight: 700; max-width: 240px; cursor: pointer; }
.col-nombre:hover { color: var(--rappi); }
.col-resp { color: var(--text-muted); white-space: nowrap; font-size: 12px; }
.col-acc { color: var(--text-muted); max-width: 200px; font-size: 12px; }

/* ═══════════════════════════════════════════════════════════════
   BADGES
   ═══════════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 11px;
  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  white-space: nowrap;
  cursor: pointer; transition: all .12s;
  border: none; background: transparent;
  font-family: var(--font);
}
.badge:hover { filter: brightness(1.15); transform: scale(1.04); }

/* Priority */
.b-alta { background: var(--red-dim); color: var(--red); }
.b-media { background: var(--yellow-dim); color: var(--yellow); }
.b-baja { background: var(--green-dim); color: var(--green); }

/* Status */
.b-pendiente { background: var(--surface3); color: var(--text-muted); }
.b-curso { background: var(--blue-dim); color: var(--blue); }
.b-revision { background: var(--purple-dim); color: var(--purple); }
.b-bloqueado { background: var(--yellow-dim); color: var(--yellow); }
.b-listo { background: var(--green-dim); color: var(--green); }

/* Deadline */
.dl-badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px;
  border-radius: var(--radius-xs);
  font-size: 11px; font-weight: 600;
  font-family: var(--mono);
}
.dl-ok { background: var(--green-dim); color: var(--green); }
.dl-warn { background: var(--yellow-dim); color: var(--yellow); }
.dl-over { background: var(--red-dim); color: var(--red); }
.dl-none { color: var(--text-dim); }

/* Tipo trabajo / Riesgo */
.b-tt {
  padding: 3px 9px;
  border-radius: var(--radius-xs);
  font-size: 10px; font-weight: 700;
  background: var(--surface3); color: var(--text-muted);
}
.b-riesgo-legal { background: var(--red-dim); color: var(--red); }
.b-riesgo-reput { background: var(--yellow-dim); color: var(--yellow); }
.b-riesgo-oper { background: var(--cyan-dim); color: var(--cyan); }

.btn-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  font-size: 15px;
  cursor: pointer; transition: all .12s;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn-icon:hover {
  border-color: var(--border);
  background: var(--surface3);
  color: var(--text);
}

/* ═══════════════════════════════════════════════════════════════
   PROJECT CARDS
   ═══════════════════════════════════════════════════════════════ */
.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
  margin-bottom: 22px;
}
.pcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .3s;
}
.pcard:hover { border-color: var(--border-light); }
.pcard-top { padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
.pcard-edit {
  position: absolute;
  top: 12px; right: 12px;
  width: 28px; height: 28px;
}
.pcard-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pcard-name { font-size: 16px; font-weight: 800; line-height: 1.3; }
.pcard-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.pcard-info {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-dim);
  flex-wrap: wrap;
}
.pcard-info span { display: flex; align-items: center; gap: 4px; }

.pcard-progress { margin-top: 4px; }
.pbar-track { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.pbar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .8s cubic-bezier(.22,1,.36,1);
}
.pbar-label {
  display: flex; justify-content: space-between;
  margin-top: 6px;
  font-size: 11px; color: var(--text-dim); font-weight: 600;
}

.pcard-stats { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 20px 14px; }
.pcard-stat { padding: 3px 9px; border-radius: var(--radius-xs); font-size: 10px; font-weight: 700; }

.pcard-footer {
  display: flex; align-items: center;
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  gap: 8px;
}
.pcard-toggle {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px; font-weight: 700;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  transition: color .15s;
  background: transparent;
  border: none;
  flex: 1;
  text-align: left;
  font-family: var(--font);
}
.pcard-toggle:hover { color: var(--text); }
.pcard-toggle .arrow { transition: transform .2s; display: inline-block; }

.pcard-tasks {
  max-height: 0; overflow: hidden;
  transition: max-height .3s ease;
  border-top: 1px solid var(--border);
}
.pcard-tasks.open { max-height: 800px; }
.pcard-task {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.pcard-task:last-child { border-bottom: none; }
.pcard-task-id { color: var(--text-dim); font-family: var(--mono); width: 28px; flex-shrink: 0; }
.pcard-task-name {
  flex: 1; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Project status badges */
.ps-activo { background: var(--blue-dim); color: var(--blue); }
.ps-pausa { background: var(--yellow-dim); color: var(--yellow); }
.ps-completado { background: var(--green-dim); color: var(--green); }
.ps-cancelado { background: var(--red-dim); color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   FORM
   ═══════════════════════════════════════════════════════════════ */
.form-section { margin-bottom: 24px; }
.form-section-title {
  font-size: 12px; font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

.form-group label {
  display: block;
  font-size: 11px; font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  transition: border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--rappi);
  box-shadow: 0 0 0 3px rgba(255,73,64,.08);
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--text-dim); }
.form-group textarea { resize: vertical; min-height: 60px; }

.btn-submit {
  padding: 12px 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--rappi);
  color: #fff;
  font-family: var(--font);
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 16px rgba(255,73,64,.3);
}
.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(255,73,64,.4);
}
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 8px; }

.btn-secondary {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

.form-msg { margin-top: 12px; font-size: 13px; font-weight: 600; min-height: 20px; }
.msg-info { color: var(--blue); }
.msg-success { color: var(--green); }
.msg-error { color: var(--red); }

/* Sub-tabs (Crear view) */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.sub-tab {
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  transition: all .15s;
}
.sub-tab:hover { border-color: var(--rappi); color: var(--rappi); }
.sub-tab.active {
  background: var(--rappi-glow);
  color: var(--rappi);
  border-color: rgba(255,73,64,.3);
}
.sub-view { display: none; }
.sub-view.active { display: block; }

/* ═══════════════════════════════════════════════════════════════
   SLA
   ═══════════════════════════════════════════════════════════════ */
.sla-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sla-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 18px;
  text-align: center;
}
.sla-num { font-size: 30px; font-weight: 800; font-family: var(--mono); letter-spacing: -1px; }
.sla-lbl {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .5px;
  margin-top: 4px; font-weight: 700;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  width: 90%; max-width: 560px; max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  animation: mIn .25s ease;
}
.modal.modal-wide {
  max-width: 780px;
}
@keyframes mIn {
  from { opacity: 0; transform: scale(.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 16px; font-weight: 800; }
